<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduDog Pro - Entrenamiento Canino</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');

        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #e2e8f0; }

        .app-container {
            max-width: 420px; margin: 0 auto; height: 100dvh;
            position: relative; background: #ffffff;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
            overflow: hidden; display: flex; flex-direction: column;
        }

        .screen {
            display: none; flex: 1; flex-direction: column;
            animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            overflow-y: auto; overflow-x: hidden;
            background-color: #f8fafc;
        }
        .screen.active { display: flex; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        /* Brand Styles */
        .brand-bg { background: linear-gradient(135deg, #059669 0%, #064e3b 100%); }
        .brand-text { color: #059669; font-weight: 800; }

        /* Modern Tabs */
        .tab-btn { padding-bottom: 0.75rem; border-bottom: 3px solid transparent; transition: all 0.3s; font-weight: 800; font-size: 0.75rem; color: #94a3b8; letter-spacing: 0.05em; }
        .tab-btn.active { border-color: #10b981; color: #059669; }

        /* REPRODUCTOR DE AUDIO ORGÁNICO (BLOB) */
        .blob-audio-container {
            position: relative; width: 240px; height: 240px;
            margin: 20px auto; display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .blob-shape {
            position: absolute; inset: 0;
            background: rgba(16, 185, 129, 0.12);
            border: 2px solid rgba(16, 185, 129, 0.2);
            border-radius: 42% 58% 70% 30% / 45% 45% 55% 55%;
            transition: all 1s ease-in-out;
            z-index: 1;
        }
        /* Animación de Respiración cuando se activa */
        .audio-playing .blob-shape {
            animation: breathe 4s ease-in-out infinite;
            background: rgba(16, 185, 129, 0.2);
            border-color: #10b981;
            box-shadow: 0 0 50px rgba(16, 185, 129, 0.15);
        }
        @keyframes breathe {
            0%, 100% { border-radius: 42% 58% 70% 30% / 45% 45% 55% 55%; transform: scale(1); }
            50% { border-radius: 58% 42% 38% 62% / 55% 55% 45% 45%; transform: scale(1.1); }
        }
        
        .audio-content { position: relative; z-index: 10; text-align: center; }
        #audio-time { font-size: 3.5rem; font-weight: 900; color: #064e3b; letter-spacing: -2px; line-height: 1; }
        .play-trigger { 
            margin-top: 10px; width: 50px; height: 50px; 
            background: #059669; color: white; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 10px 15px -3px rgba(5, 150, 105, 0.3);
            cursor: pointer; transition: all 0.3s;
        }
        .play-trigger:active { transform: scale(0.9); }

        .step-badge {
            width: 24px; height: 24px; border-radius: 50%;
            background: #059669; color: white;
            display: flex; align-items: center; justify-content: center;
            font-size: 11px; font-weight: 800; flex-shrink: 0;
        }

        .modal-bg { background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(4px); }
    </style>
</head>
<body class="antialiased text-slate-900 md:py-8">

<div id="toast" class="fixed top-6 left-1/2 -translate-x-1/2 bg-slate-900 text-white px-5 py-3 rounded-full shadow-2xl z-[100] transform -translate-y-24 opacity-0 transition-all duration-300 flex items-center gap-3 font-semibold text-sm pointer-events-none w-max max-w-[90%]">
    <i id="toast-icon" class="fa-solid fa-circle-check text-emerald-400 text-lg"></i>
    <span id="toast-msg">Mensaje</span>
</div>

<div class="app-container md:rounded-[2.5rem] md:border-[8px] md:border-slate-900">

    <section id="screen-hub" class="screen">
        <div class="sticky top-0 bg-emerald-600 text-white border-b border-emerald-700 px-5 py-4 flex justify-between items-center z-30 shadow-md">
            <h2 class="font-extrabold text-sm flex items-center gap-2"><i class="fa-solid fa-dog"></i> EduDog Pro</h2>
            <div class="w-10 h-10 flex items-center justify-center rounded-full bg-emerald-700 cursor-pointer">
                <i class="fa-solid fa-user"></i>
            </div>
        </div>
        <div class="flex-1 px-5 py-5 space-y-5 pb-10">
            <div class="brand-bg rounded-[2rem] p-5 text-white shadow-xl relative overflow-hidden">
                <div class="relative z-10">
                    <p class="text-emerald-300 text-[10px] font-black uppercase tracking-widest mb-1">Tu compañero</p>
                    <h3 class="text-2xl font-black tracking-tight" id="hub-dog-name">Cargando...</h3>
                    <div class="mt-4 bg-white/10 p-3 rounded-2xl border border-white/10">
                        <div class="flex justify-between items-center text-xs font-bold mb-2">
                            <span class="text-slate-200">Progreso global</span>
                            <span class="text-white" id="hub-progress-text">0 días</span>
                        </div>
                        <div class="w-full bg-white/20 rounded-full h-2 overflow-hidden">
                            <div id="hub-progress-bar" class="bg-white h-full rounded-full transition-all" style="width:0%"></div>
                        </div>
                    </div>
                </div>
            </div>
            <div>
                <h3 class="font-extrabold text-slate-900 text-base mb-3 text-center">Desafíos de Entrenamiento</h3>
                <div id="challenges-container" class="grid grid-cols-1 gap-3"></div>
            </div>
        </div>
    </section>

    <section id="screen-challenge" class="screen">
        <div class="sticky top-0 bg-emerald-600 text-white border-b border-emerald-700 px-5 py-4 flex items-center justify-between z-30 shadow-md">
            <button onclick="showScreen('screen-hub')" class="w-9 h-9 bg-emerald-700 rounded-full flex items-center justify-center text-white active:scale-95 transition-all">
                <i class="fa-solid fa-arrow-left text-sm"></i>
            </button>
            <div class="text-center">
                <h2 class="font-extrabold text-white text-sm" id="challenge-title">Desafío</h2>
                <p class="text-[10px] text-emerald-200 font-bold uppercase tracking-widest">7 DÍAS DE ENTRENAMIENTO</p>
            </div>
            <div class="w-9 h-9"></div>
        </div>
        <div class="flex-1 px-5 py-5 space-y-4 pb-10">
            <div id="days-container" class="space-y-3 mt-2"></div>
        </div>
    </section>

    <section id="screen-lesson" class="screen">
        <div class="sticky top-0 bg-emerald-600 text-white border-b border-emerald-700 px-5 py-4 flex items-center justify-between z-30 shadow-md">
            <button onclick="showScreen('screen-challenge')" class="w-9 h-9 bg-emerald-700 rounded-full flex items-center justify-center text-white active:scale-95 transition-all">
                <i class="fa-solid fa-arrow-left text-sm"></i>
            </button>
            <div class="text-center">
                <h2 class="font-extrabold text-white text-sm" id="lesson-header-title">Día 1</h2>
                <p class="text-[10px] font-bold text-emerald-200 uppercase tracking-widest" id="lesson-header-sub">Fase 1</p>
            </div>
            <div class="w-9 h-9"></div>
        </div>
        
        <div class="flex-1 px-5 py-5 pb-10" id="lesson-content">
            </div>
    </section>

    <div id="modal-complete" class="hidden absolute inset-0 z-50 modal-bg flex flex-col justify-end">
        <div class="bg-white rounded-t-[2.5rem] p-8">
            <div class="text-center mb-6">
                <div class="text-5xl mb-3">🎉</div>
                <h3 class="text-xl font-black text-slate-900">¿Cómo fue la sesión?</h3>
            </div>
            <div class="space-y-3">
                <button onclick="saveDay('excelente')" class="w-full bg-emerald-50 text-emerald-700 p-4 rounded-2xl font-bold text-sm border border-emerald-100 flex items-center justify-center gap-2">Excelente</button>
                <button onclick="saveDay('bien')" class="w-full bg-amber-50 text-amber-700 p-4 rounded-2xl font-bold text-sm border border-amber-100 flex items-center justify-center gap-2">Bien</button>
                <button onclick="closeModal()" class="w-full text-slate-400 py-3 font-bold text-sm mt-2">Cancelar</button>
            </div>
        </div>
    </div>

</div>

<script>
// =============================================
// DATOS
// =============================================
const CHALLENGES = [
    {
        id: 'no-muerda',
        name: 'No muerda las cosas',
        icon: '🦷',
        totalDays: 7,
        desc: 'Elimina el hábito de morder',
        lessons: [
            { 
                day: 1, title: 'Entiende por qué muerde', 
                semanaLabel: 'Fase de Observación',
                teoria: {
                    audioSeconds: 45,
                    intro: "¿Por qué <DOG> muerde todo? 🦷",
                    cuerpo: "Morder es la forma en que tu perro interactúa con su entorno. Al no tener manos, usa su boca para explorar texturas y aliviar el estrés o aburrimiento.",
                    puntosClave: [
                        "Exploración: Descubre el mundo con la boca.",
                        "Alivio: Reduce la ansiedad y el aburrimiento.",
                        "Detective: Hoy solo observamos el patrón."
                    ]
                },
                practica: {
                    timerSeconds: 600,
                    pasos: [
                        { titulo: 'Observación Silenciosa', desc: 'Nota qué objetos prefiere morder durante 5 min.', emoji: '👁️' },
                        { titulo: 'Identifica texturas', desc: '¿Es madera, plástico o tela?', emoji: '📝' },
                        { titulo: 'Gestión básica', desc: 'Retira objetos peligrosos de su alcance.', emoji: '🏠' }
                    ]
                },
                resumen: "El primer paso no es la obediencia, es entender qué necesita tu perro."
            }
        ]
    }
];

let dogName = localStorage.getItem('currentDogName') || 'tu peludo';
let currentChallenge = null;
let currentLessonDay = null;
let currentTab = 'teoria';
let audioInterval = null;
let timerInterval = null;
let trackerData = JSON.parse(localStorage.getItem(`eduDog_tracker_${dogName}`)) || {};

// =============================================
// LOGICA UI
// =============================================

document.addEventListener('DOMContentLoaded', () => { renderHub(); showScreen('screen-hub'); });

function renderHub() {
    document.getElementById('hub-dog-name').innerText = `${dogName} 🐾`;
    const container = document.getElementById('challenges-container');
    container.innerHTML = '';
    CHALLENGES.forEach(ch => {
        const chTracker = trackerData[ch.id] || {};
        const passedCount = Object.values(chTracker).filter(t => t.passed).length;
        container.innerHTML += `
            <div onclick="openChallenge('${ch.id}')" class="bg-white rounded-3xl border border-slate-200 p-4 shadow-sm active:scale-95 transition-all cursor-pointer">
                <div class="flex items-center gap-3">
                    <div class="w-12 h-12 brand-bg rounded-2xl flex items-center justify-center text-xl text-white">${ch.icon}</div>
                    <div class="flex-1">
                        <h4 class="font-extrabold text-slate-900 text-sm">${ch.name}</h4>
                        <p class="text-[10px] text-slate-400 font-medium">${passedCount}/${ch.totalDays} Completado</p>
                    </div>
                </div>
            </div>`;
    });
}

function openChallenge(id) {
    currentChallenge = CHALLENGES.find(c => c.id === id);
    document.getElementById('challenge-title').innerText = currentChallenge.name;
    renderDays();
    showScreen('screen-challenge');
}

function renderDays() {
    const container = document.getElementById('days-container');
    const chTracker = trackerData[currentChallenge.id] || {};
    container.innerHTML = '';
    for (let i = 1; i <= currentChallenge.totalDays; i++) {
        const lesson = currentChallenge.lessons.find(l => l.day === i);
        const isPassed = chTracker[i] && chTracker[i].passed;
        const isReady = i === 1 || (chTracker[i-1] && chTracker[i-1].passed);
        container.innerHTML += `
            <div onclick="${isReady ? `openLesson(${i})` : ''}" class="bg-white rounded-2xl border-2 p-4 flex items-center justify-between ${isPassed ? 'border-emerald-500' : isReady ? 'border-emerald-200 bg-emerald-50' : 'opacity-40'}">
                <div class="flex items-center gap-3">
                    <div class="w-8 h-8 rounded-lg flex items-center justify-center font-black text-xs ${isPassed ? 'bg-emerald-500 text-white' : 'bg-slate-100'}">${i}</div>
                    <h4 class="font-bold text-sm text-slate-800">${lesson ? lesson.title : `Día ${i}`}</h4>
                </div>
                ${isPassed ? '<i class="fa-solid fa-circle-check text-emerald-500"></i>' : isReady ? '<i class="fa-solid fa-play text-emerald-500 text-xs"></i>' : '<i class="fa-solid fa-lock text-slate-300 text-xs"></i>'}
            </div>`;
    }
}

function openLesson(dayNum) {
    const lesson = currentChallenge.lessons.find(l => l.day === dayNum);
    currentLessonDay = dayNum;
    currentTab = 'teoria';
    document.getElementById('lesson-header-title').innerText = `Día ${dayNum}`;
    document.getElementById('lesson-header-sub').innerText = lesson.semanaLabel;
    renderLessonContent(lesson);
    showScreen('screen-lesson');
}

function renderLessonContent(lesson) {
    const replace = (str) => str.replace(/<DOG>/g, `<span class="brand-text">${dogName}</span>`);
    const container = document.getElementById('lesson-content');
    
    let html = `
        <div class="flex border-b border-slate-200 mb-6 sticky top-0 bg-[#f8fafc] z-10">
            <button onclick="switchTab('teoria')" class="flex-1 tab-btn ${currentTab === 'teoria' ? 'active' : ''}">TEORÍA</button>
            <button onclick="switchTab('practica')" class="flex-1 tab-btn ${currentTab === 'practica' ? 'active' : ''}">PRÁCTICA</button>
        </div>
    `;

    if (currentTab === 'teoria') {
        html += `
            <div class="text-center mb-2"><span class="text-[9px] font-black text-emerald-600 uppercase tracking-widest">Escuchar lección</span></div>
            
            <div class="blob-audio-container" id="audio-container">
                <div class="blob-shape"></div>
                <div class="audio-content">
                    <div id="audio-time">0:45</div>
                    <div onclick="toggleAudio(${lesson.teoria.audioSeconds})" class="play-trigger" id="audio-play-btn">
                        <i class="fa-solid fa-play"></i>
                    </div>
                </div>
            </div>

            <div class="space-y-4 mt-6">
                <h3 class="font-black text-slate-900 text-lg leading-tight text-center">${replace(lesson.teoria.intro)}</h3>
                <p class="text-slate-600 text-sm leading-relaxed text-center px-4">${replace(lesson.teoria.cuerpo)}</p>
                <div class="space-y-2 mt-4 px-2">
                    ${lesson.teoria.puntosClave.map(p => `<p class="text-[11px] font-bold text-slate-500 flex items-center gap-3 bg-white p-3 rounded-xl shadow-sm border border-slate-100"><i class="fa-solid fa-circle-check text-emerald-500"></i> ${replace(p)}</p>`).join('')}
                </div>
                
                <button onclick="switchTab('practica')" class="w-full bg-emerald-600 text-white font-black py-4 rounded-2xl mt-8 shadow-lg shadow-emerald-200 flex items-center justify-center gap-2 active:scale-95 transition-all">
                    ¡Entendido! Ver práctica <i class="fa-solid fa-arrow-right text-xs"></i>
                </button>
            </div>`;
    } else {
        html += `
            <div class="text-center mb-2"><span class="text-[9px] font-black text-slate-400 uppercase tracking-widest">Temporizador de Sesión</span></div>
            <div class="blob-audio-container" id="timer-container">
                <div class="blob-shape"></div>
                <div class="audio-content">
                    <div id="lesson-timer" style="font-size: 3.5rem; font-weight: 900; color: #064e3b; letter-spacing: -2px;">10:00</div>
                    <div onclick="toggleTimer(${lesson.practica.timerSeconds})" class="play-trigger" id="timer-play-btn">
                        <i class="fa-solid fa-play"></i>
                    </div>
                </div>
            </div>

            <div class="space-y-3 mt-6">
                <h3 class="font-black text-slate-900 text-sm mb-2 ml-1">Pasos a seguir:</h3>
                ${lesson.practica.pasos.map((p, i) => `
                    <div class="bg-white rounded-2xl border border-slate-100 p-4 flex gap-4 shadow-sm">
                        <div class="step-badge">${i+1}</div>
                        <div>
                            <h4 class="font-black text-slate-900 text-xs">${p.emoji} ${p.titulo}</h4>
                            <p class="text-[11px] text-slate-500 leading-relaxed mt-1">${replace(p.desc)}</p>
                        </div>
                    </div>`).join('')}
            </div>

            <div class="bg-amber-50 border-l-4 border-amber-400 p-5 rounded-r-3xl mt-8 shadow-sm">
                <span class="text-[9px] font-black uppercase text-amber-700 block mb-1">La clave de hoy</span>
                <p class="text-xs font-semibold italic text-amber-900 leading-tight">"${replace(lesson.resumen)}"</p>
            </div>

            <button onclick="openCompleteModal()" class="w-full bg-slate-900 text-white font-black py-4 rounded-2xl mt-8 shadow-xl active:scale-95 transition-all">COMPLETAR DÍA</button>
        `;
    }

    container.innerHTML = html;
}

function switchTab(tab) {
    currentTab = tab;
    clearInterval(audioInterval); clearInterval(timerInterval);
    audioInterval = null; timerInterval = null;
    const lesson = currentChallenge.lessons.find(l => l.day === currentLessonDay);
    renderLessonContent(lesson);
}

// LOGICA AUDIO BLOB
function toggleAudio(totalSeconds) {
    const btn = document.getElementById('audio-play-btn');
    const container = document.getElementById('audio-container');
    const timeDisplay = document.getElementById('audio-time');
    
    if (audioInterval) {
        clearInterval(audioInterval); audioInterval = null;
        btn.innerHTML = '<i class="fa-solid fa-play"></i>';
        container.classList.remove('audio-playing');
    } else {
        let time = totalSeconds;
        container.classList.add('audio-playing');
        btn.innerHTML = '<i class="fa-solid fa-pause"></i>';
        audioInterval = setInterval(() => {
            time--;
            let mins = Math.floor(time / 60);
            let secs = time % 60;
            timeDisplay.innerText = `${mins}:${secs.toString().padStart(2, '0')}`;
            if (time <= 0) { clearInterval(audioInterval); container.classList.remove('audio-playing'); btn.innerHTML = '<i class="fa-solid fa-rotate-right"></i>'; }
        }, 1000);
    }
}

// LOGICA TIMER BLOB
function toggleTimer(totalSeconds) {
    const btn = document.getElementById('timer-play-btn');
    const container = document.getElementById('timer-container');
    const display = document.getElementById('lesson-timer');
    if (timerInterval) {
        clearInterval(timerInterval); timerInterval = null;
        btn.innerHTML = '<i class="fa-solid fa-play"></i>';
        container.classList.remove('audio-playing');
    } else {
        let time = totalSeconds;
        container.classList.add('audio-playing');
        btn.innerHTML = '<i class="fa-solid fa-pause"></i>';
        timerInterval = setInterval(() => {
            time--;
            let mins = Math.floor(time / 60);
            let secs = time % 60;
            display.innerText = `${mins}:${secs.toString().padStart(2, '0')}`;
            if (time <= 0) { clearInterval(timerInterval); container.classList.remove('audio-playing'); }
        }, 1000);
    }
}

function openCompleteModal() { document.getElementById('modal-complete').classList.remove('hidden'); }
function closeModal() { document.getElementById('modal-complete').classList.add('hidden'); }

function saveDay(result) {
    if (!trackerData[currentChallenge.id]) trackerData[currentChallenge.id] = {};
    trackerData[currentChallenge.id][currentLessonDay] = { result, passed: true };
    localStorage.setItem(`eduDog_tracker_${dogName}`, JSON.stringify(trackerData));
    closeModal();
    showToast(`Día superado. ¡Buen trabajo!`);
    showScreen('screen-challenge');
    renderDays(); renderHub();
}

function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
}

function showToast(msg) {
    const t = document.getElementById('toast');
    document.getElementById('toast-msg').innerText = msg;
    t.classList.remove('-translate-y-24', 'opacity-0');
    t.classList.add('translate-y-0', 'opacity-100');
    setTimeout(() => { t.classList.add('-translate-y-24', 'opacity-0'); t.classList.remove('translate-y-0', 'opacity-100'); }, 3000);
}
</script>
</body>
</html>
