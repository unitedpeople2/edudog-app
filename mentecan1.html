<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mentecan Vital - Entrenamiento Premium</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap');

        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f1f5f9; color: #1e293b; -webkit-user-select: none; user-select: none; }

        .app-container {
            max-width: 420px; margin: 0 auto; height: 100vh;
            position: relative; background: #ffffff;
            overflow: hidden; display: flex; flex-direction: column;
            padding-bottom: 72px; /* Espacio para el pie de página fijo */
        }

        .screen {
            display: none; flex: 1; flex-direction: column;
            animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            overflow-y: auto; background-color: #f8fafc;
        }
        .screen.active { display: flex; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Estética Premium Mentecan Vital - Degradado Kira */
        .brand-gradient { 
            background: linear-gradient(160deg, #0f3041 0%, #124c5c 30%, #108560 60%, #10b981 100%); 
            position: relative; overflow: hidden; 
        }
        /* Formas degradadas suaves superpuestas - premium */
        .brand-gradient::before {
            content: ''; position: absolute; top: -30%; left: -40%; width: 100%; height: 100%;
            background: radial-gradient(circle, rgba(16, 185, 129, 0.5) 0%, rgba(16, 185, 129, 0) 70%);
            border-radius: 50%; z-index: 1; transform: scale(1.4);
        }
        .brand-gradient::after {
            content: ''; position: absolute; bottom: -30%; right: -40%; width: 100%; height: 100%;
            background: radial-gradient(circle, rgba(16, 185, 129, 0.4) 0%, rgba(16, 185, 129, 0) 70%);
            border-radius: 50%; z-index: 1; transform: scale(1.2);
        }

        /* Degradado de Encabezado y Pie de página */
        .header-gradient { background: linear-gradient(to right, #0f3041, #108560); }
        .footer-gradient { background: linear-gradient(135deg, #0f3041 0%, #108560 60%, #10b981 100%); }

        /* Pestañas */
        .tab-btn { padding-bottom: 0.75rem; border-bottom: 3px solid transparent; transition: all 0.3s; font-weight: 800; font-size: 0.75rem; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.05em; }
        .tab-btn.active { border-color: #10b981; color: #108560; }
        
        /* Ajuste de z-index para pestañas pegajosas - soluciona bug de superposición */
        .sticky-tabs { position: sticky; top: 0; background-color: #f8fafc; z-index: 30; shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05); }

        /* REPRODUCTOR Y TIMER (BLOB) */
        .blob-container {
            position: relative; width: 160px; height: 160px; /* Reducido para evitar superposición */
            margin: 15px auto; display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .blob-shape {
            position: absolute; inset: 0;
            background: rgba(16, 185, 129, 0.08);
            border: 1.5px solid rgba(16, 185, 129, 0.15);
            border-radius: 42% 58% 70% 30% / 45% 45% 55% 55%;
            transition: all 1s ease-in-out;
            z-index: 1;
        }
        .active-session .blob-shape {
            animation: breathe 4s ease-in-out infinite;
            background: rgba(16, 185, 129, 0.15);
            border-color: #10b981;
        }
        @keyframes breathe {
            0%, 100% { border-radius: 42% 58% 70% 30% / 45% 45% 55% 55%; transform: scale(1); }
            50% { border-radius: 58% 42% 38% 62% / 55% 55% 45% 45%; transform: scale(1.06); }
        }
        .counter-text { position: relative; z-index: 10; font-size: 2.5rem; font-weight: 900; color: #0f3041; letter-spacing: -1.5px; line-height: 1; }
        .action-trigger { position: relative; z-index: 10; margin-top: 8px; width: 45px; height: 45px; background: #108560; color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 8px 12px -2px rgba(16, 133, 96, 0.3); cursor: pointer; transition: all 0.2s; }
        .action-trigger:active { transform: scale(0.95); box-shadow: 0 4px 6px -1px rgba(16, 133, 96, 0.2); }

        /* Tags e Iconos */
        .tag { background: #f1f5f9; color: #475569; font-size: 10px; font-weight: 800; padding: 5px 12px; border-radius: 20px; text-transform: uppercase; display: flex; align-items: center; gap: 5px; border: 1px solid #e2e8f0; }
        .step-badge { width: 24px; height: 24px; border-radius: 50%; background: #108560; color: white; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 800; flex-shrink: 0; }
        
        /* Estados de los días */
        .day-item.failed { border-color: #fca5a5 !important; background: #fff1f2 !important; }
        .day-item.failed h4 { color: #b91c1c; }
        .day-item.failed .status-icon { color: #ef4444; }

        .modal-bg { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(5px); }
        
        /* Botón de pie de página - Navegación */
        .footer-nav-btn { width: 40px; height: 40px; background: rgba(255,255,255,0.15); border-radius: 12px; display: flex; align-items: center; justify-content: center; color: white; transition: all 0.2s; font-size: 0.85rem; }
        .footer-nav-btn:active { transform: scale(0.95); background: rgba(255,255,255,0.25); }
    </style>
</head>
<body>

<div id="toast" class="fixed top-6 left-1/2 -translate-x-1/2 bg-slate-900 text-white px-6 py-3 rounded-full shadow-2xl z-[100] transform -translate-y-24 opacity-0 transition-all duration-300 flex items-center gap-3 font-bold text-sm pointer-events-none">
    <i id="toast-icon" class="fa-solid fa-circle-check text-emerald-400"></i>
    <span id="toast-msg">Mensaje</span>
</div>

<div class="app-container md:rounded-[2rem] md:border-[10px] md:border-slate-900 shadow-2xl">

    <div id="app-header" class="header-gradient text-white px-6 py-4 flex items-center justify-center z-30 shrink-0 sticky top-0 shadow-md" style="display: none;">
        <div class="text-center">
            <h2 id="header-title" class="font-black text-sm tracking-tight">Mentecan Vital</h2>
            <p id="header-sub" class="text-[9px] font-black text-emerald-100 uppercase tracking-widest"></p>
        </div>
    </div>

    <section id="screen-hub" class="screen">
        <div class="sticky top-0 bg-white/80 backdrop-blur-md border-b border-slate-100 px-6 py-4 flex justify-between items-center z-30">
            <h2 class="font-black text-slate-900 text-lg flex items-center gap-2"><i class="fa-solid fa-paw text-emerald-600"></i> Mentecan Vital</h2>
            <div class="w-10 h-10 rounded-2xl bg-slate-100 flex items-center justify-center text-slate-400"><i class="fa-solid fa-shield-dog"></i></div>
        </div>
        <div class="px-6 py-6 space-y-6">
            <div class="brand-gradient rounded-[2rem] p-6 text-white shadow-xl relative overflow-hidden">
                <div class="relative z-10">
                    <p class="text-emerald-100 text-[9px] font-black uppercase tracking-widest mb-1.5 opacity-80">Entrenamiento activo</p>
                    <h3 class="text-2xl font-black tracking-tighter" id="hub-dog-name">Cargando...</h3>
                    
                    <div class="mt-4 mb-5 bg-white/10 p-5 rounded-3xl border border-white/10">
                        <p class="text-xs font-bold text-emerald-100 uppercase tracking-wide mb-1 opacity-70">¿Qué vamos a lograr?</p>
                        <p class="text-sm font-black leading-snug" id="hub-intro-text">Cargando logros del reto...</p>
                    </div>

                    <div class="bg-black/15 p-4 rounded-3xl border border-white/5">
                        <div class="flex justify-between text-[9px] font-black uppercase mb-1.5 tracking-wider"><span class="opacity-70">Progreso del reto</span><span id="hub-progress-text" class="text-emerald-100">0/7 días</span></div>
                        <div class="w-full bg-white/15 rounded-full h-2 overflow-hidden"><div id="hub-progress-bar" class="bg-white h-full transition-all duration-1000 shadow-inner" style="width:0%"></div></div>
                    </div>
                </div>
            </div>
            
            <div id="challenges-container" class="space-y-4"></div>
        </div>
    </section>

    <section id="screen-challenge" class="screen">
        <div id="days-container" class="px-6 py-6 space-y-3 pb-8"></div>
    </section>

    <section id="screen-lesson" class="screen">
        <div class="px-6 py-6" id="lesson-content"></div>
    </section>

    <footer id="app-footer" class="footer-gradient text-white px-6 py-4 flex items-center justify-between z-30 fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-[420px] shadow-lg md:rounded-b-[1.7rem]" style="display: none;">
        <button id="btn-header-back" onclick="goBack()" class="footer-nav-btn"><i class="fa-solid fa-chevron-left"></i></button>
        <div class="text-center">
            <h2 id="footer-title" class="font-black text-sm tracking-tight">Cargando Reto...</h2>
            <p id="footer-dog" class="text-[9px] font-black text-emerald-100 uppercase tracking-widest opacity-80"></p>
        </div>
        <button onclick="showScreen('screen-hub')" class="footer-nav-btn"><i class="fa-solid fa-house"></i></button>
    </footer>

    <div id="modal-complete" class="hidden absolute inset-0 z-50 modal-bg flex flex-col justify-end">
        <div class="bg-white rounded-t-[2.5rem] p-8 shadow-2xl">
            <div class="text-center mb-8"><div class="text-5xl mb-3">✨</div><h3 class="text-2xl font-black text-slate-900 tracking-tight">¿Cómo fue la sesión?</h3><p class="text-slate-400 text-sm font-medium mt-1">Tu honestidad garantiza un aprendizaje real.</p></div>
            <div class="space-y-3">
                <button onclick="saveDay('excelente')" class="w-full bg-emerald-50 text-emerald-800 p-5 rounded-3xl font-black text-sm border border-emerald-100 flex items-center justify-between active:scale-95 transition-all shadow-sm"><span><i class="fa-star mr-2 text-emerald-600"></i> ¡Excelente progreso!</span><i class="fa-solid fa-chevron-right opacity-30"></i></button>
                <button onclick="saveDay('bien')" class="w-full bg-amber-50 text-amber-800 p-5 rounded-3xl font-black text-sm border border-amber-100 flex items-center justify-between active:scale-95 transition-all shadow-sm"><span><i class="fa-thumbs-up mr-2 text-amber-500"></i> Estuvo bien</span><i class="fa-solid fa-chevron-right opacity-30"></i></button>
                <button onclick="saveDay('dificil')" class="w-full bg-rose-50 text-rose-800 p-5 rounded-3xl font-black text-sm border border-rose-100 flex items-center justify-between active:scale-95 transition-all shadow-sm"><span><i class="fa-triangle-exclamation mr-2 text-rose-600"></i> Difícil - Reintentar</span><i class="fa-solid fa-chevron-right opacity-30"></i></button>
                <button onclick="closeModal()" class="w-full text-slate-400 py-4 font-bold text-sm active:scale-95 transition-transform">Cancelar</button>
            </div>
        </div>
    </div>
</div>

<script>
// =============================================
// CONTENIDO COMPLETO — 7 DÍAS "NO MUERDA"
// =============================================
const CHALLENGES = [
    {
        id: 'no-muerda', name: 'No muerda las cosas', icon: '🦷', totalDays: 7, desc: 'Educa su boca y protege tu hogar',
        introAchieve: 'Transformaremos su instinto de morder en un comportamiento controlado y seguro, protegiendo tu hogar y mejorando tu comunicación.', // Introducción premium
        lessons: [
            { day: 1, title: 'El código secreto', semanaLabel: 'Fase 1: Diagnóstico', duracion: '10 min', nivel: 'Fácil', categoria: 'Psicología', icon: 'fa-magnifying-glass', teoria: { audioSeconds: 30, intro: "¿Por qué muerde todo? 🧠", cuerpo: "Tu peludo no es rebelde, es curioso. Al no tener manos, usa su boca para 'tocar' y descubrir el mundo.", puntosClave: ["Exploración: Su boca es su mano.", "Instinto: Morder alivia el estrés.", "Misión: Identifica sus texturas favoritas."] }, practica: { timerSeconds: 600, pasos: [{ titulo: 'Observa sin reaccionar', desc: 'Nota qué muerde <DOG> y en qué momento.', emoji: '🔍', icon: 'fa-magnifying-glass' }, { titulo: 'Anota el patrón', desc: '¿Es madera, plástico o tela?', emoji: '📝', icon: 'fa-pen-to-square' }, { titulo: 'Prepara el espacio', desc: 'Retira objetos de su zona por hoy.', emoji: '🏠', icon: 'fa-house-circle-check' }]}, tips: ["Hoy no digas NO, solo observa.", "Un perro cansado muerde un 70% menos."], error: { titulo: "Error típico", desc: "Corregir antes de entender el por qué." }, resumen: "Hoy el éxito es identificar el patrón." },
            { day: 2, title: 'El comando QUIETO', semanaLabel: 'Fase 2: Control', duracion: '15 min', nivel: 'Fácil', categoria: 'Obediencia', icon: 'fa-hand', teoria: { audioSeconds: 30, intro: "Fijando el límite visual ✋", cuerpo: "Hoy le enseñas a parar. Necesitas premios pequeños.", puntosClave: ["Señal: Mano abierta frente a su cara.", "Voz: Di 'QUIETO' una sola vez.", "Premio: Dale el snack si para 2 segundos."] }, practica: { timerSeconds: 900, pasos: [{ titulo: 'Mano de STOP', desc: 'Pon tu mano abierta entre él y el objeto.', emoji: '✋', icon: 'fa-hand' }, { titulo: 'Comando verbal', desc: 'Di QUIETO firme y calmado.', emoji: '🗣️', icon: 'fa-comment' }, { titulo: 'Refuerzo', desc: 'Premia si se aleja del objeto.', emoji: '🍖', icon: 'fa-bone' }]}, tips: ["El premio debe ser en menos de 2 segundos."], error: { titulo: "Error de repetición", desc: "Decir QUIETO diez veces." }, resumen: "Tu mano es la frontera." },
            { day: 3, title: 'Redirección al "SÍ"', semanaLabel: 'Fase 2: Control', duracion: '12 min', nivel: 'Medio', categoria: 'Sustitución', icon: 'fa-baseball', teoria: { audioSeconds: 30, intro: "Cambio por diversión 🎾", cuerpo: "Dale una alternativa que SÍ pueda morder.", puntosClave: ["Alternativa: Ten su juguete favorito.", "Intercambio: Quita el zapato y da el juguete.", "Fiesta: Celebra cuando muerda su juguete."] }, practica: { timerSeconds: 720, pasos: [{ titulo: 'La carnada', desc: 'Deja un objeto tentador cerca.', emoji: '👟', icon: 'fa-shoe-prints' }, { titulo: 'El cambio', desc: 'Di QUIETO y ofrece su juguete.', emoji: '🎾', icon: 'fa-baseball' }, { titulo: 'Refuerzo', desc: 'Premia si elige el juguete.', emoji: '🎉', icon: 'fa-gift' }]}, tips: ["Rota sus juguetes cada 2 días."], error: { titulo: "Error de frustración", desc: "Quitarle algo sin dar nada a cambio." }, resumen: "Morder es necesario, morder lo correcto es lo que enseñamos." },
            { day: 4, title: 'El juego del SUELTA', semanaLabel: 'Fase 3: Avanzado', duracion: '15 min', nivel: 'Medio', categoria: 'Seguridad', icon: 'fa-arrows-rotate', teoria: { audioSeconds: 30, intro: "Entregar el tesoro 🔄", cuerpo: "Evita que trague algo peligroso.", puntosClave: ["Confianza: Soltar trae premios.", "Comando: Di 'SUELTA' mientras ofreces algo mejor.", "Intercambio: Nunca luches por el objeto."] }, practica: { timerSeconds: 900, pasos: [{ titulo: 'Tironeo suave', desc: 'Juega a tirar de un juguete.', emoji: '🦴', icon: 'fa-dog' }, { titulo: 'Pide el suelta', desc: 'Muestra un premio y di SUELTA.', emoji: '🗣️', icon: 'fa-bullhorn' }, { titulo: 'Premia', desc: 'En cuanto abra la boca, da el premio.', emoji: '🍖', icon: 'fa-circle-check' }]}, tips: ["Si no suelta, quédate inmóvil."], error: { titulo: "Pelea de fuerza", desc: "Jalonear el objeto genera que apriete más." }, resumen: "Soltar es un acto de confianza." },
            { day: 5, title: 'Prueba de Distancia', semanaLabel: 'Fase 3: Avanzado', duracion: '10 min', nivel: 'Avanzado', categoria: 'Resistencia', icon: 'fa-ruler-horizontal', teoria: { audioSeconds: 30, intro: "Obediencia remota 📏", cuerpo: "Hoy comprobamos si te escucha de lejos.", puntosClave: ["Distancia: Aléjate 3 pasos de <DOG>.", "Foco: Mantén contacto visual firme.", "Voz: Proyecta el comando con seguridad."] }, practica: { timerSeconds: 600, pasos: [{ titulo: 'Posicionamiento', desc: 'Pide que se quede y aléjate.', emoji: '🚶', icon: 'fa-person-walking-arrow-right' }, { titulo: 'Tentación', desc: 'Lanza un objeto cerca de él.', emoji: '👟', icon: 'fa-binoculars' }, { titulo: 'Corrección', desc: 'Usa QUIETO si intenta ir.', emoji: '🏆', icon: 'fa-medal' }]}, tips: ["Aumenta la distancia centímetro a centímetro."], error: { titulo: "Error de velocidad", desc: "Alejarte demasiado rápido el primer intento." }, resumen: "Tu voz es la correa invisible." },
            { day: 6, title: 'Generalización', semanaLabel: 'Fase 4: Consolidación', duracion: '15 min', nivel: 'Avanzado', categoria: 'Entorno', icon: 'fa-house-signal', teoria: { audioSeconds: 30, intro: "La regla aplica a todo 🏠", cuerpo: "QUIETO aplica para zapatos, muebles y cables.", puntosClave: ["Variedad: Usa objetos nuevos.", "Entorno: Cambia de habitación.", "Consistencia: La regla no cambia."] }, practica: { timerSeconds: 900, pasos: [{ titulo: 'Circuito', desc: 'Pon 3 objetos prohibidos en el suelo.', emoji: '📦', icon: 'fa-boxes-stacked' }, { titulo: 'Caminata', desc: 'Camina entre los objetos con él.', emoji: '🐕', icon: 'fa-route' }, { titulo: 'Elección', desc: 'Premia si ignora los objetos solo.', emoji: '✅', icon: 'fa-circle-check' }]}, tips: ["Usa calcetines, suelen ser los más difíciles."], error: { titulo: "Mensajes mixtos", desc: "Dejar que muerda zapatos viejos." }, resumen: "Toda la casa es una zona de respeto." },
            { day: 7, title: 'Independencia Real', semanaLabel: 'Fase 4: Consolidación', duracion: '20 min', nivel: 'Avanzado', categoria: 'Éxito', icon: 'fa-trophy', teoria: { audioSeconds: 30, intro: "La prueba final 🏆", cuerpo: "¿Qué hace cuando no miras?", puntosClave: ["Privacidad: Déjalo solo 5 min.", "Retorno: Si todo está bien, fiesta épica.", "Hábito: El autocontrol es su nueva forma de ser."] }, practica: { timerSeconds: 1200, pasos: [{ titulo: 'Simulacro', desc: 'Sal del cuarto por 5 minutos.', emoji: '🚪', icon: 'fa-door-closed' }, { titulo: 'Regreso', desc: 'Si no mordió nada, dale su premio favorito.', emoji: '🍗', icon: 'fa-star' }, { titulo: 'Cierre', desc: 'Aumenta a 10 min. ¡Lo lograron!.', emoji: '🎓', icon: 'fa-graduation-cap' }]}, tips: ["El ejercicio previo reduce el instinto destructivo."], error: { titulo: "Castigo tardío", desc: "Regañarlo horas después de un mordisco no sirve." }, resumen: "Has transformado su impulsividad en autocontrol." }
        ]
    }
];

// =============================================
// LÓGICA CORE — MENTECAN VITAL
// =============================================
let dogName = localStorage.getItem('currentDogName') || 'Kira'; // Kira por defecto para la estética
let currentChallenge = null, currentLessonDay = null, currentTab = 'teoria';
let audioInterval = null, timerInterval = null;
let currentAudioTime = 0, currentTimerTime = 0;
let trackerData = JSON.parse(localStorage.getItem(`eduDog_tracker_${dogName}`)) || {};

document.addEventListener('DOMContentLoaded', () => { renderHub(); showScreen('screen-hub'); });

function renderHub() {
    document.getElementById('hub-dog-name').innerText = `${dogName} 🐾`;
    const container = document.getElementById('challenges-container');
    container.innerHTML = '';
    
    CHALLENGES.forEach(ch => {
        const chTracker = trackerData[ch.id] || {};
        const passedCount = Object.values(chTracker).filter(t => t.passed).length;
        const pct = Math.round((passedCount / ch.totalDays) * 100);
        
        // Actualizar introducción y progreso del primer reto (el principal)
        if(ch === CHALLENGES[0]) {
            document.getElementById('hub-intro-text').innerText = ch.introAchieve;
            document.getElementById('hub-progress-text').innerText = `${passedCount}/${ch.totalDays} días`;
            document.getElementById('hub-progress-bar').style.width = `${pct}%`;
        }

        container.innerHTML += `
            <div onclick="openChallenge('${ch.id}')" class="bg-white rounded-[2rem] p-5 shadow-sm active:scale-95 transition-all cursor-pointer flex items-center gap-4 border border-slate-100">
                <div class="w-14 h-14 footer-gradient rounded-3xl flex items-center justify-center text-2xl text-white shadow-lg shadow-emerald-100">${ch.icon}</div>
                <div class="flex-1">
                    <h4 class="font-black text-slate-800 text-sm leading-tight">${ch.name}</h4>
                    <p class="text-[9px] text-slate-400 font-bold tracking-tight uppercase mt-0.5 tracking-wider">${passedCount}/${ch.totalDays} Días completados</p>
                    <div class="w-full bg-slate-100 h-1.5 rounded-full mt-2 overflow-hidden shadow-inner"><div class="brand-gradient h-full transition-all duration-700 shadow" style="width:${pct}%"></div></div>
                </div>
                <i class="fa-solid fa-chevron-right text-slate-200"></i>
            </div>`;
    });
}

function openChallenge(id) {
    currentChallenge = CHALLENGES.find(c => c.id === id);
    renderDays();
    showScreen('screen-challenge');
}

function renderDays() {
    const container = document.getElementById('days-container');
    const chTracker = trackerData[currentChallenge.id] || {};
    container.innerHTML = '';
    
    let highestPassed = 0;
    Object.keys(chTracker).forEach(d => { if(chTracker[d].passed) highestPassed = Math.max(highestPassed, parseInt(d)); });

    for (let i = 1; i <= currentChallenge.totalDays; i++) {
        const lesson = currentChallenge.lessons.find(l => l.day === i);
        const track = chTracker[i];
        const isPassed = track && track.passed;
        const isFailed = track && !track.passed;
        const isReady = i === highestPassed + 1 || isFailed;
        const isLocked = !isPassed && !isReady;

        container.innerHTML += `
            <div onclick="${!isLocked ? `openLesson(${i})` : ''}" class="day-item bg-white rounded-3xl p-4 flex items-center gap-4 border-2 ${isPassed ? 'border-emerald-100 bg-emerald-50/20' : isFailed ? 'failed' : isLocked ? 'opacity-40 border-slate-50 cursor-not-allowed' : 'border-emerald-200 bg-emerald-50/40 cursor-pointer active:scale-95 transition-transform shadow-sm'}">
                <div class="w-10 h-10 rounded-2xl flex items-center justify-center font-black text-sm ${isPassed ? 'footer-gradient text-white' : isFailed ? 'bg-rose-500 text-white' : 'bg-white text-slate-400'} shadow-inner">${i}</div>
                <div class="flex-1">
                    <h4 class="font-black text-slate-800 text-xs">${lesson ? lesson.title : `Día ${i}`}</h4>
                    <p class="text-[8px] font-black text-slate-400 uppercase tracking-wider mt-0.5">${isPassed ? '¡Completado!' : isFailed ? 'Requiere reintento' : isLocked ? 'Bloqueado' : 'Entrenar ahora'}</p>
                </div>
                <i class="fa-solid ${lesson ? lesson.icon : 'fa-lock'} status-icon ${isPassed ? 'text-emerald-600' : isFailed ? 'text-rose-500' : 'text-slate-200'}"></i>
            </div>`;
    }
}

function openLesson(day) {
    currentLessonDay = day; 
    currentTab = 'teoria';
    currentAudioTime = 0; 
    currentTimerTime = 0;
    
    const lesson = currentChallenge.lessons.find(l => l.day === day);
    renderLessonContent(lesson);
    showScreen('screen-lesson');
}

function renderLessonContent(lesson) {
    const replace = (s) => s ? s.replace(/<DOG>/g, `<span class="font-black text-emerald-700">${dogName}</span>`) : '';
    const container = document.getElementById('lesson-content');
    const chTracker = trackerData[currentChallenge.id] || {};
    const isPassed = chTracker[currentLessonDay] && chTracker[currentLessonDay].passed;

    // Secciones de Teoría y Práctica
    let html = `
        <div class="flex border-b border-slate-100 mb-6 sticky-tabs pt-2 pb-2 shadow-sm rounded-t-3xl px-1">
            <button onclick="switchTab('teoria')" class="flex-1 tab-btn ${currentTab === 'teoria' ? 'active' : ''}">TEORÍA</button>
            <button onclick="switchTab('practica')" class="flex-1 tab-btn ${currentTab === 'practica' ? 'active' : ''}">PRÁCTICA</button>
        </div>
    `;

    if (currentTab === 'teoria') {
        let displayMins = Math.floor(lesson.teoria.audioSeconds / 60);
        let displaySecs = lesson.teoria.audioSeconds % 60;
        
        html += `
            <div class="blob-container" id="audio-container">
                <div class="blob-shape"></div>
                <div class="blob-content text-center">
                    <div id="audio-time" class="counter-text">${displayMins}:${displaySecs.toString().padStart(2, '0')}</div>
                    <div onclick="toggleAudio(${lesson.teoria.audioSeconds})" class="action-trigger mx-auto" id="audio-play-btn"><i class="fa-solid fa-play"></i></div>
                </div>
            </div>
            <div class="flex flex-wrap gap-2 justify-center mb-6">
                <span class="tag"><i class="fa-solid fa-clock text-emerald-600"></i> ${lesson.duracion}</span>
                <span class="tag"><i class="fa-solid fa-bolt text-rose-500"></i> ${lesson.nivel}</span>
                <span class="tag"><i class="fa-solid fa-bookmark text-blue-500"></i> ${lesson.categoria}</span>
            </div>
            <div class="space-y-4">
                <h3 class="font-black text-slate-900 text-xl tracking-tight leading-tight text-center">${replace(lesson.teoria.intro)}</h3>
                <p class="text-slate-500 text-sm leading-relaxed text-center px-2">${replace(lesson.teoria.cuerpo)}</p>
                <div class="space-y-2.5 mt-6">
                    ${lesson.teoria.puntosClave.map(p => `<p class="text-xs font-bold text-slate-700 flex items-center gap-3 bg-white p-4 rounded-2xl border border-slate-100 shadow-sm"><i class="fa-solid fa-circle-check text-emerald-600"></i> ${replace(p)}</p>`).join('')}
                </div>
                <button onclick="switchTab('practica')" class="w-full footer-gradient text-white font-black py-5 rounded-3xl mt-8 shadow-xl active:scale-95 transition-all flex items-center justify-center gap-3">¡Entendido! Ir a la práctica <i class="fa-solid fa-arrow-right text-xs"></i></button>
            </div>`;
    } else {
        let timerMins = Math.floor(lesson.practica.timerSeconds / 60);
        let timerSecs = lesson.practica.timerSeconds % 60;
        
        html += `
            <div class="text-center"><p class="text-[9px] font-black text-slate-400 uppercase tracking-wider mt-2">Temporizador de práctica activo</p></div>
            <div class="blob-container" id="timer-container">
                <div class="blob-shape"></div>
                <div class="blob-content text-center">
                    <div id="lesson-timer" class="counter-text">${timerMins}:${timerSecs.toString().padStart(2, '0')}</div>
                    <div onclick="toggleTimer(${lesson.practica.timerSeconds})" class="action-trigger mx-auto" id="timer-play-btn"><i class="fa-solid fa-play"></i></div>
                </div>
            </div>
            <div class="space-y-3.5">
                <h3 class="font-black text-slate-900 text-sm mb-2 ml-2 flex items-center gap-2"><i class="fa-solid fa-list-check text-emerald-600"></i> Pasos de hoy:</h3>
                ${lesson.practica.pasos.map((p, i) => `
                    <div class="bg-white rounded-3xl border border-slate-100 p-5 flex gap-4 shadow-sm">
                        <div class="step-badge">${i+1}</div>
                        <div>
                            <h4 class="font-black text-slate-900 text-xs flex items-center gap-2"><i class="fa-solid ${p.icon} text-emerald-600/30"></i> ${p.titulo}</h4>
                            <p class="text-[11px] text-slate-500 leading-relaxed mt-1">${replace(p.desc)}</p>
                        </div>
                    </div>`).join('')}
                
                <div class="mt-8 px-2 space-y-4 pt-4 border-t border-slate-100">
                    <h3 class="font-black text-slate-400 text-[10px] uppercase tracking-wider ml-1">Tips de Experto</h3>
                    <div class="space-y-2.5">
                        ${lesson.tips.map(t => `<div class="bg-emerald-50/50 border-l-4 border-emerald-400 p-4 rounded-r-2xl text-[11px] font-semibold text-emerald-800">${replace(t)}</div>`).join('')}
                    </div>
                    <div class="bg-rose-50 border-l-4 border-rose-400 p-4 rounded-r-2xl">
                        <h4 class="font-black text-rose-700 text-[10px] uppercase mb-1 tracking-wider">${lesson.error.titulo}</h4>
                        <p class="text-[11px] text-rose-600 font-medium">${replace(lesson.error.desc)}</p>
                    </div>
                </div>
            </div>
            <div class="bg-amber-50 border-l-4 border-amber-400 p-6 rounded-r-3xl mt-10 shadow-sm border border-amber-100">
                <span class="text-[9px] font-black uppercase text-amber-700 block mb-1.5 tracking-wider">La clave de hoy</span>
                <p class="text-xs font-bold italic text-amber-950 leading-snug">"${replace(lesson.resumen)}"</p>
            </div>
        `;
        if (isPassed) {
            html += `<button onclick="goBack()" class="w-full footer-gradient text-white font-black py-5 rounded-3xl mt-10 shadow-xl flex items-center justify-center gap-3 active:scale-95 transition-transform"><i class="fa-solid fa-rotate-left text-xs"></i> Volver al listado</button>`;
        } else {
            html += `<button onclick="openCompleteModal()" class="w-full bg-slate-900 text-white font-black py-5 rounded-3xl mt-10 shadow-2xl active:scale-95 transition-all tracking-tight">COMPLETAR DÍA</button>`;
        }
    }
    container.innerHTML = html + `<div class="h-10"></div>`;
}

function switchTab(tab) {
    currentTab = tab; 
    if(audioInterval) clearInterval(audioInterval); 
    if(timerInterval) clearInterval(timerInterval);
    audioInterval = null; timerInterval = null;
    currentAudioTime = 0; currentTimerTime = 0;
    
    renderLessonContent(currentChallenge.lessons.find(l => l.day === currentLessonDay));
    document.getElementById('screen-lesson').scrollTo(0, 0);
}

// Lógica de Audio y Timer (igual que antes)
function toggleAudio(total) {
    const btn = document.getElementById('audio-play-btn');
    const container = document.getElementById('audio-container');
    const display = document.getElementById('audio-time');
    
    if (audioInterval) { 
        clearInterval(audioInterval); audioInterval = null; btn.innerHTML = '<i class="fa-solid fa-play"></i>'; container.classList.remove('active-session'); 
    } else { 
        if (currentAudioTime === 0) currentAudioTime = total;
        container.classList.add('active-session'); btn.innerHTML = '<i class="fa-solid fa-pause"></i>'; 
        audioInterval = setInterval(() => { 
            currentAudioTime--; let mins = Math.floor(currentAudioTime / 60); let secs = currentAudioTime % 60; display.innerText = `${mins}:${secs.toString().padStart(2, '0')}`; 
            if (currentAudioTime <= 0) { clearInterval(audioInterval); audioInterval = null; currentAudioTime = 0; container.classList.remove('active-session'); btn.innerHTML = '<i class="fa-solid fa-rotate-right"></i>'; } 
        }, 1000); 
    }
}

function toggleTimer(total) {
    const btn = document.getElementById('timer-play-btn');
    const container = document.getElementById('timer-container');
    const display = document.getElementById('lesson-timer');
    
    if (timerInterval) { 
        clearInterval(timerInterval); timerInterval = null; btn.innerHTML = '<i class="fa-solid fa-play"></i>'; container.classList.remove('active-session'); 
    } else { 
        if (currentTimerTime === 0) currentTimerTime = total;
        container.classList.add('active-session'); btn.innerHTML = '<i class="fa-solid fa-pause"></i>'; 
        timerInterval = setInterval(() => { 
            currentTimerTime--; let mins = Math.floor(currentTimerTime / 60); let secs = currentTimerTime % 60; display.innerText = `${mins}:${secs.toString().padStart(2, '0')}`; 
            if (currentTimerTime <= 0) { clearInterval(timerInterval); timerInterval = null; currentTimerTime = 0; container.classList.remove('active-session'); btn.innerHTML = '<i class="fa-solid fa-rotate-right"></i>'; showToast("¡Sesión completada!"); } 
        }, 1000); 
    }
}

function showScreen(id) {
    // Cerrar intervalos al cambiar de pantalla
    if(audioInterval) clearInterval(audioInterval); if(timerInterval) clearInterval(timerInterval);
    audioInterval = null; timerInterval = null;

    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    document.getElementById(id).scrollTo(0, 0);

    // Actualizar encabezado y pie de página según pantalla
    const header = document.getElementById('app-header');
    const footer = document.getElementById('app-footer');
    
    header.style.display = (id === 'screen-hub') ? 'none' : 'flex';
    footer.style.display = (id === 'screen-hub') ? 'none' : 'flex'; // Footer siempre visible menos en el hub
    
    if (currentChallenge) {
        document.getElementById('header-title').innerText = currentChallenge.name; 
        document.getElementById('header-sub').innerText = (id === 'screen-lesson') ? `Día ${currentLessonDay}` : 'Plan de 7 días'; 
        
        // Actualizar pie de página
        document.getElementById('footer-title').innerText = currentChallenge.name; 
        document.getElementById('footer-dog').innerText = dogName; 
    }
}

// Navegación hacia atrás
function goBack() {
    const activeScreen = document.querySelector('.screen.active');
    if (activeScreen.id === 'screen-lesson') {
        showScreen('screen-challenge');
    } else if (activeScreen.id === 'screen-challenge') {
        showScreen('screen-hub');
    }
}

function openCompleteModal() { document.getElementById('modal-complete').classList.remove('hidden'); }
function closeModal() { document.getElementById('modal-complete').classList.add('hidden'); }

function saveDay(result) {
    const passed = result !== 'dificil';
    if (!trackerData[currentChallenge.id]) trackerData[currentChallenge.id] = {};
    trackerData[currentChallenge.id][currentLessonDay] = { result, passed };
    localStorage.setItem(`eduDog_tracker_${dogName}`, JSON.stringify(trackerData));
    
    closeModal();
    showToast(passed ? `¡Día superado!` : `Guardado para reintento`);
    
    renderHub(); renderDays(); showScreen('screen-challenge');
}

function showToast(msg) {
    const t = document.getElementById('toast'); 
    document.getElementById('toast-msg').innerText = msg;
    t.classList.remove('-translate-y-24', 'opacity-0'); 
    t.classList.add('translate-y-0', 'opacity-100');
    setTimeout(() => { t.classList.add('-translate-y-24', 'opacity-0'); t.classList.remove('translate-y-0', 'opacity-100'); }, 3000);
}
</script>
</body>
</html>
