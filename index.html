<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HR Digital - Ecosistema SaaS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; color: #0f172a; }
        
        .nav-link.active { color: #2563eb; border-bottom: 2px solid #2563eb; }
        .screen { display: none; min-height: calc(100vh - 64px); animation: fadeIn 0.4s ease-out; }
        .screen.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .product-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .product-card:hover { transform: translateY(-5px); box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1); }
    </style>
</head>
<body class="antialiased">

    <section id="screen-login" class="fixed inset-0 z-[100] bg-slate-50 flex items-center justify-center p-6">
        <div class="w-full max-w-md bg-white p-10 rounded-[2.5rem] shadow-2xl border border-slate-100 text-center">
            <div class="w-20 h-20 bg-blue-600 rounded-3xl flex items-center justify-center text-white text-4xl mx-auto mb-6 shadow-xl"><i class="fa-solid fa-globe"></i></div>
            <h1 class="text-3xl font-black text-slate-900 mb-2">HR Digital</h1>
            <p class="text-slate-500 font-bold mb-8 uppercase text-[10px] tracking-widest">Ingresa a tu ecosistema</p>
            
            <div class="space-y-4 text-left">
                <div>
                    <label class="text-[11px] font-black text-slate-400 uppercase tracking-widest ml-2">Correo</label>
                    <input type="email" id="login-email" placeholder="tu@correo.com" class="w-full bg-slate-50 border border-slate-200 rounded-2xl py-4 px-5 outline-none font-bold focus:border-blue-500 transition-all">
                </div>
                <div class="relative">
                    <label class="text-[11px] font-black text-slate-400 uppercase tracking-widest ml-2">PIN Secreto</label>
                    <input type="password" id="login-pin" maxlength="6" placeholder="••••••" class="w-full bg-slate-50 border border-slate-200 rounded-2xl py-4 px-5 outline-none font-black text-2xl tracking-[0.5em] focus:border-blue-500 transition-all">
                    <button onclick="togglePin()" class="absolute right-5 bottom-4 text-slate-400"><i id="pin-icon" class="fa-solid fa-eye"></i></button>
                </div>
                <button onclick="handleLogin()" class="w-full bg-slate-900 text-white font-black py-5 rounded-2xl shadow-xl active:scale-95 transition-all mt-4">Entrar al Ecosistema</button>
            </div>
        </div>
    </section>

    <div id="main-interface" class="hidden">
        <nav class="sticky top-0 z-50 bg-white/80 backdrop-blur-md border-b border-slate-200 h-16">
            <div class="max-w-7xl mx-auto px-6 h-full flex justify-between items-center">
                <div class="flex items-center gap-8">
                    <div class="flex items-center gap-2 font-black text-xl text-blue-600">
                        <i class="fa-solid fa-globe"></i> <span>HR Digital</span>
                    </div>
                    <div class="hidden md:flex gap-6 text-sm font-bold text-slate-500">
                        <button onclick="showScreen('catalog')" id="nav-catalog" class="nav-link py-5 px-2 active">Catálogo</button>
                        <button onclick="showScreen('dashboard')" id="nav-dashboard" class="nav-link py-5 px-2">Mis Herramientas</button>
                    </div>
                </div>
                <div class="flex items-center gap-4">
                    <div class="hidden md:block text-right">
                        <p id="user-name" class="text-xs font-black text-slate-900 leading-none"></p>
                        <p class="text-[9px] font-bold text-emerald-500 uppercase">Miembro VIP</p>
                    </div>
                    <button onclick="logout()" class="w-10 h-10 rounded-full bg-slate-100 flex items-center justify-center text-slate-600 hover:bg-rose-50 hover:text-rose-500 transition-all"><i class="fa-solid fa-right-from-bracket"></i></button>
                </div>
            </div>
        </nav>

        <main id="screen-catalog" class="screen active p-6 md:p-12 max-w-7xl mx-auto">
            <header class="mb-12">
                <h1 class="text-4xl font-black text-slate-900 tracking-tight">Catálogo de Soluciones 🚀</h1>
                <p class="text-slate-500 font-medium mt-2">Explora y desbloquea herramientas inteligentes para cada área de tu vida.</p>
            </header>
            <div id="grid-catalog" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                </div>
        </main>

        <main id="screen-dashboard" class="screen p-6 md:p-12 max-w-7xl mx-auto">
            <header class="mb-12">
                <h1 class="text-4xl font-black text-slate-900 tracking-tight">Mis Accesos 🛡️</h1>
                <p class="text-slate-500 font-medium mt-2">Herramientas listas para usar en tu cuenta.</p>
            </header>
            <div id="grid-owned" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                </div>
        </main>

        <main id="screen-product" class="screen p-6 md:p-12 max-w-5xl mx-auto">
            <button onclick="showScreen('catalog')" class="mb-8 font-bold text-slate-400 hover:text-blue-600 flex items-center gap-2"><i class="fa-solid fa-arrow-left"></i> Volver al Catálogo</button>
            <div id="product-detail-view" class="bg-white rounded-[3rem] p-8 md:p-12 shadow-2xl border border-slate-100 flex flex-col md:flex-row gap-12">
                </div>
        </main>
    </div>

    <script>
        // CONFIG FIREBASE
        const firebaseConfig = {
            apiKey: "AIzaSyCrbqdz-JMZNV0H0zcrHwfDOawE3_ouUNw",
            authDomain: "guias-facil-bot.firebaseapp.com",
            projectId: "guias-facil-bot",
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        let userData = null;

        // AUTH LOGIC
        async function handleLogin() {
            const email = document.getElementById('login-email').value.trim();
            const pin = document.getElementById('login-pin').value.trim();
            try {
                const doc = await db.collection('usuarios').doc(email).get();
                if (doc.exists && String(doc.data().pin) === pin) {
                    userData = doc.data();
                    localStorage.setItem('hrSess', JSON.stringify({email, pin}));
                    initUI();
                } else { alert("Credenciales incorrectas"); }
            } catch(e) { console.error(e); }
        }

        function initUI() {
            document.getElementById('screen-login').style.display = 'none';
            document.getElementById('main-interface').classList.remove('hidden');
            document.getElementById('user-name').innerText = userData.nombre;
            renderAll();
        }

        // NAVIGATION
        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(`screen-${id}`).classList.add('active');
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            const nav = document.getElementById(`nav-${id}`);
            if(nav) nav.classList.add('active');
            window.scrollTo(0,0);
        }

        // RENDER ENGINE
        async function renderAll() {
            const myIDs = [...(userData.apps_activas || []), ...(userData.ebooks_activos || [])];
            const snap = await db.collection('productos').where('activo', '==', true).get();
            
            let catHTML = ''; let ownedHTML = '';
            
            snap.forEach(doc => {
                const p = doc.data(); p.id = doc.id;
                const pKeys = [...(p.apps_a_desbloquear || []), ...(p.ebooks_a_desbloquear || [])];
                const has = pKeys.some(id => myIDs.includes(id));
                const color = p.nicho === 'edudog' ? 'bg-violet-600' : 'bg-blue-600';
                
                const card = `
                    <div class="product-card bg-white rounded-[2.5rem] p-8 border border-slate-100 shadow-sm flex flex-col">
                        <div class="w-14 h-14 ${color} rounded-2xl flex items-center justify-center text-white text-2xl mb-6 shadow-lg"><i class="fa-solid ${p.nicho==='edudog'?'fa-shield-dog':'fa-gem'}"></i></div>
                        <h3 class="text-xl font-black text-slate-900 leading-tight mb-2">${p.nombre_producto}</h3>
                        <p class="text-slate-400 text-[10px] font-black uppercase tracking-widest mb-6">${p.nicho}</p>
                        <button onclick="${has ? `window.location.href='${pKeys[0]}.html'` : `viewProduct('${p.id}')`}" class="mt-auto w-full ${has?'bg-slate-900':'bg-blue-50 text-blue-600 border border-blue-100'} text-white font-black py-4 rounded-2xl transition-all active:scale-95 flex items-center justify-center gap-2">
                            ${has ? 'Abrir Herramienta <i class="fa-solid fa-circle-play"></i>' : 'Ver Detalles <i class="fa-solid fa-lock text-xs opacity-50"></i>'}
                        </button>
                    </div>`;
                
                catHTML += card;
                if(has) ownedHTML += card;
            });
            
            document.getElementById('grid-catalog').innerHTML = catHTML;
            document.getElementById('grid-owned').innerHTML = ownedHTML || '<p class="col-span-full text-slate-400 font-bold text-center py-20">Aún no has desbloqueado herramientas.</p>';
        }

        async function viewProduct(id) {
            const doc = await db.collection('productos').doc(id).get();
            const p = doc.data();
            const color = p.nicho === 'edudog' ? 'text-violet-600' : 'text-blue-600';
            
            document.getElementById('product-detail-view').innerHTML = `
                <div class="flex-1">
                    <span class="bg-blue-100 text-blue-700 px-4 py-1.5 rounded-full text-[10px] font-black uppercase tracking-widest">Oferta Exclusiva</span>
                    <h2 class="text-5xl font-black text-slate-900 tracking-tighter mt-6 mb-4">${p.nombre_producto}</h2>
                    <div class="space-y-4 mb-10">
                        ${(p.texto_cierre_ventas || '').split('✅').filter(t=>t.trim()).map(t => `<p class="flex items-center gap-3 font-bold text-slate-600"><i class="fa-solid fa-circle-check text-emerald-500"></i> ${t.trim()}</p>`).join('')}
                    </div>
                    <div class="flex items-center gap-4">
                        <div class="text-4xl font-black text-slate-900">$${p.precio_oferta} <span class="text-sm text-slate-400 font-bold line-through ml-2">$99</span></div>
                        <button onclick="window.open('${p.link_hotmart}', '_blank')" class="bg-blue-600 text-white font-black px-10 py-5 rounded-[1.5rem] shadow-xl shadow-blue-600/30 active:scale-95 transition-all text-lg">Comprar Ahora</button>
                    </div>
                </div>
                <div class="hidden md:flex flex-1 items-center justify-center bg-slate-50 rounded-[2.5rem] border-2 border-dashed border-slate-200">
                    <div class="text-8xl ${color} opacity-20"><i class="fa-solid ${p.nicho==='edudog'?'fa-shield-dog':'fa-gem'}"></i></div>
                </div>`;
            showScreen('product');
        }

        function togglePin() { const i = document.getElementById('login-pin'); i.type = i.type==='password'?'text':'password'; }
        function logout() { localStorage.clear(); location.reload(); }

        document.addEventListener('DOMContentLoaded', () => {
            const s = localStorage.getItem('hrSess');
            if(s) { const c = JSON.parse(s); handleLoginManual(c.email, c.pin); }
        });

        async function handleLoginManual(email, pin) {
            const doc = await db.collection('usuarios').doc(email).get();
            if(doc.exists && String(doc.data().pin) === pin) { userData = doc.data(); initUI(); }
        }
    </script>
</body>
</html>
