<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lectura: Prompt SESIÓN #1 | HR Digital</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    
    <link href="https://cdn.jsdelivr.net/npm/dflip/css/dflip.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/dflip/css/themify-icons.min.css" rel="stylesheet">
    
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            height: 100%;
            background-color: #0f172a;
            overflow: hidden;
        }

        .glass-nav {
            height: 64px;
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 50;
        }

        /* Ocultar marca de agua y botón de más */
        .df-ui-btn.df-ui-logo,
        .df-ui-btn.df-ui-more { display: none !important; }

        /* El main ocupa TODO el espacio debajo del nav */
        #main-content {
            position: fixed;
            top: 64px;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #0f172a;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* El libro toma TODO el alto disponible */
        #libro_3d {
            height: 100% !important;
        }

        #libro_3d .df-container {
            height: 100% !important;
        }
    </style>
</head>
<body>

    <nav class="glass-nav">
        <a href="index.html" style="color:#94a3b8; text-decoration:none; display:flex; align-items:center; gap:8px; font-weight:700;">
            <i class="fa-solid fa-arrow-left"></i> <span>Volver a la Plataforma</span>
        </a>
        <h1 style="color:white; font-weight:800; letter-spacing:-0.5px;">Prompt SESIÓN #1</h1>
        <div style="width:180px;"></div>
    </nav>

    <div id="main-content">
        <div class="_df_book" 
             source="https://firebasestorage.googleapis.com/v0/b/guias-facil-bot.firebasestorage.app/o/productos%2FPrompt%20SESION%20%231.pdf?alt=media&token=a0e0f588-75c7-48bc-891f-a1f122d211f4" 
             id="libro_3d">
        </div>
    </div>

    <script>
        var dFlipLocation = "https://cdn.jsdelivr.net/npm/dflip/";

        // Calculamos las dimensiones basadas en el alto disponible
        // Proporción A4: 1 : 1.414 (ancho : alto)
        var navH = 64;
        var availH = window.innerHeight - navH;
        var idealWidth = Math.round(availH / 1.414);
        var bookWidth = Math.min(idealWidth, 860); // máximo 860px de ancho

        var df_options = {
            webgl: true,
            backgroundColor: "#0f172a",

            // Fuerza una sola página siempre
            singlePageMode: 1,

            // Dimensiones calculadas: el PDF llenará todo el alto
            height: availH,
            width: bookWidth,

            forceFit: true,
            autoEnableOutline: false,
            autoEnableThumbnail: false,
            maxTextureSize: 2048,
            duration: 800
        };
    </script>

    <script src="https://cdn.jsdelivr.net/npm/dflip/js/dflip.min.js"></script>

    <script>
        // Recalcular al redimensionar la ventana
        window.addEventListener('resize', function () {
            var navH = 64;
            var availH = window.innerHeight - navH;
            var idealWidth = Math.round(availH / 1.414);
            var bookWidth = Math.min(idealWidth, 860);

            var libro = document.getElementById('libro_3d');
            if (libro) {
                libro.style.height = availH + 'px';
                libro.style.width = bookWidth + 'px';
            }
        });
    </script>

</body>
</html>
