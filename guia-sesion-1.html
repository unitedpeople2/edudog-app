<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lectura: Prompt SESIÓN #1 | HR Digital</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    
    <link href="https://cdn.jsdelivr.net/npm/dflip/css/dflip.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/dflip/css/themify-icons.min.css" rel="stylesheet">
    
    <style>
        * { box-sizing: border-box; }
        body { background-color: #0f172a; margin: 0; overflow: hidden; }
        .glass-nav { 
            background: rgba(15, 23, 42, 0.9); 
            backdrop-filter: blur(10px); 
            border-bottom: 1px solid rgba(255, 255, 255, 0.1); 
        }

        /* Ocultar marca de agua y botón de "más" de la librería */
        .df-ui-btn.df-ui-logo,
        .df-ui-btn.df-ui-more { display: none !important; }

        /* Contenedor centrado con ancho máximo para forzar página única */
        #book-wrapper {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #0f172a;
        }

        /* Limitar ancho máximo del libro — clave para evitar doble página */
        #libro_3d {
            width: 100% !important;
            max-width: 780px !important;
            height: calc(100vh - 64px) !important;
            margin: 0 auto !important;
        }

        /* Asegurarse que el canvas interno también respete el ancho */
        #libro_3d .df-container,
        #libro_3d .df-book-wrap {
            max-width: 780px !important;
        }
    </style>
</head>
<body class="antialiased flex flex-col h-screen">

    <nav class="h-16 glass-nav flex items-center justify-between px-6 shrink-0 z-50">
        <a href="index.html" class="text-slate-400 hover:text-white font-bold flex items-center gap-2 transition-all">
            <i class="fa-solid fa-arrow-left"></i> <span class="hidden sm:inline">Volver a la Plataforma</span>
        </a>
        <h1 class="text-white font-extrabold tracking-tight">Prompt SESIÓN #1</h1>
        <div class="w-10 sm:w-48"></div>
    </nav>

    <main class="flex-1 w-full bg-slate-900 relative overflow-hidden">
        <div id="book-wrapper">
            <div class="_df_book" 
                 source="https://firebasestorage.googleapis.com/v0/b/guias-facil-bot.firebasestorage.app/o/productos%2FPrompt%20SESION%20%231.pdf?alt=media&token=a0e0f588-75c7-48bc-891f-a1f122d211f4" 
                 id="libro_3d">
            </div>
        </div>
    </main>

    <!-- CONFIGURACIÓN GLOBAL: DEBE IR ANTES DEL SCRIPT DE DFLIP -->
    <script>
        var dFlipLocation = "https://cdn.jsdelivr.net/npm/dflip/";
        var df_options = {
            webgl: true,
            backgroundColor: "#0f172a",

            // Fuerza UNA sola página visible siempre
            singlePageMode: 1,

            // Evita que la librería decida automáticamente mostrar doble página
            autoEnableOutline: false,
            autoEnableThumbnail: false,

            // Ajusta el PDF al contenedor disponible
            forceFit: true,
            maxTextureSize: 1600,

            duration: 800,

            // Altura explícita: toma la pantalla menos la navbar (64px)
            height: window.innerHeight - 64,

            // Ancho máximo explícito — CRÍTICO para bloquear modo doble página
            maxWidth: 780
        };
    </script>

    <!-- SCRIPT DE DFLIP -->
    <script src="https://cdn.jsdelivr.net/npm/dflip/js/dflip.min.js"></script>

    <script>
        // Reajustar altura si el usuario redimensiona la ventana
        window.addEventListener('resize', function () {
            var libro = document.getElementById('libro_3d');
            if (libro) {
                libro.style.height = (window.innerHeight - 64) + 'px';
            }
        });
    </script>

</body>
</html>
