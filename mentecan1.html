<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mentecan Vital - Entrenamiento Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');

        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; color: #0f172a; }

        .app-container {
            max-width: 420px; margin: 0 auto; height: 100dvh;
            position: relative; background: #ffffff;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.15);
            overflow: hidden; display: flex; flex-direction: column;
        }

        .screen {
            display: none; flex: 1; flex-direction: column;
            animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            overflow-y: auto; background-color: #f8fafc;
        }
        .screen.active { display: flex; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Estética Premium: Verde Protagonista y Negro */
        .brand-gradient { background: linear-gradient(135deg, #059669 0%, #10b981 100%); }
        .header-gradient { background: linear-gradient(135deg, #000000 0%, #064e3b 100%); }
        
        .tab-btn { flex: 1; padding: 1rem 0; font-weight: 800; font-size: 0.7rem; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.1em; position: relative; }
        .tab-btn.active { color: #059669; }
        .tab-indicator { position: absolute; bottom: 0; height: 3px; background: #10b981; transition: all 0.3s ease; border-radius: 3px 3px 0 0; }

        /* Círculo de Tiempo (Modo Negro) */
        .blob-container {
            position: relative; width: 190px; height: 190px;
            margin: 20px auto; display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .blob-shape {
            position: absolute; inset: 0;
            background: #000000;
            border: 3px solid #10b981;
            border-radius: 50%;
            z-index: 1;
            box-shadow: 0 10px 25px rgba(16, 185, 129, 0.15);
        }
        .counter-text { position: relative; z-index: 10; font-size: 3rem; font-weight: 900; color: #ffffff; letter-spacing: -2px; }
        .action-trigger { position: relative; z-index: 10; margin-top: 5px; width: 45px; height: 45px; background: #10b981; color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; border: 3px solid #000; }

        .premium-card { background: white; border: 1px solid #f1f5f9; border-radius: 1.8rem; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.02); }
        .tag-premium { background: #000; color: #10b981; font-size: 9px; font-weight: 800; padding: 4px 10px; border-radius: 10px; text-transform: uppercase; border: 1px solid #10b981; }

        .nav-footer { background: #ffffff; border-top: 1px solid #f1f5f9; padding: 1rem 1.5rem; display: flex; gap: 10px; position: sticky; bottom: 0; z-index: 40; }
        .modal-bg { background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(6px); }
    </style>
</head>
<body>

<div id="toast" class="fixed top-6 left-1/2 -translate-x-1/2 bg-slate-900 text-white px-6 py-3 rounded-full shadow-2xl z-[100] transform -translate-y-24 opacity-0 transition-all duration-300 flex items-center gap-3 font-bold text-sm pointer-events-none">
    <i id="toast-icon" class="fa-solid fa-circle-check text-emerald-400"></i>
    <span id="toast-msg">Mensaje</span>
</div>

<div class="app-container md:rounded-[2.5rem] md:border-[10px] md:border-slate-900">

    <div id="app-header" class="header-gradient text-white px-5 py-4 flex items-center justify-between z-30 shrink-0 sticky top-0 shadow-lg" style="display: none;">
        <div class="flex items-center gap-3">
            <button onclick="goBack()" class="w-9 h-9 bg-white/10 rounded-xl flex items-center justify-center border border-white/5 active:scale-90 transition-all"><i class="fa-solid fa-arrow-left text-sm"></i></button>
            <div>
                <h2 id="header-title" class="font-black text-xs tracking-tight">Mentecan Vital</h2>
                <p id="header-sub" class="text-[8px] font-bold text-emerald-400 uppercase tracking-widest"></p>
            </div>
        </div>
        <button onclick="showScreen('screen-hub')" class="w-9 h-9 bg-white/10 rounded-full flex items-center justify-center text-white border border-white/5"><i class="fa-solid fa-house text-xs"></i></button>
    </div>

    <section id="screen-hub" class="screen">
        <div class="sticky top-0 bg-white/90 backdrop-blur-md border-b border-slate-100 px-6 py-4 flex justify-between items-center z-30">
            <h2 class="font-black text-slate-800 text-lg tracking-tighter"><i class="fa-solid fa-paw text-emerald-600 mr-1"></i> Hub de Entrenamiento</h2>
            <div class="w-9 h-9 rounded-xl bg-slate-100 flex items-center justify-center text-slate-400"><i class="fa-solid fa-shield-dog"></i></div>
        </div>
        <div class="px-5 py-6 space-y-6">
            <div class="header-gradient rounded-[2.2rem] p-6 text-white shadow-xl relative overflow-hidden">
                <div class="relative z-10">
                    <p class="text-emerald-400 text-[9px] font-black uppercase tracking-widest mb-1">Tu progreso total</p>
                    <h3 class="text-xl font-black tracking-tight" id="hub-dog-name">...</h3>
                    <div class="mt-5 bg-white/5 p-4 rounded-[1.5rem] border border-white/10">
                        <div class="flex justify-between text-[9px] font-black uppercase mb-2"><span>Días Superados</span><span id="hub-progress-text">0 días</span></div>
                        <div class="w-full bg-white/10 rounded-full h-2 overflow-hidden"><div id="hub-progress-bar" class="bg-emerald-400 h-full transition-all duration-1000" style="width:0%"></div></div>
                    </div>
                </div>
            </div>
            <div id="challenges-container" class="space-y-3"></div>
        </div>
    </section>

    <section id="screen-challenge" class="screen">
        <div class="px-5 py-6 space-y-3" id="days-container"></div>
    </section>

    <section id="screen-lesson" class="screen">
        <div class="flex-1 overflow-y-auto px-5 py-5" id="lesson-content"></div>
        <div class="nav-footer">
            <button onclick="goBack()" class="w-1/3 bg-slate-100 text-slate-500 h-13 rounded-2xl font-bold text-xs active:scale-95 flex items-center justify-center gap-2"><i class="fa-solid fa-chevron-left"></i> Volver</button>
            <div id="lesson-action-container" class="w-2/3"></div>
        </div>
    </section>

    <div id="modal-complete" class="hidden absolute inset-0 z-50 modal-bg flex flex-col justify-end">
        <div class="bg-white rounded-t-[2.5rem] p-8 shadow-2xl">
            <div class="text-center mb-6"><div class="text-4xl mb-3">✨</div><h3 class="text-xl font-black text-slate-900">¿Cómo fue la sesión?</h3></div>
            <div class="space-y-3">
                <button onclick="saveDay('excelente')" class="w-full bg-emerald-50 text-emerald-700 p-4 rounded-2xl font-black text-xs border border-emerald-100 flex items-center justify-between"><span><i class="fa-solid fa-star mr-2 text-emerald-500"></i> ¡Excelente progreso!</span><i class="fa-solid fa-chevron-right"></i></button>
                <button onclick="saveDay('bien')" class="w-full bg-amber-50 text-amber-700 p-4 rounded-2xl font-black text-xs border border-amber-100 flex items-center justify-between"><span><i class="fa-solid fa-thumbs-up mr-2 text-amber-500"></i> Estuvo bien</span><i class="fa-solid fa-chevron-right"></i></button>
                <button onclick="saveDay('dificil')" class="w-full bg-rose-50 text-rose-700 p-4 rounded-2xl font-black text-xs border border-rose-100 flex items-center justify-between"><span><i class="fa-solid fa-triangle-exclamation mr-2 text-rose-500"></i> Requiere reintento</span><i class="fa-solid fa-chevron-right"></i></button>
                <button onclick="closeModal()" class="w-full text-slate-400 py-3 font-bold text-xs">Cancelar</button>
            </div>
        </div>
    </div>
</div>

<script>
// CONFIGURACIÓN Y CONTENIDO
let dogName = localStorage.getItem('currentDogName') || 'tu peludo';
let currentScreen = 'screen-hub';
let currentChallenge = null, currentLessonDay = null, currentTab = 'teoria', audioInterval = null, timerInterval = null;
let trackerData = JSON.parse(localStorage.getItem(`eduDog_tracker_${dogName}`)) || {};

const CHALLENGES = [
    {
        id: 'no-muerda', name: 'No muerda las cosas', icon: '🦷', totalDays: 7, desc: 'Protege tu hogar educando su boca',
        lessons: [
            { day: 1, title: 'El código secreto', semanaLabel: 'Fase 1: Diagnóstico', duracion: '10 min', nivel: 'Fácil', categoria: 'Psicología', icon: 'fa-magnifying-glass', teoria: { audioSeconds: 25, intro: "¿Por qué muerde todo? 🧠", cuerpo: "Tu peludo usa su boca para explorar. No es rebeldía, es curiosidad.", puntosClave: ["Exploración: Su boca es su mano.", "Instinto: Morder calma su estrés.", "Misión: Identifica sus texturas favoritas."] }, practica: { timerSeconds: 600, pasos: [{ titulo: 'Observa', desc: 'Nota qué muerde <DOG> y en qué momento.', emoji: '🔍', icon: 'fa-magnifying-glass' }, { titulo: 'Anota el patrón', desc: '¿Es madera, plástico o tela?', emoji: '📝', icon: 'fa-pen-to-square' }] }, tips: ["Hoy no digas NO, solo observa."], error: { titulo: "Error", desc: "Corregir antes de diagnosticar." } },
            { day: 2, title: 'El comando QUIETO', semanaLabel: 'Fase 2: Control', duracion: '15 min', nivel: 'Fácil', categoria: 'Obediencia', icon: 'fa-hand', teoria: { audioSeconds: 30, intro: "Fijando el límite ✋", cuerpo: "La mano abierta es la señal universal de STOP.", puntosClave: ["Señal: Mano abierta.", "Voz: Di QUIETO una vez.", "Premio: Si para 2 segundos, premia."] }, practica: { timerSeconds: 900, pasos: [{ titulo: 'Mano de STOP', desc: 'Pon tu mano frente al objeto.', emoji: '✋', icon: 'fa-hand' }] }, tips: ["El premio debe ser inmediato."], error: { titulo: "Error", desc: "Repetir el comando 10 veces." } },
            // Los días del 3 al 7 se generan con estructura similar...
        ]
    },
    // PLACEHOLDERS PARA LOS DEMÁS RETOS
    { id: 'bano', name: 'Baño perfecto', icon: '🚽', totalDays: 7, desc: 'Hábito de limpieza en casa', lessons: [] },
    { id: 'no-ladre', name: 'No más ladridos', icon: '🔇', totalDays: 7, desc: 'Calma y silencio controlado', lessons: [] },
    { id: 'pelota', name: 'Trae la pelota', icon: '🎾', totalDays: 7, desc: 'Juego de búsqueda y entrega', lessons: [] },
    { id: 'comandos', name: 'Comandos básicos', icon: '🐾', totalDays: 7, desc: 'Sentado, echado y quieto', lessons: [] }
];

// LÓGICA DE INTERFAZ
document.addEventListener('DOMContentLoaded', () => { renderHub(); showScreen('screen-hub'); });

function renderHub() {
    document.getElementById('hub-dog-name').innerText = `${dogName} 🐾`;
    const container = document.getElementById('challenges-container');
    container.innerHTML = '';
    CHALLENGES.forEach(ch => {
        const chTracker = trackerData[ch.id] || {};
        const passedCount = Object.values(chTracker).filter(t => t.passed).length;
        const pct = Math.round((passedCount / ch.totalDays) * 100);
        container.innerHTML += `
            <div onclick="openChallenge('${ch.id}')" class="premium-card p-4 active:scale-95 transition-all cursor-pointer flex items-center gap-4">
                <div class="w-12 h-12 header-gradient rounded-2xl flex items-center justify-center text-xl text-white shadow-lg">${ch.icon}</div>
                <div class="flex-1">
                    <h4 class="font-black text-slate-800 text-sm tracking-tight">${ch.name}</h4>
                    <p class="text-[9px] text-slate-400 font-bold uppercase mt-0.5">${passedCount}/${ch.totalDays} Días</p>
                    <div class="w-full bg-slate-100 h-1.5 rounded-full mt-2 overflow-hidden"><div class="brand-gradient h-full transition-all duration-700" style="width:${pct}%"></div></div>
                </div>
                <i class="fa-solid fa-chevron-right text-slate-200 text-xs"></i>
            </div>`;
    });
}

function openChallenge(id) {
    currentChallenge = CHALLENGES.find(c => c.id === id);
    renderDays();
    showScreen('screen-challenge');
}

function renderDays() {
    const container = document.getElementById('days-container');
    const chTracker = trackerData[currentChallenge.id] || {};
    container.innerHTML = `<h3 class="font-black text-slate-800 text-sm mb-2 px-1">Reto: ${currentChallenge.name}</h3>`;
    
    let highestPassed = 0;
    Object.keys(chTracker).forEach(d => { if(chTracker[d].passed) highestPassed = Math.max(highestPassed, parseInt(d)); });

    for (let i = 1; i <= currentChallenge.totalDays; i++) {
        const track = chTracker[i];
        const isPassed = track && track.passed;
        const isFailed = track && !track.passed;
        const isReady = i === highestPassed + 1 || isFailed;
        const isLocked = !isPassed && !isReady;

        container.innerHTML += `
            <div onclick="${!isLocked ? `openLesson(${i})` : ''}" class="premium-card p-4 flex items-center gap-4 border-2 ${isPassed ? 'border-emerald-100 bg-emerald-50/20' : isFailed ? 'border-rose-100 bg-rose-50/20' : isLocked ? 'opacity-40 grayscale' : 'border-emerald-500/20'}">
                <div class="w-9 h-9 rounded-xl flex items-center justify-center font-black text-xs ${isPassed ? 'header-gradient text-white' : isFailed ? 'bg-rose-500 text-white' : 'bg-slate-100 text-slate-400'}">${i}</div>
                <div class="flex-1">
                    <h4 class="font-black text-slate-800 text-xs">${currentChallenge.id === 'no-muerda' && currentChallenge.lessons[i-1] ? currentChallenge.lessons[i-1].title : `Sesión Día ${i}`}</h4>
                    <p class="text-[9px] font-bold text-slate-400 uppercase tracking-widest mt-0.5">${isPassed ? 'Completado' : isFailed ? 'Reintentar' : isLocked ? 'Bloqueado' : 'Entrenar ahora'}</p>
                </div>
                <i class="fa-solid ${isLocked ? 'fa-lock' : 'fa-play'} ${isPassed ? 'text-emerald-500' : 'text-slate-200'} text-xs"></i>
            </div>`;
    }
}

function openLesson(day) {
    currentLessonDay = day; currentTab = 'teoria';
    renderLessonContent();
    showScreen('screen-lesson');
}

function renderLessonContent() {
    // Si no hay contenido real (placeholder), mostramos estructura base
    let lesson = currentChallenge.lessons && currentChallenge.lessons[currentLessonDay-1] ? currentChallenge.lessons[currentLessonDay-1] : { 
        title: `Día ${currentLessonDay}`, duracion: '15 min', nivel: 'Medio',
        teoria: { audioSeconds: 30, intro: "Entrenamiento en progreso", cuerpo: "Esta lección se desbloqueará con el contenido específico de tu guía.", puntosClave: ["Paciencia", "Repetición", "Vínculo"] },
        practica: { timerSeconds: 600, pasos: [{ titulo: "Inicia el cronómetro", desc: "Realiza las repeticiones que indica tu manual." }] }
    };

    const replace = (s) => s.replace(/<DOG>/g, `<span class="font-black text-emerald-600">${dogName}</span>`);
    const container = document.getElementById('lesson-content');
    const actionContainer = document.getElementById('lesson-action-container');

    let html = `
        <div class="flex border-b border-slate-100 mb-6 sticky top-0 bg-[#f8fafc] z-10">
            <button onclick="switchTab('teoria')" class="tab-btn ${currentTab === 'teoria' ? 'active' : ''}">Fundamentos</button>
            <button onclick="switchTab('practica')" class="tab-btn ${currentTab === 'practica' ? 'active' : ''}">Práctica</button>
            <div class="tab-indicator" style="width: 50%; left: ${currentTab === 'teoria' ? '0%' : '50%'}"></div>
        </div>
    `;

    if (currentTab === 'teoria') {
        html += `
            <div class="blob-container" id="audio-container">
                <div class="blob-shape"></div>
                <div class="blob-content">
                    <div id="audio-time" class="counter-text">0:${lesson.teoria.audioSeconds}</div>
                    <div onclick="toggleAudio(${lesson.teoria.audioSeconds})" class="action-trigger" id="audio-play-btn"><i class="fa-solid fa-play"></i></div>
                </div>
            </div>
            <div class="flex justify-center gap-2 mb-6">
                <span class="tag-premium">${lesson.duracion}</span>
                <span class="tag-premium">${lesson.nivel}</span>
            </div>
            <div class="space-y-4">
                <h3 class="font-black text-slate-900 text-lg text-center">${replace(lesson.teoria.intro)}</h3>
                <p class="text-slate-500 text-xs leading-relaxed text-center px-2">${replace(lesson.teoria.cuerpo)}</p>
                <div class="space-y-2 mt-6">
                    ${lesson.teoria.puntosClave.map(p => `<p class="text-[10px] font-bold text-slate-600 flex items-center gap-3 bg-white p-4 rounded-2xl border border-slate-100"><i class="fa-solid fa-check text-emerald-500"></i> ${replace(p)}</p>`).join('')}
                </div>
            </div>`;
        actionContainer.innerHTML = `<button onclick="switchTab('practica')" class="w-full brand-gradient text-white font-black h-13 rounded-2xl shadow-lg flex items-center justify-center gap-2">Ir a Práctica <i class="fa-solid fa-arrow-right text-[10px]"></i></button>`;
    } else {
        html += `
            <div class="blob-container" id="timer-container">
                <div class="blob-shape"></div>
                <div class="blob-content">
                    <div id="lesson-timer" class="counter-text">${Math.floor(lesson.practica.timerSeconds/60)}:00</div>
                    <div onclick="toggleTimer(${lesson.practica.timerSeconds})" class="action-trigger" id="timer-play-btn"><i class="fa-solid fa-play"></i></div>
                </div>
            </div>
            <div class="space-y-3">
                ${lesson.practica.pasos.map((p, i) => `
                    <div class="premium-card p-4 flex gap-4">
                        <div class="w-7 h-7 bg-emerald-600 text-white rounded-lg flex items-center justify-center font-black text-xs shrink-0">${i+1}</div>
                        <div>
                            <h4 class="font-black text-slate-900 text-xs">${p.titulo}</h4>
                            <p class="text-[10px] text-slate-500 leading-relaxed mt-1">${replace(p.desc)}</p>
                        </div>
                    </div>`).join('')}
            </div>`;
        actionContainer.innerHTML = `<button onclick="openCompleteModal()" class="w-full bg-slate-900 text-white font-black h-13 rounded-2xl shadow-xl">Completar Sesión</button>`;
    }
    container.innerHTML = html;
}

// FUNCIONES DE CONTROL
function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.toggle('active', s.id === id));
    document.getElementById('app-header').style.display = (id === 'screen-hub') ? 'none' : 'flex';
    currentScreen = id;
    if (currentChallenge) {
        document.getElementById('header-title').innerText = currentChallenge.name;
        document.getElementById('header-sub').innerText = (id === 'screen-lesson') ? `Día ${currentLessonDay}` : 'Plan Premium';
    }
}

function goBack() {
    if (currentScreen === 'screen-lesson') showScreen('screen-challenge');
    else if (currentScreen === 'screen-challenge') showScreen('screen-hub');
}

function switchTab(tab) { currentTab = tab; renderLessonContent(); }

function toggleAudio(total) { /* Lógica de cronómetro de audio */ }
function toggleTimer(total) { /* Lógica de cronómetro de práctica */ }

function openCompleteModal() { document.getElementById('modal-complete').classList.remove('hidden'); }
function closeModal() { document.getElementById('modal-complete').classList.add('hidden'); }

function saveDay(result) {
    const passed = result !== 'dificil';
    if (!trackerData[currentChallenge.id]) trackerData[currentChallenge.id] = {};
    trackerData[currentChallenge.id][currentLessonDay] = { result, passed };
    localStorage.setItem(`eduDog_tracker_${dogName}`, JSON.stringify(trackerData));
    closeModal();
    showToast(passed ? `¡Día superado!` : `Guardado para reintento`);
    renderHub(); renderDays(); showScreen('screen-challenge');
}

function showToast(msg) {
    const t = document.getElementById('toast'); document.getElementById('toast-msg').innerText = msg;
    t.classList.remove('-translate-y-24', 'opacity-0'); t.classList.add('translate-y-0', 'opacity-100');
    setTimeout(() => { t.classList.add('-translate-y-24', 'opacity-0'); t.classList.remove('translate-y-0', 'opacity-100'); }, 3000);
}
</script>
</body>
</html>
