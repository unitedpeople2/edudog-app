<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lectura: Prompt SESIÓN #1 | HR Digital</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    
    <!-- jQuery (OBLIGATORIO Y PRIMERO) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    
    <!-- Enlaces de dFlip -->
    <link href="https://cdn.jsdelivr.net/npm/dflip/css/dflip.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/dflip/css/themify-icons.min.css" rel="stylesheet">
    
    <style>
        body { background-color: #0f172a; margin: 0; overflow: hidden; }
        .glass-nav { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255, 255, 255, 0.1); }
        .df-ui-btn.df-ui-logo, .df-ui-btn.df-ui-more { display: none !important; }
        
        /* Le damos el tamaño exacto al contenedor para evitar errores */
        #flipbookContainer { width: 100%; height: calc(100vh - 64px); }
    </style>
</head>
<body class="antialiased flex flex-col h-screen">

    <nav class="h-16 glass-nav flex items-center justify-between px-6 shrink-0 z-50">
        <a href="index.html" class="text-slate-400 hover:text-white font-bold flex items-center gap-2 transition-all">
            <i class="fa-solid fa-arrow-left"></i> <span class="hidden sm:inline">Volver a la Plataforma</span>
        </a>
        <h1 class="text-white font-extrabold tracking-tight">Prompt SESIÓN #1</h1>
        <div class="w-10 sm:w-48"></div>
    </nav>

    <main class="flex-1 w-full bg-slate-900 relative">
        <!-- Fíjate que le quité la clase "_df_book". Ahora es solo un div normal. -->
        <div id="flipbookContainer"></div>
    </main>

    <!-- SCRIPT DE DFLIP -->
    <script src="https://cdn.jsdelivr.net/npm/dflip/js/dflip.min.js"></script>

    <script>
        var dFlipLocation = "https://cdn.jsdelivr.net/npm/dflip/";

        $(document).ready(function() {
            // Aquí le pasamos las reglas ESTRICTAS a la librería
            var opcionesEstrictas = {
                webgl: true,
                backgroundColor: "#0f172a", // Vuelve el fondo oscuro
                singlePageMode: 1,          // 1 = Fuerza una sola página en PC y Móvil
                duration: 800
            };
            
            var pdfLink = "https://firebasestorage.googleapis.com/v0/b/guias-facil-bot.firebasestorage.app/o/productos%2FPrompt%20SESION%20%231.pdf?alt=media&token=a0e0f588-75c7-48bc-891f-a1f122d211f4";

            // Arrancamos el libro pasándole nuestras reglas por la fuerza
            $("#flipbookContainer").flipBook(pdfLink, opcionesEstrictas);
        });
    </script>

</body>
</html>
