<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lectura: Prompt SESIÓN #1 | HR Digital</title>
    
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/dflip/css/dflip.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/dflip/css/themify-icons.min.css" rel="stylesheet">
    
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg:         #0f172a;
            --nav-bg:     rgba(15, 23, 42, 0.97);
            --nav-border: rgba(255,255,255,0.1);
            --text:       #ffffff;
            --subtext:    #94a3b8;
            --btn-bg:     rgba(255,255,255,0.08);
            --btn-hover:  rgba(255,255,255,0.15);
            --btn-border: rgba(255,255,255,0.18);
        }
        [data-theme="light"] {
            --bg:         #f1f5f9;
            --nav-bg:     rgba(241,245,249,0.97);
            --nav-border: rgba(0,0,0,0.1);
            --text:       #0f172a;
            --subtext:    #475569;
            --btn-bg:     rgba(0,0,0,0.06);
            --btn-hover:  rgba(0,0,0,0.12);
            --btn-border: rgba(0,0,0,0.15);
        }

        html, body {
            height: 100%;
            background-color: var(--bg);
            overflow: hidden;
            transition: background-color 0.3s;
        }

        /* ── NAV ── */
        .glass-nav {
            height: 56px;
            background: var(--nav-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--nav-border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 12px;
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 50;
            gap: 8px;
            transition: background 0.3s, border-color 0.3s;
        }
        .nav-back {
            color: var(--subtext);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 6px;
            font-weight: 700;
            font-size: 13px;
            transition: color 0.2s;
            flex-shrink: 0;
        }
        .nav-back:hover { color: var(--text); }
        .nav-back .label { display: none; }
        .nav-title {
            color: var(--text);
            font-weight: 800;
            font-size: 14px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            flex: 1;
            text-align: center;
            transition: color 0.3s;
        }
        .theme-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            padding: 6px 10px;
            border-radius: 999px;
            border: 1px solid var(--btn-border);
            background: var(--btn-bg);
            color: var(--text);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s, color 0.2s;
            flex-shrink: 0;
            white-space: nowrap;
        }
        .theme-btn:hover { background: var(--btn-hover); }
        .theme-btn .btn-label { display: none; }

        @media (min-width: 480px) {
            .glass-nav            { height: 64px; padding: 0 20px; }
            .nav-back .label      { display: inline; }
            .theme-btn .btn-label { display: inline; }
            .theme-btn            { padding: 7px 14px; min-width: 130px; }
            .nav-back             { min-width: 130px; }
            .nav-title            { font-size: 15px; }
        }
        @media (min-width: 768px) {
            .glass-nav { padding: 0 24px; }
            .nav-title { font-size: 16px; }
        }

        /* ── Ocultar marca de agua y botón de más ── */
        .df-ui-btn.df-ui-logo,
        .df-ui-btn.df-ui-more { display: none !important; }

        /* ── CONTENIDO PRINCIPAL ── */
        #main-content {
            position: fixed;
            top: 56px; left: 0; right: 0; bottom: 0;
            background-color: var(--bg);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background-color 0.3s;
        }
        @media (min-width: 480px) {
            #main-content { top: 64px; }
        }

        #libro_3d { height: 100% !important; }
        #libro_3d .df-container { height: 100% !important; }

        /* ══════════════════════════════════════════
           TEMA OSCURO — forzar fondo y toolbar oscuros
           dFlip usa clases internas: df-ui-wrapper, df-book-wrap, df-ui-controls
        ══════════════════════════════════════════ */

        /* Fondo general del visor */
        [data-theme="dark"] .df-container,
        [data-theme="dark"] .df-book-wrap,
        [data-theme="dark"] .df-wrapper,
        [data-theme="dark"] .df-ui-wrapper { 
            background-color: #0f172a !important; 
        }

        /* Toolbar / controles inferior */
        [data-theme="dark"] .df-ui-controls {
            background-color: #1e293b !important;
            border-top: 1px solid rgba(255,255,255,0.08) !important;
        }

        /* Iconos y texto del toolbar */
        [data-theme="dark"] .df-ui-controls .df-ui-btn,
        [data-theme="dark"] .df-ui-controls .df-ui-page {
            color: #cbd5e1 !important;
        }
        [data-theme="dark"] .df-ui-controls .df-ui-btn:hover {
            color: #ffffff !important;
            background-color: rgba(255,255,255,0.08) !important;
        }

        /* Flechas de navegación laterales */
        [data-theme="dark"] .df-ui-prev,
        [data-theme="dark"] .df-ui-next {
            color: #cbd5e1 !important;
            background-color: rgba(15,23,42,0.7) !important;
        }

        /* ── TEMA CLARO ── */
        [data-theme="light"] .df-container,
        [data-theme="light"] .df-book-wrap,
        [data-theme="light"] .df-wrapper,
        [data-theme="light"] .df-ui-wrapper {
            background-color: #f1f5f9 !important;
        }
        [data-theme="light"] .df-ui-controls {
            background-color: #e2e8f0 !important;
            border-top: 1px solid rgba(0,0,0,0.08) !important;
        }
        [data-theme="light"] .df-ui-controls .df-ui-btn,
        [data-theme="light"] .df-ui-controls .df-ui-page {
            color: #334155 !important;
        }
    </style>
</head>
<body>

    <nav class="glass-nav">
        <a href="index.html" class="nav-back">
            <i class="fa-solid fa-arrow-left"></i>
            <span class="label">Volver</span>
        </a>
        <span class="nav-title">Prompt SESIÓN #1</span>
        <button class="theme-btn" onclick="toggleTheme()">
            <i class="fa-solid fa-moon" id="themeIcon"></i>
            <span class="btn-label" id="themeLabel">Modo Oscuro</span>
        </button>
    </nav>

    <div id="main-content">
        <div class="_df_book" 
             source="https://firebasestorage.googleapis.com/v0/b/guias-facil-bot.firebasestorage.app/o/productos%2FPrompt%20SESION%20%231.pdf?alt=media&token=a0e0f588-75c7-48bc-891f-a1f122d211f4" 
             id="libro_3d">
        </div>
    </div>

    <script>
        var dFlipLocation = "https://cdn.jsdelivr.net/npm/dflip/";

        var navH = window.innerWidth >= 480 ? 64 : 56;
        var availH = window.innerHeight - navH;
        var bookWidth = Math.min(Math.round(availH / 1.414), 860);

        var df_options = {
            webgl:               true,
            backgroundColor:     "#0f172a",
            singlePageMode:      1,
            height:              availH,
            width:               bookWidth,
            forceFit:            true,
            autoEnableOutline:   false,
            autoEnableThumbnail: false,
            maxTextureSize:      2048,
            duration:            800
        };

        var isDark = true;

        function applyThemeToVisor(dark) {
            // Fuerza el fondo del contenedor via JS también (por si el CSS no alcanza algún elemento)
            var bg = dark ? '#0f172a' : '#f1f5f9';
            var toolbarBg = dark ? '#1e293b' : '#e2e8f0';
            document.querySelectorAll('.df-container, .df-book-wrap, .df-wrapper, .df-ui-wrapper').forEach(function(el) {
                el.style.backgroundColor = bg;
            });
            document.querySelectorAll('.df-ui-controls').forEach(function(el) {
                el.style.backgroundColor = toolbarBg;
            });
            document.getElementById('main-content').style.backgroundColor = bg;
        }

        function toggleTheme() {
            isDark = !isDark;
            document.documentElement.setAttribute('data-theme', isDark ? 'dark' : 'light');
            document.getElementById('themeIcon').className  = isDark ? 'fa-solid fa-moon' : 'fa-solid fa-sun';
            document.getElementById('themeLabel').textContent = isDark ? 'Modo Oscuro' : 'Modo Claro';
            applyThemeToVisor(isDark);
        }

        // Aplicar al cargar (dFlip tarda un poco en renderizar)
        window.addEventListener('load', function() {
            setTimeout(function() { applyThemeToVisor(true); }, 800);
        });

        window.addEventListener('resize', function () {
            var navH = window.innerWidth >= 480 ? 64 : 56;
            var availH = window.innerHeight - navH;
            var bookWidth = Math.min(Math.round(availH / 1.414), 860);
            var libro = document.getElementById('libro_3d');
            if (libro) {
                libro.style.height = availH + 'px';
                libro.style.width  = bookWidth + 'px';
            }
        });
    </script>

    <script src="https://cdn.jsdelivr.net/npm/dflip/js/dflip.min.js"></script>

</body>
</html>
