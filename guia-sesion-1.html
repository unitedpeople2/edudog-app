<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lectura: Prompt SESIÓN #1 | HR Digital</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/dflip@2.3.1/css/dflip.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/dflip@2.3.1/css/themify-icons.min.css" rel="stylesheet">
    
    <style>
        body { background-color: #0f172a; margin: 0; overflow: hidden; }
        .glass-nav { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255, 255, 255, 0.1); }
        .df-ui-btn.df-ui-logo { display: none !important; }
        #libro_interactivo { height: 100vh; width: 100%; }
    </style>
</head>
<body class="antialiased flex flex-col h-screen">

    <nav class="h-16 glass-nav flex items-center justify-between px-6 shrink-0 z-50">
        <a href="index.html" class="text-slate-400 hover:text-white font-bold flex items-center gap-2 transition-all">
            <i class="fa-solid fa-arrow-left"></i> <span class="hidden sm:inline">Volver a la Plataforma</span>
        </a>
        <h1 class="text-white font-extrabold tracking-tight">Prompt SESIÓN #1</h1>
        <div class="w-10 sm:w-48"></div>
    </nav>

    <main class="flex-1 w-full bg-slate-900 relative">
        <div id="libro_interactivo"></div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/dflip@2.3.1/js/dflip.min.js"></script>
    
    <script>
        $(document).ready(function () {
            var pdfUrl = "https://firebasestorage.googleapis.com/v0/b/guias-facil-bot.firebasestorage.app/o/productos%2FPrompt%20SESION%20%231.pdf?alt=media&token=a0e0f588-75c7-48bc-891f-a1f122d211f4";
            
            var options = {
                webgl: true,
                duration: 800,
                backgroundColor: "#0f172a",
                soundEnable: true,
                overwritePDFSpread: true, // Forzar 2 páginas (modo libro)
                pageSize: 0,              // Auto detectar
                forceFit: true            // Ajustar al contenedor
            };

            // Inicialización manual para evitar fallos de carga automática
            $("#libro_interactivo").flipBook(pdfUrl, options);
        });
    </script>

</body>
</html>
