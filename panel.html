<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Centro de Mando Pro - EduDog</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f1f5f9; color: #0f172a; }
        .step-content { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .tag-badge { background: white; border: 1px solid #3b82f6; color: #1d4ed8; padding: 4px 12px; border-radius: 9999px; display: flex; align-items: center; gap: 8px; font-weight: 600; font-size: 0.875rem; }
    </style>
</head>
<body class="pb-20">

    <nav class="bg-white border-b border-slate-200 px-6 py-4 mb-8 sticky top-0 z-50">
        <div class="max-w-5xl mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-extrabold text-blue-600 tracking-tight">EduDog <span class="text-slate-400 font-light">Admin Pro</span></h1>
            <div id="user-info" class="text-sm font-medium text-slate-500"></div>
        </div>
    </nav>

    <main class="max-w-3xl mx-auto px-4">
        
        <section id="step-1" class="step-content bg-white p-8 rounded-3xl shadow-sm border border-slate-200 mb-6">
            <div class="flex items-center gap-4 mb-6">
                <span class="w-10 h-10 bg-blue-600 text-white rounded-full flex items-center justify-center font-bold">1</span>
                <h2 class="text-xl font-bold">Identificación del Producto</h2>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-2">ID del Documento (Firestore)</label>
                    <input type="text" id="prod-id" placeholder="ej: mentecan" class="w-full p-4 rounded-xl border border-slate-200 focus:ring-2 focus:ring-blue-500 outline-none transition-all">
                    <p class="text-xs text-slate-400 mt-2">Este es el ID que usarás en el Hub para cobrar.</p>
                </div>
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-2">Nombre Comercial</label>
                    <input type="text" id="prod-nombre" placeholder="ej: Mentecan Vital" class="w-full p-4 rounded-xl border border-slate-200 focus:ring-2 focus:ring-blue-500 outline-none transition-all">
                </div>
            </div>
        </section>

        <section id="step-2" class="step-content bg-white p-8 rounded-3xl shadow-sm border border-slate-200 mb-6">
            <div class="flex items-center gap-4 mb-6">
                <span class="w-10 h-10 bg-blue-600 text-white rounded-full flex items-center justify-center font-bold">2</span>
                <h2 class="text-xl font-bold">¿Qué desbloquea este pago?</h2>
            </div>

            <div class="space-y-8">
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-3">Apps a desbloquear (IDs)</label>
                    <div class="flex gap-2 mb-4">
                        <input type="text" id="input-app" placeholder="Escribe el id y presiona Enter" class="flex-1 p-3 rounded-xl border border-slate-200 outline-none focus:border-blue-500">
                        <button onclick="addDeliverable('app')" class="bg-blue-600 text-white px-6 rounded-xl hover:bg-blue-700 transition-colors">Agregar</button>
                    </div>
                    <div id="container-apps" class="flex flex-wrap gap-2"></div>
                </div>

                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-3">eBooks Interactivos (IDs)</label>
                    <div class="flex gap-2 mb-4">
                        <input type="text" id="input-ebook" placeholder="Escribe el id y presiona Enter" class="flex-1 p-3 rounded-xl border border-slate-200 outline-none focus:border-blue-500">
                        <button onclick="addDeliverable('ebook')" class="bg-blue-600 text-white px-6 rounded-xl hover:bg-blue-700 transition-colors">Agregar</button>
                    </div>
                    <div id="container-ebooks" class="flex flex-wrap gap-2"></div>
                </div>
            </div>
        </section>

        <section id="step-3" class="step-content bg-white p-8 rounded-3xl shadow-sm border border-slate-200 mb-6">
            <div class="flex items-center gap-4 mb-6">
                <span class="w-10 h-10 bg-blue-600 text-white rounded-full flex items-center justify-center font-bold">3</span>
                <h2 class="text-xl font-bold">Precios y Order Bump</h2>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-2">Precio Oferta (Principal)</label>
                    <input type="number" id="prod-precio" placeholder="25" class="w-full p-4 rounded-xl border border-slate-200 focus:ring-2 focus:ring-blue-500 outline-none">
                </div>
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-2">Precio Order Bump</label>
                    <input type="number" id="prod-precio-bump" placeholder="19" class="w-full p-4 rounded-xl border border-slate-200 focus:ring-2 focus:ring-blue-500 outline-none">
                </div>
            </div>

            <div class="p-6 bg-slate-50 rounded-2xl border border-dashed border-slate-300">
                <label class="block text-sm font-bold text-slate-700 mb-2">ID del Producto para Order Bump</label>
                <input type="text" id="prod-id-bump" placeholder="ej: nutrichef" class="w-full p-4 rounded-xl border border-slate-200 focus:ring-2 focus:ring-blue-500 outline-none">
                <p class="text-xs text-slate-400 mt-2">ID que se activará si el cliente acepta la oferta adicional.</p>
            </div>
        </section>

        <button onclick="saveProduct()" id="btn-save" class="w-full bg-slate-900 text-white py-5 rounded-3xl text-lg font-bold shadow-xl hover:bg-blue-600 transition-all transform active:scale-95 flex items-center justify-center gap-3">
            <i class="fa-solid fa-floppy-disk"></i>
            Guardar Producto en Firestore
        </button>

    </main>

    <script>
        // CONFIGURACIÓN FIREBASE (REEMPLAZA CON TUS CREDENCIALES)
        const firebaseConfig = {
            apiKey: "TU_API_KEY",
            authDomain: "guias-facil-bot.firebaseapp.com",
            projectId: "guias-facil-bot",
            storageBucket: "guias-facil-bot.appspot.com",
            messagingSenderId: "TU_SENDER_ID",
            appId: "TU_APP_ID"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // VARIABLES DE ESTADO DINÁMICO
        let appsToUnlock = [];
        let ebooksToUnlock = [];

        // LÓGICA DE ETIQUETAS (TAGS)
        function addDeliverable(type) {
            const input = document.getElementById(type === 'app' ? 'input-app' : 'input-ebook');
            const val = input.value.trim().toLowerCase();
            
            if (!val) return;

            if (type === 'app') {
                if (!appsToUnlock.includes(val)) appsToUnlock.push(val);
            } else {
                if (!ebooksToUnlock.includes(val)) ebooksToUnlock.push(val);
            }

            input.value = '';
            renderTags();
        }

        function removeTag(type, val) {
            if (type === 'app') {
                appsToUnlock = appsToUnlock.filter(i => i !== val);
            } else {
                ebooksToUnlock = ebooksToUnlock.filter(i => i !== val);
            }
            renderTags();
        }

        function renderTags() {
            const appContainer = document.getElementById('container-apps');
            const ebookContainer = document.getElementById('container-ebooks');

            appContainer.innerHTML = appsToUnlock.map(id => `
                <div class="tag-badge">
                    ${id}
                    <button onclick="removeTag('app', '${id}')"><i class="fa-solid fa-circle-xmark text-red-400"></i></button>
                </div>
            `).join('');

            ebookContainer.innerHTML = ebooksToUnlock.map(id => `
                <div class="tag-badge">
                    ${id}
                    <button onclick="removeTag('ebook', '${id}')"><i class="fa-solid fa-circle-xmark text-red-400"></i></button>
                </div>
            `).join('');
        }

        // ESCUCHAR TECLA ENTER EN INPUTS DE TAGS
        ['input-app', 'input-ebook'].forEach(id => {
            document.getElementById(id).addEventListener('keypress', (e) => {
                if (e.key === 'Enter') addDeliverable(id.includes('app') ? 'app' : 'ebook');
            });
        });

        // GUARDADO EN FIRESTORE
        async function saveProduct() {
            const docId = document.getElementById('prod-id').value.trim().toLowerCase();
            const btn = document.getElementById('btn-save');

            if (!docId) {
                alert("Por favor, escribe un ID para el documento (ej: mentecan)");
                return;
            }

            btn.disabled = true;
            btn.innerHTML = `<i class="fa-solid fa-circle-notch fa-spin"></i> Guardando...`;

            const data = {
                nombre_producto: document.getElementById('prod-nombre').value,
                precio_oferta: parseFloat(document.getElementById('prod-precio').value) || 0,
                precio_oferta_bump: parseFloat(document.getElementById('prod-precio-bump').value) || 0,
                id_oferta_bump: document.getElementById('prod-id-bump').value.trim().toLowerCase(),
                apps_a_desbloquear: appsToUnlock, // ARRAY DINÁMICO
                ebooks_a_desbloquear: ebooksToUnlock, // ARRAY DINÁMICO
                tipo_oferta: "principal",
                fecha_actualizacion: firebase.firestore.FieldValue.serverTimestamp()
            };

            try {
                await db.collection('productos').doc(docId).set(data, { merge: true });
                alert("¡Éxito! El producto se guardó correctamente. El bot ya puede reconocer el ID: " + docId);
            } catch (error) {
                console.error("Error al guardar:", error);
                alert("Hubo un error al guardar en Firestore.");
            } finally {
                btn.disabled = false;
                btn.innerHTML = `<i class="fa-solid fa-floppy-disk"></i> Guardar Producto en Firestore`;
            }
        }
    </script>
</body>
</html>
