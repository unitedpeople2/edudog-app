<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HR Digital | Ecosistema de Herramientas & Marcas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; color: #0f172a; }
        
        .glass-nav { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(12px); border-bottom: 1px solid #e2e8f0; }
        
        .screen { display: none; animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        .screen.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        .product-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); height: 100%; border: 1px solid #e2e8f0; background: white; }
        .product-card:hover { transform: translateY(-6px); box-shadow: 0 25px 30px -5px rgba(0, 0, 0, 0.08); }
    </style>
</head>
<body class="antialiased">

    <section id="screen-login" class="fixed inset-0 z-[100] bg-slate-50 flex items-center justify-center p-6">
        <div class="w-full max-w-md bg-white p-10 rounded-[2.5rem] shadow-2xl border border-slate-100 text-center">
            <div class="w-20 h-20 bg-blue-600 rounded-[1.5rem] flex items-center justify-center text-white text-4xl mx-auto mb-6"><i class="fa-solid fa-globe"></i></div>
            <h1 class="text-3xl font-black text-slate-900 mb-2">HR Digital</h1>
            <p class="text-slate-400 font-bold mb-8 uppercase text-[10px] tracking-widest">Acceso a la Plataforma</p>
            
            <div class="space-y-4 text-left">
                <div>
                    <label class="text-[11px] font-black text-slate-400 uppercase tracking-widest ml-2">Correo o Teléfono</label>
                    <input type="text" id="login-id" placeholder="tu@correo.com o 519..." class="w-full bg-slate-50 border border-slate-200 rounded-2xl py-4 px-5 outline-none font-bold focus:border-blue-500 transition-all">
                </div>
                <div>
                    <label class="text-[11px] font-black text-slate-400 uppercase tracking-widest ml-2">PIN Secreto</label>
                    <input type="password" id="login-pin" maxlength="6" placeholder="••••••" class="w-full bg-slate-50 border border-slate-200 rounded-2xl py-4 px-5 outline-none font-black text-2xl tracking-[0.5em] focus:border-blue-500 transition-all">
                </div>
                <button onclick="handleLogin()" id="btn-login" class="w-full bg-slate-900 text-white font-black py-5 rounded-2xl shadow-xl mt-6 hover:bg-slate-800 transition-all">Ingresar</button>
            </div>
        </div>
    </section>

    <div id="main-interface" class="hidden min-h-screen flex flex-col">
        
        <nav class="sticky top-0 z-50 glass-nav h-16 shrink-0">
            <div class="max-w-7xl mx-auto px-6 h-full flex justify-between items-center">
                <div class="flex items-center gap-8 font-black text-xl text-blue-600">
                    <i class="fa-solid fa-globe"></i> <span>HR Digital</span>
                </div>
                <div class="flex items-center gap-5">
                    <p id="user-display-name" class="text-xs font-black text-slate-900">Usuario</p>
                    <button onclick="logout()" class="text-slate-500 hover:text-rose-500 transition-all"><i class="fa-solid fa-right-from-bracket"></i></button>
                </div>
            </div>
        </nav>

        <div class="flex-1 w-full max-w-7xl mx-auto p-6 md:p-8 lg:py-12">
            
            <main id="screen-catalog" class="screen active">
                <header class="mb-10 text-center md:text-left">
                    <h1 class="text-3xl md:text-4xl font-black text-slate-900">Catálogo de Herramientas 🚀</h1>
                    <p class="text-slate-500 mt-2">Explora nuestro ecosistema digital y marcas autorizadas.</p>
                </header>
                <div id="grid-catalog" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6 lg:gap-10">
                    </div>
            </main>

            <main id="screen-product" class="screen">
                <div class="max-w-6xl mx-auto">
                    <button onclick="showScreen('catalog')" class="mb-6 font-black text-slate-400 hover:text-slate-700 flex items-center gap-2 transition-all"><i class="fa-solid fa-arrow-left"></i> Volver</button>
                    <div id="product-detail-view" class="bg-white rounded-[2.5rem] p-8 md:p-14 shadow-2xl border border-slate-100 flex flex-col lg:flex-row gap-10">
                        </div>
                </div>
            </main>

            <footer class="mt-20 py-10 border-t border-slate-200 text-center">
                <p class="text-sm font-bold text-slate-900">HR Digital © 2026</p>
                <p class="text-[10px] text-slate-400 uppercase tracking-widest mt-2">
                    Operado por: ROJAS MATTOS HEDINSON ORLANDO | RUC: 10700761130
                </p>
                <div class="flex justify-center gap-4 mt-4 text-[10px] font-bold text-blue-600 uppercase">
                    <a href="#" class="hover:underline">Términos y Condiciones</a>
                    <a href="#" class="hover:underline">Políticas de Privacidad</a>
                </div>
            </footer>

        </div>
    </div>

    <script>
        // CONFIGURACIÓN FIREBASE
        const firebaseConfig = {
            apiKey: "AIzaSyCrbqdz-JMZNV0H0zcrHwfDOawE3_ouUNw",
            authDomain: "guias-facil-bot.firebaseapp.com",
            projectId: "guias-facil-bot",
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        let userData = null;

        // LOGIN
        async function handleLogin() {
            const id = document.getElementById('login-id').value.trim();
            const pin = document.getElementById('login-pin').value.trim();
            if(!id || !pin) return alert("Completa tus datos");

            try {
                const coleccion = id.includes('@') ? 'usuarios' : 'clientes';
                const doc = await db.collection(coleccion).doc(id).get();
                
                if (doc.exists && String(doc.data().pin) === pin) {
                    userData = doc.data();
                    localStorage.setItem('hrSess', JSON.stringify({id, pin, coleccion}));
                    startApp();
                } else { alert("Credenciales incorrectas"); }
            } catch(e) { console.error(e); }
        }

        function startApp() {
            document.getElementById('screen-login').style.display = 'none';
            document.getElementById('main-interface').classList.remove('hidden');
            document.getElementById('user-display-name').innerText = userData.nombre || 'Miembro';
            renderCatalog();
        }

        // RENDERIZADO DEL CATÁLOGO
        async function renderCatalog() {
            const gridCat = document.getElementById('grid-catalog');
            const myPerms = [...(userData.apps_activas || []), ...(userData.ebooks_activos || [])];

            try {
                const snap = await db.collection('productos').where('activo', '==', true).get();
                let htmlCat = '';

                snap.forEach(doc => {
                    const p = doc.data(); p.id = doc.id;
                    const pKeys = [...(p.apps_a_desbloquear || []), ...(p.ebooks_a_desbloquear || [])];
                    const hasAccess = pKeys.some(key => myPerms.includes(key));
                    
                    htmlCat += `
                        <div class="product-card group rounded-[2rem] flex flex-col overflow-hidden bg-white">
                            <div class="w-full aspect-square bg-slate-50 flex items-center justify-center text-slate-300">
                                <i class="fa-solid fa-shapes text-5xl"></i>
                            </div>
                            <div class="p-8 flex flex-col flex-1">
                                <h3 class="text-xl font-black text-slate-900 mb-6">${p.nombre_producto}</h3>
                                <div class="mt-auto">
                                    ${hasAccess ? 
                                        `<button onclick="window.location.href='${pKeys[0]}.html'" class="w-full bg-slate-900 text-white font-black py-4 rounded-xl shadow-lg hover:bg-slate-800 transition-all">Abrir Acceso</button>` : 
                                        `<button onclick="viewProductDetails('${p.id}')" class="w-full bg-blue-50 text-blue-600 font-bold py-4 rounded-xl hover:bg-blue-100 transition-all">Ver Detalles</button>`
                                    }
                                </div>
                            </div>
                        </div>`;
                });

                // EBOOK FIJO
                const ebookFijoHTML = `
                    <div class="product-card group rounded-[2rem] flex flex-col overflow-hidden bg-white border-2 border-dashed border-slate-200">
                        <div class="w-full aspect-square bg-slate-100 flex flex-col items-center justify-center text-slate-400">
                            <i class="fa-solid fa-book-open text-5xl mb-2"></i>
                            <span class="text-[10px] font-black uppercase tracking-widest">Ebook de Sesión</span>
                        </div>
                        <div class="p-8 flex flex-col flex-1">
                            <h3 class="text-xl font-black text-slate-900 mb-6">Prompt SESIÓN #1</h3>
                            <div class="mt-auto">
                                <button onclick="window.location.href='guia-sesion-1.html'" class="w-full bg-blue-600 text-white font-black py-4 rounded-xl shadow-lg hover:bg-blue-700 transition-all">
                                    Abrir Acceso <i class="fa-solid fa-arrow-right ml-1"></i>
                                </button>
                            </div>
                        </div>
                    </div>`;

                gridCat.innerHTML = htmlCat + ebookFijoHTML;

            } catch (e) { console.error(e); }
        }

        // VISTA DE DETALLES
        async function viewProductDetails(productId) {
            const doc = await db.collection('productos').doc(productId).get();
            const p = doc.data();
            const linkHotmart = p.link_hotmart || "#";
            const precio = p.precio_oferta || "0.00";

            document.getElementById('product-detail-view').innerHTML = `
                <div class="flex-1">
                    <h2 class="text-4xl font-black text-slate-900 mb-6">${p.nombre_producto}</h2>
                    <p class="text-slate-600 font-medium mb-10 leading-relaxed">${p.texto_cierre_ventas || 'Desbloquea esta herramienta ahora.'}</p>
                    <div class="flex items-center gap-6">
                        <div class="text-3xl font-black text-slate-900">$${precio}</div>
                        <button onclick="window.open('${linkHotmart}', '_blank')" class="flex-1 bg-blue-600 text-white font-black py-5 rounded-2xl shadow-xl hover:bg-blue-700 transition-all">Comprar Ahora</button>
                    </div>
                </div>
                <div class="flex-1 aspect-square bg-slate-50 rounded-[2rem] flex items-center justify-center text-slate-200 text-9xl">
                    <i class="fa-solid fa-box"></i>
                </div>`;
            showScreen('product');
        }

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(`screen-${id}`).classList.add('active');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function logout() { localStorage.clear(); location.reload(); }

        document.addEventListener('DOMContentLoaded', () => {
            const s = localStorage.getItem('hrSess');
            if(s) {
                const c = JSON.parse(s);
                db.collection(c.coleccion).doc(c.id).get().then(doc => {
                    if(doc.exists && String(doc.data().pin) === c.pin) { userData = doc.data(); startApp(); }
                });
            }
        });
    </script>
</body>
</html>
