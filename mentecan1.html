<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduDog Pro - Entrenamiento Profesional</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');

        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f1f5f9; color: #1e293b; }

        .app-container {
            max-width: 420px; margin: 0 auto; height: 100dvh;
            position: relative; background: #ffffff;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.15);
            overflow: hidden; display: flex; flex-direction: column;
        }

        .screen {
            display: none; flex: 1; flex-direction: column;
            animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            overflow-y: auto; background-color: #f8fafc;
        }
        .screen.active { display: flex; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Estética Premium */
        .brand-gradient { background: linear-gradient(135deg, #10b981 0%, #059669 100%); }
        .glass-card { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); border: 1px solid rgba(226, 232, 240, 0.8); }
        
        /* Pestañas */
        .tab-btn { padding-bottom: 0.75rem; border-bottom: 3px solid transparent; transition: all 0.3s; font-weight: 800; font-size: 0.75rem; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.05em; }
        .tab-btn.active { border-color: #10b981; color: #059669; }

        /* BLOB DESIGN (Audio & Timer) */
        .blob-container {
            position: relative; width: 230px; height: 230px;
            margin: 20px auto; display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .blob-shape {
            position: absolute; inset: 0;
            background: rgba(16, 185, 129, 0.1);
            border: 2px solid rgba(16, 185, 129, 0.2);
            border-radius: 42% 58% 70% 30% / 45% 45% 55% 55%;
            transition: all 1s ease-in-out;
            z-index: 1;
        }
        .active-session .blob-shape {
            animation: breathe 4s ease-in-out infinite;
            background: rgba(16, 185, 129, 0.18);
            border-color: #10b981;
            box-shadow: 0 0 40px rgba(16, 185, 129, 0.1);
        }
        @keyframes breathe {
            0%, 100% { border-radius: 42% 58% 70% 30% / 45% 45% 55% 55%; transform: scale(1); }
            50% { border-radius: 58% 42% 38% 62% / 55% 55% 45% 45%; transform: scale(1.08); }
        }
        .counter-text { position: relative; z-index: 10; font-size: 3.5rem; font-weight: 900; color: #064e3b; letter-spacing: -2px; }
        .action-trigger { position: relative; z-index: 10; margin-top: 10px; width: 55px; height: 55px; background: #059669; color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 10px 15px -3px rgba(5, 150, 105, 0.3); font-size: 1.2rem; cursor: pointer; }

        /* Tags e Iconos */
        .tag { background: #f1f5f9; color: #475569; font-size: 10px; font-weight: 800; padding: 5px 12px; border-radius: 20px; text-transform: uppercase; display: flex; align-items: center; gap: 5px; border: 1px solid #e2e8f0; }
        .step-badge { width: 26px; height: 26px; border-radius: 50%; background: #059669; color: white; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 800; flex-shrink: 0; }
        
        /* Estados de los días */
        .day-item.failed { border-color: #fca5a5; background: #fff1f2; }
        .day-item.failed h4 { color: #b91c1c; }
        .day-item.failed .status-icon { color: #ef4444; }

        .modal-bg { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(5px); }
    </style>
</head>
<body>

<div id="toast" class="fixed top-6 left-1/2 -translate-x-1/2 bg-slate-900 text-white px-6 py-3 rounded-full shadow-2xl z-[100] transform -translate-y-24 opacity-0 transition-all duration-300 flex items-center gap-3 font-bold text-sm pointer-events-none">
    <i id="toast-icon" class="fa-solid fa-circle-check text-emerald-400"></i>
    <span id="toast-msg">Mensaje</span>
</div>

<div class="app-container md:rounded-[2.5rem] md:border-[10px] md:border-slate-900">

    <section id="screen-hub" class="screen">
        <div class="sticky top-0 bg-white/80 backdrop-blur-md border-b border-slate-100 px-6 py-4 flex justify-between items-center z-30">
            <h2 class="font-black text-slate-800 text-lg flex items-center gap-2"><i class="fa-solid fa-paw text-emerald-500"></i> EduDog Pro</h2>
            <div class="w-10 h-10 rounded-2xl bg-slate-100 flex items-center justify-center text-slate-400"><i class="fa-solid fa-shield-dog"></i></div>
        </div>
        <div class="px-6 py-6 space-y-6">
            <div class="brand-gradient rounded-[2.5rem] p-6 text-white shadow-xl relative overflow-hidden">
                <div class="relative z-10">
                    <p class="text-emerald-100 text-[10px] font-black uppercase tracking-widest mb-1">Entrenamiento de hoy</p>
                    <h3 class="text-2xl font-black tracking-tight" id="hub-dog-name">Cargando...</h3>
                    <div class="mt-5 bg-black/10 p-4 rounded-3xl border border-white/10">
                        <div class="flex justify-between text-[10px] font-black uppercase mb-2"><span>Progreso Semanal</span><span id="hub-progress-text">0/7 días</span></div>
                        <div class="w-full bg-white/20 rounded-full h-2 overflow-hidden"><div id="hub-progress-bar" class="bg-white h-full transition-all duration-1000" style="width:0%"></div></div>
                    </div>
                </div>
            </div>
            <div id="challenges-container" class="space-y-4"></div>
        </div>
    </section>

    <section id="screen-challenge" class="screen">
        <div class="sticky top-0 bg-emerald-600 text-white px-6 py-4 flex items-center justify-between z-30">
            <button onclick="showScreen('screen-hub')" class="w-10 h-10 bg-emerald-700/50 rounded-2xl flex items-center justify-center"><i class="fa-solid fa-chevron-left"></i></button>
            <h2 class="font-black text-sm" id="challenge-title">Desafío</h2>
            <div class="w-10 h-10"></div>
        </div>
        <div id="days-container" class="px-6 py-6 space-y-3"></div>
    </section>

    <section id="screen-lesson" class="screen">
        <div class="sticky top-0 bg-emerald-600 text-white px-6 py-4 flex items-center justify-between z-30">
            <button onclick="showScreen('screen-challenge')" class="w-10 h-10 bg-emerald-700/50 rounded-2xl flex items-center justify-center"><i class="fa-solid fa-chevron-left"></i></button>
            <div class="text-center"><h2 class="font-black text-sm" id="lesson-header-title">Día 1</h2><p id="lesson-header-sub" class="text-[9px] font-black text-emerald-200 uppercase tracking-widest"></p></div>
            <div class="w-10 h-10"></div>
        </div>
        <div class="px-6 py-6 pb-12" id="lesson-content"></div>
    </section>

    <div id="modal-complete" class="hidden absolute inset-0 z-50 modal-bg flex flex-col justify-end">
        <div class="bg-white rounded-t-[3rem] p-8 shadow-2xl">
            <div class="text-center mb-8"><div class="text-5xl mb-4">✨</div><h3 class="text-2xl font-black text-slate-900">¿Cómo fue la sesión?</h3><p class="text-slate-400 text-sm font-medium mt-1 text-balance">Tu honestidad es la clave para un aprendizaje real.</p></div>
            <div class="space-y-3">
                <button onclick="saveDay('excelente')" class="w-full bg-emerald-50 text-emerald-700 p-5 rounded-[2rem] font-black text-sm border border-emerald-100 flex items-center justify-between group active:scale-95 transition-all"><span><i class="fa-solid fa-star mr-2 text-emerald-500"></i> ¡Excelente progreso!</span><i class="fa-solid fa-chevron-right opacity-30"></i></button>
                <button onclick="saveDay('bien')" class="w-full bg-amber-50 text-amber-700 p-5 rounded-[2rem] font-black text-sm border border-amber-100 flex items-center justify-between group active:scale-95 transition-all"><span><i class="fa-solid fa-thumbs-up mr-2 text-amber-500"></i> Estuvo bien</span><i class="fa-solid fa-chevron-right opacity-30"></i></button>
                <button onclick="saveDay('dificil')" class="w-full bg-rose-50 text-rose-700 p-5 rounded-[2rem] font-black text-sm border border-rose-100 flex items-center justify-between group active:scale-95 transition-all"><span><i class="fa-solid fa-triangle-exclamation mr-2 text-rose-500"></i> Difícil - Reintentar</span><i class="fa-solid fa-chevron-right opacity-30"></i></button>
                <button onclick="closeModal()" class="w-full text-slate-400 py-4 font-bold text-sm">Cancelar</button>
            </div>
        </div>
    </div>
</div>

<script>
// =============================================
// CONTENIDO COMPLETO — 7 DÍAS "NO MUERDA"
// =============================================
const CHALLENGES = [

                practica: { timerSeconds: 900, pasos: [

                teoria: { audioSeconds: 25, intro: "Cambiando lo prohibido por diversión 🎾", cuerpo: "No basta con decir NO, debes darle una alternativa que SÍ pueda morder.", puntosClave: ["Alternativa: Ten su juguete favorito a mano.", "Intercambio: Quita el zapato y da el juguete.", "Fiesta: Celebra cuando muerda el juguete."] },
                practica: { timerSeconds: 720, pasos: [

                error: { titulo: "Error de frustración", desc: "Quitarle algo sin darle nada a cambio; eso genera ansiedad por morder." },

            },
            {

                teoria: { audioSeconds: 28, intro: "Aprender a entregar el tesoro 🔄", cuerpo: "Suelte es vital. Evita que trague algo peligroso y refuerza tu liderazgo positivo.", puntosClave: ["Intercambio: Nunca luches por el objeto.", "Comando: Di 'SUELTA' mientras ofreces algo mejor.", "Confianza: Él debe saber que soltar trae premios."] },
                practica: { timerSeconds: 900, pasos: [

                    { titulo: 'Corrección remota', desc: 'Si intenta ir, usa QUIETO. Si obedece, ve tú hacia él a premiar.', emoji: '🏆', icon: 'fa-medal' }
                ]},
                tips: ["No lo llames a él; ve tú a premiarlo donde se quedó quieto.", "Aumenta la distancia centímetro a centímetro."],
                error: { titulo: "Error de velocidad", desc: "Alejarte demasiado rápido el primer intento. La distancia se gana con calma." },

            },
            {

                practica: { timerSeconds: 900, pasos: [
                    { titulo: 'Circuito de objetos', desc: 'Pon 3 objetos prohibidos en el suelo en diferentes puntos.', emoji: '📦', icon: 'fa-boxes-stacked' },
                    { titulo: 'Caminata guiada', desc: 'Camina con él entre los objetos. Pide QUIETO si olfatea alguno.', emoji: '🐕', icon: 'fa-route' },
                    { titulo: 'Elección libre', desc: 'Suéltalo un momento y observa. Premia cada vez que ignore los objetos.', emoji: '✅', icon: 'fa-circle-check' }
                ]},
                tips: ["Usa objetos que huelan mucho a ti (calcetines), suelen ser los más difíciles.", "Mantén sesiones de máximo 15 minutos."],
                error: { titulo: "Mensajes mixtos", desc: "Dejar que muerda un zapato viejo 'porque no importa'. Él no sabe distinguir entre viejo y nuevo." },

            {

                teoria: { audioSeconds: 25, intro: "La prueba de fuego en solitario 🏆", cuerpo: "¿Qué hace cuando no miras? Hoy consolidamos el hábito permanente.", puntosClave: ["Privacidad: Déjalo solo 5 min en una zona controlada.", "Retorno: Si todo está intacto, la fiesta debe ser épica.", "Hábito: El adiestramiento se vuelve su nueva forma de ser."] },
                practica: { timerSeconds: 1200, pasos: [
                    { titulo: 'Simulacro de ausencia', desc: 'Sal de la habitación por 5 minutos. Observa si puedes por una rendija.', emoji: '🚪', icon: 'fa-door-closed' },
                    { titulo: 'El regreso triunfal', desc: 'Vuelve. Si no mordió nada, dale su premio favorito (pollo/queso).', emoji: '🍗', icon: 'fa-star' },
                    { titulo: 'Cierre del reto', desc: 'Repite aumentando el tiempo a 10 minutos. Felicítate, ¡lo lograron!.', emoji: '🎓', icon: 'fa-graduation-cap' }
                ]},
                tips: ["El ejercicio previo a dejarlo solo reduce el instinto destructivo en un 90%.", "Un perro cansado es un perro educado."],
                error: { titulo: "Castigo tardío", desc: "Regañarlo si encuentras algo mordido horas después. Él no conectará el pasado con tu enojo." },

];

// =============================================
// LÓGICA DE PROGRESO Y UI
// =============================================
let dogName = localStorage.getItem('currentDogName') || 'tu peludo';
let currentChallenge = null, currentLessonDay = null, currentTab = 'teoria', audioInterval = null, timerInterval = null;
let trackerData = JSON.parse(localStorage.getItem(`eduDog_tracker_${dogName}`)) || {};

document.addEventListener('DOMContentLoaded', () => { renderHub(); showScreen('screen-hub'); });

function renderHub() {
    document.getElementById('hub-dog-name').innerText = `${dogName} 🐾`;
    const container = document.getElementById('challenges-container');
    container.innerHTML = '';
    CHALLENGES.forEach(ch => {
        const chTracker = trackerData[ch.id] || {};
        const passedCount = Object.values(chTracker).filter(t => t.passed).length;
        const pct = Math.round((passedCount / ch.totalDays) * 100);
        container.innerHTML += `
            <div onclick="openChallenge('${ch.id}')" class="glass-card rounded-[2.5rem] p-5 shadow-sm active:scale-95 transition-all cursor-pointer flex items-center gap-4">
                <div class="w-14 h-14 brand-gradient rounded-3xl flex items-center justify-center text-2xl text-white shadow-lg shadow-emerald-200">${ch.icon}</div>
                <div class="flex-1">
                    <h4 class="font-black text-slate-800 text-sm leading-tight">${ch.name}</h4>
                    <p class="text-[10px] text-slate-400 font-bold tracking-tight uppercase mt-0.5">${passedCount}/${ch.totalDays} Días completados</p>
                    <div class="w-full bg-slate-100 h-1.5 rounded-full mt-2 overflow-hidden"><div class="brand-gradient h-full" style="width:${pct}%"></div></div>
                </div>
                <i class="fa-solid fa-chevron-right text-slate-200"></i>
            </div>`;
    });
    document.getElementById('hub-progress-text').innerText = `${Object.values(trackerData).reduce((acc, ch) => acc + Object.values(ch).filter(t => t.passed).length, 0)}/7 días`;
    document.getElementById('hub-progress-bar').style.width = '0%'; // Simulación
}

function openChallenge(id) {
    currentChallenge = CHALLENGES.find(c => c.id === id);
    document.getElementById('challenge-title').innerText = currentChallenge.name;
    renderDays();
    showScreen('screen-challenge');
}

function renderDays() {
    const container = document.getElementById('days-container');
    const chTracker = trackerData[currentChallenge.id] || {};
    container.innerHTML = '';
    
    // Determinar último día pasado
    let highestPassed = 0;
    Object.keys(chTracker).forEach(d => { if(chTracker[d].passed) highestPassed = Math.max(highestPassed, parseInt(d)); });

    for (let i = 1; i <= currentChallenge.totalDays; i++) {
        const lesson = currentChallenge.lessons.find(l => l.day === i);
        const track = chTracker[i];
        const isPassed = track && track.passed;
        const isFailed = track && !track.passed;
        const isReady = i === highestPassed + 1 || isFailed;
        const isLocked = !isPassed && !isReady;

        let icon = isPassed ? 'fa-circle-check' : isFailed ? 'fa-rotate-right' : isLocked ? 'fa-lock' : 'fa-play';
        let statusText = isPassed ? '¡Completado!' : isFailed ? 'Requiere reintento' : isLocked ? 'Bloqueado' : 'Listo para entrenar';

        container.innerHTML += `
            <div onclick="${!isLocked ? `openLesson(${i})` : ''}" class="day-item glass-card rounded-[2rem] p-4 flex items-center gap-4 border-2 ${isPassed ? 'border-emerald-100 bg-emerald-50/30' : isFailed ? 'failed' : isLocked ? 'opacity-40' : 'border-emerald-200 bg-emerald-50/50'}">
                <div class="w-10 h-10 rounded-2xl flex items-center justify-center font-black text-sm ${isPassed ? 'bg-emerald-500 text-white' : isFailed ? 'bg-rose-500 text-white' : 'bg-white text-slate-400'}">${i}</div>
                <div class="flex-1">
                    <h4 class="font-black text-slate-800 text-xs">${lesson ? lesson.title : `Día ${i}`}</h4>
                    <p class="text-[9px] font-bold text-slate-400 uppercase tracking-widest mt-0.5">${statusText}</p>
                </div>
                <i class="fa-solid ${icon} status-icon ${isPassed ? 'text-emerald-500' : isFailed ? 'text-rose-500' : 'text-slate-200'}"></i>
            </div>`;
    }
}

function openLesson(day) {
    currentLessonDay = day; currentTab = 'teoria';
    const lesson = currentChallenge.lessons.find(l => l.day === day);
    document.getElementById('lesson-header-title').innerText = `Día ${day}`;
    document.getElementById('lesson-header-sub').innerText = lesson.semanaLabel;
    renderLessonContent(lesson);
    showScreen('screen-lesson');
}

function renderLessonContent(lesson) {
    const replace = (s) => s.replace(/<DOG>/g, `<span class="brand-text">${dogName}</span>`);
    const container = document.getElementById('lesson-content');
    const chTracker = trackerData[currentChallenge.id] || {};
    const isPassed = chTracker[currentLessonDay] && chTracker[currentLessonDay].passed;

    let html = `
        <div class="flex border-b border-slate-100 mb-6 sticky top-0 bg-[#f8fafc] z-10">
            <button onclick="switchTab('teoria')" class="flex-1 tab-btn ${currentTab === 'teoria' ? 'active' : ''}">TEORÍA</button>
            <button onclick="switchTab('practica')" class="flex-1 tab-btn ${currentTab === 'practica' ? 'active' : ''}">PRÁCTICA</button>
        </div>
    `;

    if (currentTab === 'teoria') {
        html += `
            <div class="blob-container" id="audio-container">
                <div class="blob-shape"></div>
                <div class="blob-content">
                    <div id="audio-time" class="counter-text">0:${lesson.teoria.audioSeconds}</div>
                    <div onclick="toggleAudio(${lesson.teoria.audioSeconds})" class="action-trigger" id="audio-play-btn"><i class="fa-solid fa-play"></i></div>
                </div>
            </div>
            <div class="flex flex-wrap gap-2 justify-center mb-6">
                <span class="tag"><i class="fa-solid fa-clock text-emerald-500"></i> ${lesson.duracion}</span>
                <span class="tag"><i class="fa-solid fa-bolt text-rose-500"></i> ${lesson.nivel}</span>
                <span class="tag"><i class="fa-solid fa-bookmark text-blue-500"></i> ${lesson.categoria}</span>
            </div>
            <div class="space-y-4 px-2">
                <h3 class="font-black text-slate-900 text-xl leading-tight text-center">${replace(lesson.teoria.intro)}</h3>
                <p class="text-slate-500 text-sm leading-relaxed text-center">${replace(lesson.teoria.cuerpo)}</p>
                <div class="space-y-2 mt-6">
                    ${lesson.teoria.puntosClave.map(p => `<p class="text-xs font-bold text-slate-600 flex items-center gap-3 bg-white p-4 rounded-3xl border border-slate-100 shadow-sm"><i class="fa-solid fa-circle-check text-emerald-500"></i> ${replace(p)}</p>`).join('')}
                </div>
                <button onclick="switchTab('practica')" class="w-full brand-gradient text-white font-black py-5 rounded-[2rem] mt-8 shadow-xl shadow-emerald-100 active:scale-95 transition-all flex items-center justify-center gap-3">¡Entendido! Ir a la práctica <i class="fa-solid fa-arrow-right text-xs"></i></button>
            </div>`;
    } else {
        html += `
            <div class="blob-container" id="timer-container">
                <div class="blob-shape"></div>
                <div class="blob-content">
                    <div id="lesson-timer" class="counter-text">${Math.floor(lesson.practica.timerSeconds/60)}:00</div>
                    <div onclick="toggleTimer(${lesson.practica.timerSeconds})" class="action-trigger" id="timer-play-btn"><i class="fa-solid fa-play"></i></div>
                </div>
            </div>
            <div class="space-y-3">
                <h3 class="font-black text-slate-900 text-sm mb-2 ml-2 flex items-center gap-2"><i class="fa-solid fa-list-check text-emerald-500"></i> Pasos de hoy:</h3>
                ${lesson.practica.pasos.map((p, i) => `
                    <div class="bg-white rounded-[2rem] border border-slate-100 p-5 flex gap-4 shadow-sm">
                        <div class="step-badge">${i+1}</div>
                        <div>
                            <h4 class="font-black text-slate-900 text-xs flex items-center gap-2"><i class="fa-solid ${p.icon} text-emerald-500/50"></i> ${p.titulo}</h4>
                            <p class="text-[11px] text-slate-500 leading-relaxed mt-1">${replace(p.desc)}</p>
                        </div>
                    </div>`).join('')}
                
                <div class="mt-8 px-2 space-y-4">
                    <h3 class="font-black text-slate-400 text-[10px] uppercase tracking-widest ml-1">Tips de Experto</h3>
                    <div class="space-y-2">
                        ${lesson.tips.map(t => `<div class="bg-emerald-50/50 border-l-4 border-emerald-400 p-4 rounded-r-2xl text-[11px] font-semibold text-emerald-800 leading-relaxed">${replace(t)}</div>`).join('')}
                    </div>
                    <div class="bg-rose-50 border-l-4 border-rose-400 p-4 rounded-r-2xl text-left">
                        <h4 class="font-black text-rose-700 text-[10px] uppercase mb-1">${lesson.error.titulo}</h4>
                        <p class="text-[11px] text-rose-600 font-medium">${replace(lesson.error.desc)}</p>
                    </div>
                </div>
            </div>

            <div class="bg-amber-50 border-l-4 border-amber-400 p-6 rounded-r-[2.5rem] mt-10 shadow-sm">
                <span class="text-[9px] font-black uppercase text-amber-700 block mb-1 tracking-widest">La clave de hoy</span>
                <p class="text-xs font-bold italic text-amber-900 leading-tight">"${replace(lesson.resumen)}"</p>
            </div>
        `;

        // Lógica de visualización del botón: si ya pasó, mostramos estado; si no, botón completar.
        if (isPassed) {
            html += `<div class="mt-10 bg-emerald-500 text-white p-5 rounded-[2rem] text-center font-black text-sm shadow-xl flex items-center justify-center gap-3"><i class="fa-solid fa-circle-check"></i> ¡Día Superado con éxito!</div>`;
        } else {
            html += `<button onclick="openCompleteModal()" class="w-full bg-slate-900 text-white font-black py-5 rounded-[2rem] mt-10 shadow-2xl active:scale-95 transition-all">FINALIZAR SESIÓN</button>`;
        }
    }
    container.innerHTML = html + `<div class="h-12"></div>`;
}

function switchTab(tab) {
    currentTab = tab; clearInterval(audioInterval); clearInterval(timerInterval);
    audioInterval = null; timerInterval = null;
    renderLessonContent(currentChallenge.lessons.find(l => l.day === currentLessonDay));
    document.getElementById('screen-lesson').scrollTop = 0;
}

function toggleAudio(total) {
    const btn = document.getElementById('audio-play-btn'), container = document.getElementById('audio-container'), display = document.getElementById('audio-time');
    if (audioInterval) { clearInterval(audioInterval); audioInterval = null; btn.innerHTML = '<i class="fa-solid fa-play"></i>'; container.classList.remove('active-session'); }
    else { let time = total; container.classList.add('active-session'); btn.innerHTML = '<i class="fa-solid fa-pause"></i>';
        audioInterval = setInterval(() => { time--; let mins = Math.floor(time / 60), secs = time % 60; display.innerText = `${mins}:${secs.toString().padStart(2, '0')}`;
        if (time <= 0) { clearInterval(audioInterval); container.classList.remove('active-session'); btn.innerHTML = '<i class="fa-solid fa-rotate-right"></i>'; } }, 1000); }
}

function toggleTimer(total) {
    const btn = document.getElementById('timer-play-btn'), container = document.getElementById('timer-container'), display = document.getElementById('lesson-timer');
    if (timerInterval) { clearInterval(timerInterval); timerInterval = null; btn.innerHTML = '<i class="fa-solid fa-play"></i>'; container.classList.remove('active-session'); }
    else { let time = total; container.classList.add('active-session'); btn.innerHTML = '<i class="fa-solid fa-pause"></i>';
        timerInterval = setInterval(() => { time--; let mins = Math.floor(time / 60), secs = time % 60; display.innerText = `${mins}:${secs.toString().padStart(2, '0')}`;
        if (time <= 0) { clearInterval(timerInterval); container.classList.remove('active-session'); showToast("¡Excelente sesión!"); } }, 1000); }
}

function openCompleteModal() { document.getElementById('modal-complete').classList.remove('hidden'); }
function closeModal() { document.getElementById('modal-complete').classList.add('hidden'); }

function saveDay(result) {
    const passed = result !== 'dificil';
    if (!trackerData[currentChallenge.id]) trackerData[currentChallenge.id] = {};
    trackerData[currentChallenge.id][currentLessonDay] = { result, passed };
    localStorage.setItem(`eduDog_tracker_${dogName}`, JSON.stringify(trackerData));
    closeModal();
    showToast(passed ? `¡Día ${currentLessonDay} superado!` : `Sesión guardada para reintento`);
    renderHub(); renderDays(); showScreen('screen-challenge');
}

function showScreen(id) { document.querySelectorAll('.screen').forEach(s => s.classList.toggle('active', s.id === id)); }
function showToast(msg, type='success') {
    const t = document.getElementById('toast'); document.getElementById('toast-msg').innerText = msg;
    t.classList.remove('-translate-y-24', 'opacity-0'); t.classList.add('translate-y-0', 'opacity-100');
    setTimeout(() => { t.classList.add('-translate-y-24', 'opacity-0'); t.classList.remove('translate-y-0', 'opacity-100'); }, 3000);
}
</script>
</body>
</html>
