<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lectura: Prompt SESIÓN #1 | HR Digital</title>
    
    <!-- Frameworks Visuales -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    
    <!-- jQuery SIEMPRE primero -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    
    <!-- CSS de dFlip -->
    <link href="https://unpkg.com/dflip@2.2.21/css/dflip.min.css" rel="stylesheet">
    <link href="https://unpkg.com/dflip@2.2.21/css/themify-icons.min.css" rel="stylesheet">
    
    <style>
        body { background-color: #0f172a; margin: 0; overflow: hidden; }
        .glass-nav { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255, 255, 255, 0.1); }
        .df-ui-btn.df-ui-logo { display: none !important; } /* Ocultar logo */
        
        /* Contenedor explícito para el libro */
        #flipbookContainer {
            width: 100%;
            height: calc(100vh - 64px);
        }
    </style>
</head>
<body class="antialiased flex flex-col h-screen">

    <!-- Barra de Navegación -->
    <nav class="h-16 glass-nav flex items-center justify-between px-6 shrink-0 z-50">
        <a href="index.html" class="text-slate-400 hover:text-white font-bold flex items-center gap-2 transition-all">
            <i class="fa-solid fa-arrow-left"></i> <span class="hidden sm:inline">Volver a la Plataforma</span>
        </a>
        <h1 class="text-white font-extrabold tracking-tight">Prompt SESIÓN #1</h1>
        <div class="w-10 sm:w-48"></div>
    </nav>

    <!-- Contenedor del Libro 3D -->
    <main class="flex-1 w-full bg-slate-900">
        <!-- Div vacío donde JavaScript inyectará el libro -->
        <div id="flipbookContainer"></div>
    </main>

    <!-- Script de dFlip -->
    <script src="https://unpkg.com/dflip@2.2.21/js/dflip.min.js"></script>
    
    <script>
        // Configuración y ejecución manual
        var dFlipLocation = "https://unpkg.com/dflip@2.2.21/";
        
        // El link de tu PDF en Firebase
        var pdfLink = "https://firebasestorage.googleapis.com/v0/b/guias-facil-bot.firebasestorage.app/o/productos%2FPrompt%20SESION%20%231.pdf?alt=media&token=a0e0f588-75c7-48bc-891f-a1f122d211f4";

        $(document).ready(function () {
            // Verificamos si la librería cargó correctamente antes de llamarla
            if (typeof $.fn.flipBook === 'function') {
                var options = {
                    webgl: true,
                    backgroundColor: "#0f172a",
                    height: "100%",
                    duration: 800,
                    soundEnable: true
                };
                
                // Inicializamos el libro en el div contenedor
                $("#flipbookContainer").flipBook(pdfLink, options);
            } else {
                console.error("Error: La librería dFlip no se cargó correctamente.");
                // Fallback: Si la librería falla, mostramos el PDF normal
                $("#flipbookContainer").html(`<iframe src="${pdfLink}#toolbar=0" width="100%" height="100%" style="border: none;"></iframe>`);
            }
        });
    </script>

</body>
</html>
