<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduDog Pro - Entrenamiento Canino</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');

        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #e2e8f0; }

        .app-container {
            max-width: 420px; margin: 0 auto; height: 100dvh;
            position: relative; background: #ffffff;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
            overflow: hidden; display: flex; flex-direction: column;
        }

        .screen {
            display: none; flex: 1; flex-direction: column;
            animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            overflow-y: auto; overflow-x: hidden;
            background-color: #f8fafc;
        }
        .screen.active { display: flex; }
        ::-webkit-scrollbar { display: none; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        /* Emerald brand */
        .brand-bg { background: linear-gradient(135deg, #059669 0%, #064e3b 100%); }
        .brand-text { color: #059669; }
        .brand-border { border-color: #059669; }
        .brand-light { background-color: #ecfdf5; }
        .brand-btn { background-color: #059669; }
        .brand-btn:active { transform: scale(0.97); }

        /* Day states */
        .day-locked { opacity: 0.35; pointer-events: none; }
        .day-ready { border-color: #059669 !important; background: #ecfdf5 !important; cursor: pointer; }
        .day-done { background: #ffffff; border-color: #10b981; }
        .day-failed { background: #fff1f2; border-color: #f43f5e; cursor: pointer; }

        /* Progress ring */
        .ring-bg { stroke: #d1fae5; }
        .ring-fill { stroke: #059669; stroke-linecap: round; transition: stroke-dashoffset 1s ease; }

        /* Bounce in for trophy */
        @keyframes bounceIn {
            0% { transform: scale(0.3); opacity: 0; }
            50% { transform: scale(1.15); }
            100% { transform: scale(1); opacity: 1; }
        }
        .bounce-in { animation: bounceIn 0.6s cubic-bezier(0.36, 0.07, 0.19, 0.97) both; }

        /* Step number badge */
        .step-badge {
            width: 28px; height: 28px; border-radius: 50%;
            background: #059669; color: white;
            display: flex; align-items: center; justify-content: center;
            font-size: 12px; font-weight: 800; flex-shrink: 0;
        }

        /* Modal backdrop */
        .modal-bg { background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(4px); }

        /* Photo placeholder */
        .photo-hero {
            width: 100%; height: 200px;
            background: linear-gradient(135deg, #d1fae5 0%, #a7f3d0 50%, #6ee7b7 100%);
            border-radius: 1.5rem;
            display: flex; align-items: center; justify-content: center;
            position: relative; overflow: hidden;
        }
        
        /* Tip card */
        .tip-card { border-left: 3px solid #059669; }
        /* Error card */
        .error-card { border-left: 3px solid #ef4444; }

        /* ================= ANIMACIONES CUSTOM PARA LECCIONES ================= */
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-12px); } }
        .anim-float { animation: float 3s ease-in-out infinite; }
        
        @keyframes pulse-stop { 0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); } 70% { transform: scale(1.2); box-shadow: 0 0 0 15px rgba(239, 68, 68, 0); } 100% { transform: scale(1); } }
        .anim-pulse-stop { animation: pulse-stop 2s infinite; border-radius: 50%; }

        @keyframes bounce-spin { 0%, 100% { transform: translateY(0) rotate(0deg); } 50% { transform: translateY(-25px) rotate(180deg); } }
        .anim-bounce-spin { animation: bounce-spin 1.5s ease-in-out infinite; }

        @keyframes wiggle { 0%, 100% { transform: rotate(-10deg); } 50% { transform: rotate(10deg); } }
        .anim-wiggle { animation: wiggle 0.6s ease-in-out infinite; }
    </style>
</head>
<body class="antialiased text-slate-900 md:py-8">

</div>

<div class="app-container md:rounded-[2.5rem] md:border-[8px] md:border-slate-900">

                <div class="absolute bottom-0 left-0 w-24 h-24 bg-white/5 rounded-full translate-y-6 -translate-x-6"></div>
                <div class="relative z-10">

    <section id="screen-lesson" class="screen bg-[#f8fafc]">

                <button onclick="closeModal()" class="w-full text-slate-400 py-3 font-bold text-sm">Cancelar</button>

</div>

                ],

            }
        ]

];

// =============================================
// ESTADO DE LA APP
// =============================================
let dogName = '';
let currentChallenge = null;
let currentLessonDay = null;
let trackerData = {};

// =============================================
// INIT
// =============================================
document.addEventListener('DOMContentLoaded', () => {
    const savedName = localStorage.getItem('currentDogName');
    dogName = (savedName && savedName.trim() !== '') ? savedName : 'tu peludo';
    loadTrackerData();
    renderHub();
    showScreen('screen-hub');
});

function loadTrackerData() {
    const saved = localStorage.getItem(`menteCan_tracker_${dogName}`);
    trackerData = saved ? JSON.parse(saved) : {};
}

function saveTrackerData() {
    localStorage.setItem(`menteCan_tracker_${dogName}`, JSON.stringify(trackerData));
}

// =============================================
// HUB
// =============================================
function renderHub() {
    document.getElementById('hub-dog-name').innerText = `${dogName} 🐾`;

    let totalPassed = 0;
    let totalDays = 0;
    
    const container = document.getElementById('challenges-container');
    container.innerHTML = '';
    
    CHALLENGES.forEach(ch => {
        totalDays += ch.totalDays;
        const chTracker = trackerData[ch.id] || {};
        
        // Contamos solo los días marcados como "passed: true"
        const passedCount = Object.values(chTracker).filter(t => t.passed).length;
        totalPassed += passedCount;
        
        const pctCh = Math.round((passedCount / ch.totalDays) * 100);

        container.innerHTML += `
            <div onclick="openChallenge('${ch.id}')" class="bg-white rounded-3xl border border-slate-200 p-4 shadow-sm active:scale-[0.98] transition-all cursor-pointer">
                <div class="flex items-center gap-3">
                    <div class="w-12 h-12 brand-bg rounded-2xl flex items-center justify-center text-xl shrink-0">${ch.icon}</div>
                    <div class="flex-1 min-w-0">
                        <h4 class="font-extrabold text-slate-900 text-sm leading-tight">${ch.name}</h4>
                        <p class="text-[10px] text-slate-400 font-medium mt-0.5">${ch.totalDays} días · ${ch.desc}</p>
                        <div class="flex items-center gap-2 mt-2">
                            <div class="flex-1 bg-slate-100 rounded-full h-1.5 overflow-hidden">
                                <div class="bg-emerald-500 h-full rounded-full transition-all" style="width:${pctCh}%"></div>
                            </div>
                            <span class="text-[10px] font-black text-slate-400">${passedCount}/${ch.totalDays}</span>
                        </div>
                    </div>
                    <i class="fa-solid fa-chevron-right text-slate-300 text-xs"></i>
                </div>
            </div>`;
    });

    const pctTotal = totalDays > 0 ? Math.round((totalPassed / totalDays) * 100) : 0;
    document.getElementById('hub-progress-text').innerText = `${totalPassed} días completados`;
    document.getElementById('hub-progress-bar').style.width = pctTotal + '%';
}

// =============================================
// CHALLENGE DETAIL
// =============================================
function openChallenge(id) {
    currentChallenge = CHALLENGES.find(c => c.id === id);
    if (!currentChallenge) return;

    document.getElementById('challenge-title').innerText = currentChallenge.name;
    document.getElementById('challenge-icon-big').innerText = currentChallenge.icon;
    document.getElementById('challenge-name-big').innerText = currentChallenge.name;
    document.getElementById('challenge-desc-big').innerText = currentChallenge.desc;

    const chTracker = trackerData[currentChallenge.id] || {};
    const passedCount = Object.values(chTracker).filter(t => t.passed).length;
    const pct = Math.round((passedCount / currentChallenge.totalDays) * 100);
    
    document.getElementById('challenge-progress-bar').style.width = pct + '%';
    document.getElementById('challenge-progress-text').innerText = `${passedCount}/${currentChallenge.totalDays}`;

    renderDays();
    showScreen('screen-challenge');
}

function renderDays() {
    const chTracker = trackerData[currentChallenge.id] || {};
    
    // Calcula cuál es el día más alto que ya pasaron exitosamente
    let highestPassedDay = 0;
    Object.keys(chTracker).forEach(dayNum => {
        if (chTracker[dayNum].passed && parseInt(dayNum) > highestPassedDay) {
            highestPassedDay = parseInt(dayNum);
        }
    });

    const container = document.getElementById('days-container');
    container.innerHTML = '';

    for (let i = 1; i <= currentChallenge.totalDays; i++) {
        const lesson = currentChallenge.lessons.find(l => l.day === i);
        const track = chTracker[i];
        
        const isPassed = track && track.passed;
        const isFailed = track && !track.passed;
        
        // Un día está listo para jugarse si es el siguiente del último pasado, o si es un día fallido
        const isReady = i === highestPassedDay + 1 || isFailed;
        const isLocked = !isPassed && !isReady;
        const hasContent = !!lesson;

        let stateClass = isLocked ? 'day-locked' : isPassed ? 'day-done' : (isFailed ? 'day-failed' : 'day-ready');
        let clickFn = (!isLocked && hasContent) ? `openLesson(${i})` : '';

        // Icono a mostrar en el círculo
        let circleContent = i;
        let circleClass = 'bg-slate-100 text-slate-400';
        
        if (isPassed) {
            circleContent = '✓';
            circleClass = 'bg-emerald-500 text-white';
        } else if (isFailed) {
            circleContent = '↻';
            circleClass = 'bg-rose-500 text-white';
        } else if (isReady) {
            circleClass = 'bg-emerald-100 text-emerald-700';
        }

        const subtitle = isPassed ? `Completado` : isFailed ? `Requiere reintento 🔴` : isReady ? `⏱ ${lesson ? lesson.duracion : '10 min'} · Toca para comenzar` : 'Bloqueado';

        container.innerHTML += `
            <div onclick="${clickFn}" class="day-item bg-white rounded-2xl border-2 border-slate-100 p-4 flex items-center gap-3 ${stateClass} ${(!isLocked && hasContent) ? 'cursor-pointer' : ''}">
                <div class="w-9 h-9 rounded-xl flex items-center justify-center font-black text-sm shrink-0 ${circleClass}">
                    ${circleContent}
                </div>
                <div class="flex-1 min-w-0">
                    <h4 class="font-extrabold text-slate-900 text-sm leading-tight">${lesson ? lesson.title : `Día ${i}`}</h4>
                    <p class="text-[10px] text-slate-400 font-medium mt-0.5">
                        ${subtitle}
                        ${!hasContent && !isPassed ? ' · Próximamente' : ''}
                    </p>
                </div>
                ${isReady && !isFailed ? '<i class="fa-solid fa-play text-emerald-500 text-xs shrink-0"></i>' : ''}
            </div>`;
    }
}

// =============================================
// LESSON & UX FIX
// =============================================
function openLesson(dayNum) {
    const lesson = currentChallenge.lessons.find(l => l.day === dayNum);
    if (!lesson) return;
    currentLessonDay = dayNum;

    document.getElementById('lesson-header-title').innerText = `Día ${dayNum} · ${lesson.title}`;

    const chTracker = trackerData[currentChallenge.id] || {};
    const trackInfo = chTracker[dayNum];
    
    const replace = (str) => str.replace(/<DOG>/g, `<strong class="brand-text">${dogName}</strong>`);
    let html = '';

    // HERO ANIMATION / VIDEO
    if (lesson.heroAnimation) {
        html += `
            <div class="photo-hero flex flex-col items-center justify-center">
                <div class="mb-4 flex items-center justify-center">${lesson.heroAnimation}</div>
                <p class="text-emerald-800 font-extrabold text-sm px-6 text-center leading-tight">${lesson.heroTitle}</p>
            </div>`;
    }

    // INTRO & PASOS (Oculté fotoStep para mayor limpieza como acordamos)
    html += `
        <div class="bg-white rounded-2xl border border-slate-200 p-5 shadow-sm mt-5">
            <p class="text-slate-600 text-sm leading-relaxed font-medium">${replace(lesson.intro)}</p>
        </div>
        <div class="mt-5">
            <h3 class="font-extrabold text-slate-900 text-base mb-3">📋 Pasos de hoy</h3>
            <div class="space-y-3">`;
            
    lesson.pasos.forEach((paso, idx) => {
        html += `
            <div class="bg-white rounded-2xl border border-slate-200 p-4 shadow-sm">
                <div class="flex items-start gap-3">
                    <div class="step-badge shrink-0 mt-0.5">${idx + 1}</div>
                    <div class="flex-1">
                        <h4 class="font-extrabold text-slate-900 text-sm mb-1">${paso.emoji} ${paso.titulo}</h4>
                        <p class="text-slate-500 text-xs leading-relaxed">${replace(paso.desc)}</p>
                    </div>
                </div>
            </div>`;
    });
    html += '</div></div>';

    // TIPS PRO & ERROR
    html += `
        <div class="mt-5">
            <h3 class="font-extrabold text-slate-900 text-base mb-3">💡 Tip Pro</h3>
            <div class="tip-card bg-emerald-50 rounded-2xl p-4">
                <p class="text-emerald-800 text-xs font-medium leading-relaxed">${replace(lesson.tips[0])}</p>
            </div>
        </div>
        <div class="error-card bg-rose-50 rounded-2xl p-4 mt-5">
            <div class="flex items-start gap-2">
                <span class="text-lg shrink-0">⚠️</span>
                <div>
                    <h4 class="font-extrabold text-rose-700 text-sm mb-1">${lesson.errorTitulo}</h4>
                    <p class="text-rose-600 text-xs leading-relaxed">${replace(lesson.errorDesc)}</p>
                </div>
            </div>
        </div>`;

    // BOTONES CONDICIONALES (La lógica pedagógica)
    if (trackInfo) {
        if (trackInfo.passed) {
            const resultLabel = trackInfo.result === 'excelente' ? '🟢 Excelente' : '🟡 Bien hecho';
            html += `
                <div class="bg-emerald-50 rounded-2xl p-4 border border-emerald-100 text-center mt-5">
                    <p class="text-emerald-700 font-extrabold text-sm">✅ Día completado — ${resultLabel}</p>
                    <p class="text-emerald-600 text-xs mt-1 font-medium">¡${dogName} está avanzando! 🐾</p>
                    <button onclick="showScreen('screen-challenge')" class="mt-3 w-full bg-emerald-600 text-white font-bold py-3 rounded-xl text-sm active:scale-95 transition-all flex items-center justify-center gap-2">
                        <i class="fa-solid fa-arrow-left text-xs"></i> Volver al desafío
                    </button>
                </div>`;
        } else {
            // Estado Fallido (Marcó Difícil)
            html += `
                <div class="bg-rose-50 rounded-2xl p-4 border border-rose-100 text-center mt-5">
                    <p class="text-rose-700 font-extrabold text-sm">🔴 Día marcado como Difícil</p>
                    <p class="text-rose-600 text-xs mt-1 font-medium mb-4">Toma un respiro. Repetir la lección es clave para que ${dogName} aprenda sin estrés.</p>
                    <div class="space-y-3">
                        <button onclick="showScreen('screen-challenge')" class="w-full bg-white text-rose-600 border border-rose-200 font-bold py-3 rounded-xl text-sm active:scale-95 transition-all flex items-center justify-center gap-2 shadow-sm">
                            <i class="fa-solid fa-rotate-right text-xs"></i> Reintentar lección luego
                        </button>
                        <button onclick="forcePass(${dayNum})" class="w-full text-slate-400 font-bold py-2 text-xs active:scale-95 transition-all">
                            Forzar avance al siguiente día ➡️
                        </button>
                    </div>
                </div>`;
        }
    } else {
        // Estado Normal para Completar
        html += `
            <div class="mt-5">
                <button onclick="openCompleteModal()" class="w-full brand-btn text-white font-extrabold py-5 rounded-2xl transition-all text-base shadow-lg shadow-emerald-500/30 flex items-center justify-center gap-2">
                    <i class="fa-solid fa-check-circle"></i>
                    ¡Día ${dayNum} completado! 🎉
                </button>
            </div>`;
    }

    html += '<div class="h-4"></div>';
    document.getElementById('lesson-content').innerHTML = html;
    
    // FIX DE SCROLL: Primero mostramos la pantalla, luego la mandamos arriba
    showScreen('screen-lesson');
    document.getElementById('screen-lesson').scrollTop = 0;
}

// =============================================
// MODAL & GUARDADO
// =============================================
function openCompleteModal() {
    document.getElementById('modal-complete').classList.remove('hidden');
}

function closeModal() {
    document.getElementById('modal-complete').classList.add('hidden');
}

function saveDay(result) {
    if (!trackerData[currentChallenge.id]) trackerData[currentChallenge.id] = {};
    
    // Si marca difícil, NO pasa el día
    const passed = result !== 'dificil';
    
    trackerData[currentChallenge.id][currentLessonDay] = { result, passed, date: new Date().toISOString().split('T')[0] };
    saveTrackerData();
    closeModal();

    if (passed) {
        const passedCount = Object.values(trackerData[currentChallenge.id]).filter(t => t.passed).length;
        if (passedCount >= currentChallenge.totalDays) {
            showScreen('screen-victory');
        } else {
            showToast(`¡Buen trabajo con ${dogName}!`);
            openLesson(currentLessonDay);
            renderDays();
            renderHub();
        }
    } else {
        // Si marcó difícil
        showToast(`Día guardado. ¡Paciencia, ustedes pueden!`, 'error');
        openLesson(currentLessonDay); // Recarga para mostrar botones de reintento
        renderDays();
        renderHub();
    }
}

// Lógica de "Forzar avance"
function forcePass(dayNum) {
    trackerData[currentChallenge.id][dayNum].passed = true;
    saveTrackerData();
    showToast('Avance forzado. ¡Sigue adelante!');
    openLesson(dayNum);
    renderDays();
    renderHub();
}

function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.toggle('active', s.id === id));
}

function showToast(message, type = 'success') {
    const toast = document.getElementById('toast');
    const icon = document.getElementById('toast-icon');
    icon.className = type === 'error'
        ? 'fa-solid fa-circle-xmark text-rose-400 text-lg'
        : 'fa-solid fa-circle-check text-emerald-400 text-lg';
    document.getElementById('toast-msg').innerText = message;
    toast.classList.remove('-translate-y-24', 'opacity-0');
    toast.classList.add('translate-y-0', 'opacity-100');
    setTimeout(() => {
        toast.classList.remove('translate-y-0', 'opacity-100');
        toast.classList.add('-translate-y-24', 'opacity-0');
    }, 3000);
}
</script>
