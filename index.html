<!DOCTYPE html>
<html lang="es">
<head>
    <meta name="facebook-domain-verification" content="s4tbmttewxhmxcv7er5qjphojggb6c" />
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduDog Pro - Micro SaaS Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #e2e8f0; }
        .app-container { max-width: 420px; margin: 0 auto; height: 100vh; min-height: 100vh; position: relative; background: #ffffff; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25); overflow: hidden; display: flex; flex-direction: column; }
        .screen { display: none; flex: 1; flex-direction: column; animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1); overflow-y: auto; overflow-x: hidden; background-color: #f8fafc; }
        .screen.active { display: flex; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        ::-webkit-scrollbar { display: none; }
        .premium-input:focus-within { box-shadow: 0 0 0 4px rgba(124, 58, 237, 0.15); border-color: #8b5cf6; }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        .loader-dots div { animation-timing-function: cubic-bezier(0, 1, 1, 0); }
        .loader-dots div:nth-child(1) { left: 8px; animation: loader-dots1 0.6s infinite; }
        .loader-dots div:nth-child(2) { left: 8px; animation: loader-dots2 0.6s infinite; }
        .loader-dots div:nth-child(3) { left: 32px; animation: loader-dots2 0.6s infinite; }
        .loader-dots div:nth-child(4) { left: 56px; animation: loader-dots3 0.6s infinite; }
        @keyframes loader-dots1 { 0% { transform: scale(0); } 100% { transform: scale(1); } }
        @keyframes loader-dots3 { 0% { transform: scale(1); } 100% { transform: scale(0); } }
        @keyframes loader-dots2 { 0% { transform: translate(0, 0); } 100% { transform: translate(24px, 0); } }
    </style>
</head>
<body class="antialiased text-slate-900 md:py-8">
    <div id="toast" class="fixed top-6 left-1/2 -translate-x-1/2 bg-slate-900 text-white px-5 py-3 rounded-full shadow-2xl z-50 transform -translate-y-24 opacity-0 transition-all duration-300 flex items-center gap-3 font-semibold text-sm pointer-events-none w-max max-w-[90%]">
        <i id="toast-icon" class="fa-solid fa-circle-check text-emerald-400 text-lg"></i>
        <span id="toast-msg">Mensaje</span>
    </div>

    <div class="app-container md:rounded-[2.5rem] md:border-[8px] md:border-slate-900 relative">
        <section id="screen-login" class="screen active relative bg-slate-50">
            <div class="absolute top-0 left-0 w-full h-96 bg-gradient-to-br from-violet-600 to-slate-900 rounded-b-[4rem] opacity-100 z-0"></div>
            <div class="relative z-10 flex flex-col justify-center px-8 pt-20 pb-10 min-h-full">
                <div class="text-center mb-10">
                    <div class="w-24 h-24 bg-white/10 backdrop-blur-md rounded-[2.5rem] border border-white/20 flex items-center justify-center mx-auto mb-6 shadow-2xl relative">
                        <div class="absolute inset-0 bg-gradient-to-tr from-violet-500 to-amber-400 rounded-[2.5rem] opacity-20 animate-pulse"></div>
                        <i class="fa-solid fa-shield-dog text-[2.75rem] text-white drop-shadow-lg"></i>
                    </div>
                    <h1 class="text-3xl font-extrabold text-white tracking-tight">EduDog Pro</h1>
                    <p class="text-violet-200 font-medium mt-2 text-sm">Ecosistema Canino Inteligente</p>
                </div>
                <div class="bg-white p-6 rounded-[2rem] shadow-xl shadow-slate-200/50 space-y-5">
                    <div class="space-y-1.5">
                        <label class="text-[11px] font-bold text-slate-400 uppercase tracking-widest ml-2">Tu Celular</label>
                        <div class="relative group premium-input transition-all rounded-2xl border border-slate-200 flex bg-slate-50/50 overflow-hidden">
                            <select id="country-code" class="h-full bg-transparent text-slate-600 font-bold pl-3 pr-6 py-4 outline-none appearance-none cursor-pointer text-sm border-r border-slate-200 w-[95px]">
                                <option value="51">🇵🇪 +51</option>
                                <option value="52">🇲🇽 +52</option>
                                <option value="57">🇨🇴 +57</option>
                                <option value="54">🇦🇷 +54</option>
                                <option value="1">🇺🇸 +1</option>
                            </select>
                            <input type="number" id="login-phone" placeholder="971 337 730" class="flex-1 bg-transparent text-slate-900 py-4 px-4 outline-none font-bold text-lg">
                        </div>
                    </div>
                    <div class="space-y-1.5">
                        <label class="text-[11px] font-bold text-slate-400 uppercase tracking-widest ml-2">PIN Secreto</label>
                        <div class="relative premium-input rounded-2xl border border-slate-200">
                            <input type="password" id="login-pin" maxlength="4" placeholder="••••" class="w-full bg-slate-50/50 text-slate-900 rounded-2xl py-4 pl-12 pr-4 outline-none font-black text-2xl tracking-[0.5em]">
                        </div>
                    </div>
                    <button onclick="handleLoginButton()" id="btn-login" class="w-full bg-slate-900 text-white font-bold py-4 rounded-2xl active:scale-95 transition-all text-[15px] relative overflow-hidden">
                        <span id="btn-text">Ingresar a mi cuenta</span>
                        <div id="btn-loader" class="hidden absolute inset-0 bg-slate-900 flex items-center justify-center"><div class="loader-dots relative w-20 h-5"><div></div><div></div><div></div><div></div></div></div>
                    </button>
                </div>
            </div>
        </section>

        <section id="screen-welcome" class="screen relative bg-slate-50">
            <div class="absolute top-0 left-0 w-full h-96 bg-gradient-to-br from-violet-600 to-slate-900 rounded-b-[4rem] z-0"></div>
            <div class="relative z-10 flex flex-col justify-center px-8 pt-20 pb-10 min-h-full">
                <div class="text-center mb-10">
                    <h2 class="text-3xl font-extrabold text-white">¡Bienvenido! 🎉</h2>
                    <p class="text-violet-200 mt-2 text-sm">Personalicemos tu experiencia</p>
                </div>
                <div class="bg-white p-6 rounded-[2rem] shadow-xl space-y-5">
                    <div class="space-y-1.5">
                        <label class="text-[11px] font-bold text-slate-400 uppercase tracking-widest ml-2">¿Cómo se llama tu peludo?</label>
                        <input type="text" id="welcome-dog-name" placeholder="Ej. Firulais" class="w-full bg-slate-50/50 text-slate-900 rounded-2xl py-4 px-4 border border-slate-200 outline-none font-bold text-lg">
                    </div>
                    <button onclick="saveWelcomeName()" id="btn-welcome" class="w-full bg-slate-900 text-white font-bold py-4 rounded-2xl active:scale-95 transition-all">Comenzar Entrenamiento</button>
                </div>
            </div>
        </section>

        <section id="screen-hub" class="screen bg-[#f8fafc]">
            <div class="sticky top-0 bg-white/80 backdrop-blur-xl border-b border-slate-100 px-6 py-4 flex justify-between items-center z-30">
                <h2 class="font-extrabold text-slate-900 text-sm">EduDog Pro Hub</h2>
                <button onclick="logout()" class="w-9 h-9 bg-slate-100 rounded-full flex items-center justify-center text-slate-500"><i class="fa-solid fa-right-from-bracket"></i></button>
            </div>
            <div class="flex-1 px-5 py-6 space-y-6">
                <div class="bg-slate-900 rounded-[2rem] p-6 text-white shadow-xl relative overflow-hidden">
                    <div class="relative z-10">
                        <p class="text-violet-300 text-[10px] font-black uppercase tracking-widest mb-1" id="user-display-phone">+51 000 000 000</p>
                        <h3 class="text-xl font-black tracking-tight leading-tight"><span id="display-dog-name">Tu Peludo</span> 🐾</h3>
                        <div class="mt-4 bg-white/10 p-4 rounded-2xl backdrop-blur-sm border border-white/10">
                            <div class="flex justify-between items-center text-xs font-bold mb-2"><span class="text-slate-200">Progreso Pro</span><span id="apps-count" class="text-white">1/1</span></div>
                            <div class="w-full bg-slate-800 rounded-full h-1.5 overflow-hidden"><div id="progress-bar" class="bg-amber-400 h-full rounded-full" style="width: 100%"></div></div>
                        </div>
                    </div>
                </div>
                <div id="tools-container" class="space-y-4"></div>
                <div><h3 class="font-extrabold text-slate-900 text-lg mb-4">Biblioteca Interactiva</h3><div id="ebooks-container" class="space-y-4"></div></div>
            </div>
        </section>

        <div id="modal-upsell" class="hidden absolute inset-0 z-[100] bg-slate-900/80 backdrop-blur-sm flex-col justify-end transition-all">
            <div class="bg-white rounded-t-[2.5rem] p-8 transform translate-y-full transition-transform duration-300" id="upsell-content">
                <div class="flex items-center gap-4 mb-6">
                    <div id="upsell-icon-container" class="w-16 h-16 rounded-2xl flex items-center justify-center text-3xl shadow-inner">
                        <i id="upsell-icon" class="fa-solid fa-star"></i>
                    </div>
                    <div>
                        <h3 id="upsell-title" class="text-xl font-black text-slate-900 leading-tight">Nombre App</h3>
                        <p id="upsell-subtitle" class="text-xs font-bold text-slate-400 mt-1">Subtítulo</p>
                    </div>
                </div>
                
                <h4 class="font-black text-sm text-slate-800 mb-3 flex items-center gap-2">
                    <i class="fa-solid fa-circle-check text-emerald-500"></i> ¿Qué incluye tu acceso?
                </h4>
                <ul id="upsell-benefits" class="space-y-2.5 mb-8 text-sm text-slate-600 font-medium">
                    </ul>

                <div class="space-y-3">
                    <button id="btn-confirm-upsell" class="w-full text-white font-black py-4 rounded-2xl text-[15px] shadow-lg active:scale-95 transition-all flex justify-center items-center gap-2">
                        Desbloquear por <span id="upsell-price">S/ 0</span>
                    </button>
                    <button onclick="closeUpsellModal()" class="w-full text-slate-400 font-bold py-3 text-sm active:scale-95 transition-transform">
                        Cancelar
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = "https://bot-cursos-digitales-500394828639.southamerica-west1.run.app";
        const TIPO_CAMBIO = 3.50; 
        
        const appsList = [
            { id: "nutrican", name: "NutriCan Vital", subtitle: "Calculadora de Dieta Natural", desc: "Calculadora exacta de dieta natural.", icon: "fa-bowl-food", color: "text-amber-600", bg: "bg-amber-100", price: "9.99", themeBtn: "bg-amber-500 shadow-amber-500/30", benefits: ["Porciones exactas según peso y edad", "Transición segura sin problemas gástricos", "Monitoreo de digestión diaria", "Acceso de por vida desde tu celular"] },
            { id: "mentecan", name: "Mentecan Vital", subtitle: "Programa de Psicología y Obediencia", desc: "Programa premium de psicología y obediencia.", icon: "fa-brain", color: "text-emerald-600", bg: "bg-emerald-100", price: "14.99", themeBtn: "bg-emerald-500 shadow-emerald-500/30", benefits: ["Retos prácticos de 7 días", "Audios de psicología canina", "Solución definitiva a mordiscos", "Comandos visuales y de voz efectivos"] }
        ];
        
        const ebooksList = [
            { id: "nutrichef", name: "NutriChef Vital", subtitle: "Recetario Dinámico y Compras", desc: "Recetario dinámico interactivo.", icon: "fa-fire-burner", color: "text-rose-600", bg: "bg-rose-100", price: "4.99", themeBtn: "bg-rose-500 shadow-rose-500/30", benefits: ["50 Recetas Premium (Desayuno, Almuerzo, Cena)", "Modo 'Chef' con temporizadores en pantalla", "Ingredientes adaptados a tu país", "Lista de compras automática para WhatsApp"] }
        ];
        
        let currentUser = null;

        document.addEventListener('DOMContentLoaded', () => {
            const savedSession = localStorage.getItem('eduDogSession');
            if(savedSession) { const creds = JSON.parse(savedSession); performLogin(creds.phone, creds.pin, true); }
        });

        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            document.getElementById('toast-msg').innerText = message;
            toast.classList.remove('-translate-y-24', 'opacity-0');
            toast.classList.add('translate-y-0', 'opacity-100');
            setTimeout(() => { toast.classList.remove('translate-y-0', 'opacity-100'); toast.classList.add('-translate-y-24', 'opacity-0'); }, 3000);
        }

        async function handleLoginButton() {
            const phoneInput = document.getElementById('login-phone').value;
            const codeInput = document.getElementById('country-code').value;
            const pinInput = document.getElementById('login-pin').value;
            if(!phoneInput || !pinInput) { showToast('Completa todos los datos', 'error'); return; }
            const btnText = document.getElementById('btn-text'); const btnLoader = document.getElementById('btn-loader');
            btnText.classList.add('opacity-0'); btnLoader.classList.remove('hidden');
            await performLogin(`${codeInput}${phoneInput}`, pinInput, false);
            btnText.classList.remove('opacity-0'); btnLoader.classList.add('hidden');
        }

        async function performLogin(phone, pin, isAutoLoad = false) {
            try {
                const response = await fetch(`${API_URL}/api/hub/login`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ telefono: phone, pin: pin }) });
                const data = await response.json();
                if (response.ok && data.status === 'ok') {
                    currentUser = { phone, pin, dogName: data.dogName, apps: data.apps || [], ebooks: data.ebooks || [] };
                    localStorage.setItem('eduDogSession', JSON.stringify(currentUser));
                    if (currentUser.dogName) { renderHub(); showScreen('screen-hub'); } else { showScreen('screen-welcome'); }
                } else if (!isAutoLoad) { showToast('Acceso denegado', 'error'); }
            } catch (e) { if(!isAutoLoad) showToast('Error de servidor', 'error'); }
        }

        async function saveWelcomeName() {
            const name = document.getElementById('welcome-dog-name').value;
            if(!name) { showToast('Ingresa un nombre', 'error'); return; }
            try {
                const response = await fetch(`${API_URL}/api/hub/perfil`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ telefono: currentUser.phone, pin: currentUser.pin, dogName: name }) });
                if (response.ok) { currentUser.dogName = name; localStorage.setItem('eduDogSession', JSON.stringify(currentUser)); renderHub(); showScreen('screen-hub'); } else { showToast('Error al guardar', 'error'); }
            } catch (e) { showToast('Error de conexión', 'error'); }
        }

        function renderHub() {
            document.getElementById('user-display-phone').innerText = `+${currentUser.phone}`;
            document.getElementById('display-dog-name').innerText = `Entrenamiento de ${currentUser.dogName}`;
            
            const getPrice = (usd) => currentUser.phone.startsWith('51') ? { text: `S/ ${Math.round(usd * TIPO_CAMBIO)}` } : { text: `$${usd} USD` };

            // Progreso Pro Dinámico
            const purchasedAppsCount = currentUser.apps.filter(appId => appsList.some(a => a.id === appId)).length;
            document.getElementById('apps-count').innerText = `${purchasedAppsCount}/${appsList.length}`;
            const progressPct = (purchasedAppsCount / appsList.length) * 100;
            document.getElementById('progress-bar').style.width = `${progressPct}%`;

            const appsContainer = document.getElementById('tools-container');
            appsContainer.innerHTML = '';
            appsList.forEach(app => {
                const owned = currentUser.apps.includes(app.id);
                const priceObj = getPrice(app.price);
                
                const cardBg = owned ? "bg-white border-slate-200" : "bg-slate-50 border-slate-100 opacity-90";
                const iconContainerBg = owned ? app.bg : "bg-slate-100";
                const iconColor = owned ? app.color : "text-slate-400";
                const titleColor = owned ? "text-slate-900" : "text-slate-600";
                const descColor = owned ? "text-slate-500" : "text-slate-400";

                appsContainer.innerHTML += `
                    <div class="${cardBg} p-5 rounded-3xl border shadow-sm transition-all duration-300">
                        <div class="flex items-center gap-3 mb-2">
                            <div class="w-10 h-10 rounded-xl flex items-center justify-center ${iconContainerBg} ${iconColor} transition-colors"><i class="fa-solid ${app.icon}"></i></div>
                            <h4 class="font-extrabold ${titleColor}">${app.name}</h4>
                        </div>
                        <p class="text-xs ${descColor} mb-4 ml-1">${app.desc}</p>
                        ${owned ? `<button onclick="openApp('${app.id}')" class="w-full bg-slate-900 text-white py-3 rounded-xl font-bold active:scale-95 transition-transform">Abrir App</button>` : 
                        `<button onclick="openUpsellModal('${app.id}', 'herramienta')" class="w-full bg-violet-100 text-violet-800 py-3 rounded-xl font-bold border border-violet-200 shadow-inner active:scale-95 transition-transform flex items-center justify-center gap-2">
                            <i class="fa-solid fa-lock text-sm"></i> Desbloquear por ${priceObj.text}
                        </button>`}
                    </div>`;
            });

            const ebooksContainer = document.getElementById('ebooks-container');
            ebooksContainer.innerHTML = '';
            ebooksList.forEach(ebook => {
                const owned = currentUser.ebooks.includes(ebook.id);
                const priceObj = getPrice(ebook.price);
                
                const cardBg = owned ? "bg-white border-slate-200" : "bg-slate-50 border-slate-100 opacity-90";
                const iconContainerBg = owned ? ebook.bg : "bg-slate-100";
                const iconColor = owned ? ebook.color : "text-slate-400";
                const titleColor = owned ? "text-slate-900" : "text-slate-600";
                const descColor = owned ? "text-slate-500" : "text-slate-400";

                ebooksContainer.innerHTML += `
                    <div class="${cardBg} p-5 rounded-3xl border shadow-sm transition-all duration-300">
                        <div class="flex items-center gap-3 mb-2">
                            <div class="w-10 h-10 rounded-xl flex items-center justify-center ${iconContainerBg} ${iconColor} transition-colors"><i class="fa-solid ${ebook.icon}"></i></div>
                            <h4 class="font-extrabold ${titleColor}">${ebook.name}</h4>
                        </div>
                        <p class="text-xs ${descColor} mb-4 ml-1">${ebook.desc}</p>
                        ${owned ? `<button onclick="openApp('${ebook.id}')" class="w-full bg-slate-900 text-white py-3 rounded-xl font-bold active:scale-95 transition-transform">Abrir Recetario</button>` : 
                        `<button onclick="openUpsellModal('${ebook.id}', 'eBook')" class="w-full bg-rose-100 text-rose-800 py-3 rounded-xl font-bold border border-rose-200 shadow-inner active:scale-95 transition-transform flex items-center justify-center gap-2">
                            <i class="fa-solid fa-lock text-sm"></i> Desbloquear por ${priceObj.text}
                        </button>`}
                    </div>`;
            });
        }

        let pendingUpsellItem = null;

        function openUpsellModal(id, type) {
            const item = type === 'herramienta' ? appsList.find(a => a.id === id) : ebooksList.find(e => e.id === id);
            if(!item) return;

            pendingUpsellItem = { item: item, type: type };
            const isPeru = currentUser.phone.startsWith('51');
            const priceText = isPeru ? `S/ ${Math.round(item.price * TIPO_CAMBIO)}` : `$${item.price} USD`;

            document.getElementById('upsell-icon').className = `fa-solid ${item.icon} ${item.color}`;
            document.getElementById('upsell-icon-container').className = `w-16 h-16 rounded-2xl flex items-center justify-center text-3xl shadow-inner ${item.bg}`;
            document.getElementById('upsell-title').innerText = item.name;
            document.getElementById('upsell-subtitle').innerText = item.subtitle;
            document.getElementById('upsell-price').innerText = priceText;
            
            const btnConfirm = document.getElementById('btn-confirm-upsell');
            btnConfirm.className = `w-full text-white font-black py-4 rounded-2xl text-[15px] shadow-lg active:scale-95 transition-all flex justify-center items-center gap-2 ${item.themeBtn}`;

            const ul = document.getElementById('upsell-benefits'); ul.innerHTML = '';
            item.benefits.forEach(b => { ul.innerHTML += `<li class="flex items-start gap-2"><i class="fa-solid fa-check mt-1 text-emerald-500 text-xs"></i> <span>${b}</span></li>`; });

            const modal = document.getElementById('modal-upsell'); modal.classList.remove('hidden'); modal.classList.add('flex');
            setTimeout(() => { document.getElementById('upsell-content').classList.remove('translate-y-full'); }, 10);
            
            // Pasamos el ID del item a la función openUpsell
            btnConfirm.onclick = () => { openUpsell(item.id, item.name, isPeru ? Math.round(item.price * TIPO_CAMBIO) : item.price, isPeru ? 'PEN' : 'USD', type); };
        }

        function closeUpsellModal() {
            document.getElementById('upsell-content').classList.add('translate-y-full');
            setTimeout(() => { const modal = document.getElementById('modal-upsell'); modal.classList.add('hidden'); modal.classList.remove('flex'); pendingUpsellItem = null; }, 300);
        }

        function openApp(id) { localStorage.setItem('currentDogName', currentUser.dogName); window.location.href = `${id}.html`; }

        function openUpsell(itemId, itemName, itemPrice, currency, type) {
            const itemTypeLabel = type === 'eBook' ? 'el eBook' : 'la herramienta';
            const priceText = currency === 'PEN' ? `S/ ${itemPrice}` : `$${itemPrice} USD`;
            
            // Agregamos [ID: nutrican] al final del mensaje
            const msg = `Hola Soporte 👋\n\nQuiero desbloquear ${itemTypeLabel} *${itemName}* por ${priceText}.\n\n👤 Mi cuenta es: +${currentUser.phone}\n💳 ¿Me dan los pasos para pagar?\n\n[ID: ${itemId}]`;
            window.open(`https://wa.me/51932335202?text=${encodeURIComponent(msg)}`, '_blank');
        }

        function showScreen(id) { document.querySelectorAll('.screen').forEach(s => s.classList.toggle('active', s.id === id)); }
        function logout() { localStorage.clear(); location.reload(); }
    </script>
</body>
</html>
