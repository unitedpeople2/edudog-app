<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mentecan Vital - Entrenamiento Premium</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap');

        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f1f5f9; color: #1e293b; -webkit-user-select: none; user-select: none; }

        .app-container {
            max-width: 420px; margin: 0 auto; height: 100dvh;
            position: relative; background: #ffffff;
            overflow: hidden; display: flex; flex-direction: column;
        }

        .screen {
            display: none; flex: 1; flex-direction: column;
            animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            overflow-y: auto; overflow-x: hidden; background-color: #f8fafc;
        }
        .screen.active { display: flex; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Estética Premium Mentecan Vital */
        .brand-gradient { 
            background: linear-gradient(160deg, #0f3041 0%, #124c5c 30%, #108560 60%, #10b981 100%); 
            position: relative; overflow: hidden; 
        }
        .brand-gradient::before {
            content: ''; position: absolute; top: -30%; left: -40%; width: 100%; height: 100%;
            background: radial-gradient(circle, rgba(16, 185, 129, 0.5) 0%, rgba(16, 185, 129, 0) 70%);
            border-radius: 50%; z-index: 1; transform: scale(1.4);
        }

        /* Pestañas (Idénticas a la captura) */
        .sticky-tabs { position: sticky; top: 0; background-color: #ffffff; z-index: 30; border-bottom: 1px solid #f1f5f9; }
        .tab-btn { padding-bottom: 0.8rem; padding-top: 0.8rem; font-weight: 800; font-size: 0.8rem; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.05em; transition: color 0.2s; position: relative; }
        .tab-btn.active { color: #059669; }
        .tab-btn.active::after { content: ''; position: absolute; bottom: -1px; left: 10%; width: 80%; height: 3px; background-color: #059669; border-radius: 3px 3px 0 0; }

        /* REPRODUCTOR Y TIMER */
        .blob-container {
            position: relative; width: 150px; height: 150px; 
            margin: 20px auto; display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .blob-shape {
            position: absolute; inset: 0; background: rgba(16, 185, 129, 0.08); border: 1.5px solid rgba(16, 185, 129, 0.15); border-radius: 42% 58% 70% 30% / 45% 45% 55% 55%; transition: all 1s ease-in-out; z-index: 1;
        }
        .active-session .blob-shape { animation: breathe 4s ease-in-out infinite; background: rgba(16, 185, 129, 0.15); border-color: #10b981; }
        @keyframes breathe { 0%, 100% { border-radius: 42% 58% 70% 30% / 45% 45% 55% 55%; transform: scale(1); } 50% { border-radius: 58% 42% 38% 62% / 55% 55% 45% 45%; transform: scale(1.06); } }
        
        .action-trigger { position: relative; z-index: 10; width: 48px; height: 48px; background: #108560; color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 8px 12px -2px rgba(16, 133, 96, 0.3); cursor: pointer; transition: transform 0.2s; font-size: 1.2rem; }
        .action-trigger:active { transform: scale(0.92); }

        /* Pasos de Hoy (Idéntico a captura) */
        .step-circle { width: 30px; height: 30px; border-radius: 50%; background: #108560; color: white; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 800; flex-shrink: 0; box-shadow: 0 2px 5px rgba(16, 133, 96, 0.4); }

        .modal-bg { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(5px); }
    </style>
</head>
<body class="md:py-8">

<div id="toast" class="fixed top-20 left-1/2 -translate-x-1/2 bg-slate-900 text-white px-6 py-3 rounded-full shadow-2xl z-[100] transform -translate-y-24 opacity-0 transition-all duration-300 flex items-center gap-3 font-bold text-sm pointer-events-none">
    <i id="toast-icon" class="fa-solid fa-circle-check text-emerald-400"></i>
    <span id="toast-msg">Mensaje</span>
</div>

<div class="app-container md:rounded-[2.5rem] md:border-[8px] md:border-slate-900 shadow-2xl">

    <div id="app-header" class="brand-gradient text-white px-5 py-4 flex items-center justify-between z-50 relative shrink-0 shadow-md">
        <button id="btn-header-back" onclick="goBack()" class="w-10 h-10 bg-white/20 hover:bg-white/30 rounded-xl flex items-center justify-center backdrop-blur-md active:scale-95 transition-all cursor-pointer">
            <i class="fa-solid fa-chevron-left"></i>
        </button>
        
        <div class="text-center flex-1">
            <h2 class="font-black text-base tracking-tight flex justify-center items-center gap-2">Mentecan Vital</h2>

        <button onclick="showScreen('screen-hub')" class="w-10 h-10 bg-white/20 hover:bg-white/30 rounded-xl flex items-center justify-center backdrop-blur-md active:scale-95 transition-all cursor-pointer">

        </button>
    </div>

    <section id="screen-hub" class="screen">

                    <p class="text-emerald-100 text-[9px] font-black uppercase tracking-widest mb-1.5 opacity-80">Entrenamiento activo</p>

                        <div class="w-full bg-white/15 rounded-full h-2 overflow-hidden"><div id="hub-progress-bar" class="bg-white h-full transition-all duration-1000 shadow-inner" style="width:0%"></div></div>
                    </div>
                </div>
            </div>
            
            <h3 class="font-black text-slate-900 text-base mb-2 mt-4">Retos de 7 Días</h3>
            <div id="challenges-container" class="space-y-4"></div>
        </div>
    </section>

    <section id="screen-challenge" class="screen">
        <div class="px-6 pt-6 pb-2">
            <h2 class="text-2xl font-black text-slate-900 tracking-tight" id="challenge-screen-title">Cargando...</h2>
            <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mt-1 mb-5">Plan de 7 días</p>
            
            <div class="bg-gradient-to-br from-emerald-50 to-teal-100/50 rounded-[1.5rem] p-5 border border-emerald-100 shadow-sm relative overflow-hidden">
                <div class="absolute -right-4 -top-4 text-emerald-500/10 text-6xl"><i class="fa-solid fa-bullseye"></i></div>
                <p class="text-[9px] font-black uppercase text-emerald-600 tracking-widest mb-1.5 relative z-10">¿Qué vamos a lograr?</p>
                <p class="text-xs font-bold text-emerald-900 leading-relaxed relative z-10" id="challenge-intro-text">Cargando logros del reto...</p>
            </div>
        </div>
        
        <div id="days-container" class="px-6 py-4 space-y-3 pb-8"></div>
    </section>

    <section id="screen-lesson" class="screen relative">
        <div id="lesson-content" class="pb-10"></div>
    </section>

    <div id="modal-complete" class="hidden absolute inset-0 z-50 modal-bg flex flex-col justify-end">
        <div class="bg-white rounded-t-[2.5rem] p-8 shadow-2xl">
            <div class="text-center mb-8"><div class="text-5xl mb-3">✨</div><h3 class="text-2xl font-black text-slate-900 tracking-tight">¿Cómo fue la sesión?</h3><p class="text-slate-400 text-sm font-medium mt-1">Tu honestidad garantiza un aprendizaje real.</p></div>
            <div class="space-y-3">
                <button onclick="saveDay('excelente')" class="w-full bg-emerald-50 text-emerald-800 p-5 rounded-3xl font-black text-sm border border-emerald-100 flex items-center justify-between active:scale-95 transition-all shadow-sm"><span><i class="fa-solid fa-star mr-2 text-emerald-600"></i> ¡Excelente progreso!</span><i class="fa-solid fa-chevron-right opacity-30"></i></button>
                <button onclick="saveDay('bien')" class="w-full bg-amber-50 text-amber-800 p-5 rounded-3xl font-black text-sm border border-amber-100 flex items-center justify-between active:scale-95 transition-all shadow-sm"><span><i class="fa-solid fa-thumbs-up mr-2 text-amber-500"></i> Estuvo bien</span><i class="fa-solid fa-chevron-right opacity-30"></i></button>
                <button onclick="saveDay('dificil')" class="w-full bg-rose-50 text-rose-800 p-5 rounded-3xl font-black text-sm border border-rose-100 flex items-center justify-between active:scale-95 transition-all shadow-sm"><span><i class="fa-solid fa-triangle-exclamation mr-2 text-rose-600"></i> Difícil - Reintentar</span><i class="fa-solid fa-chevron-right opacity-30"></i></button>
                <button onclick="closeModal()" class="w-full text-slate-400 py-4 font-bold text-sm active:scale-95 transition-transform">Cancelar</button>
            </div>
        </div>
    </div>
</div>

<script>
// =============================================
// CONTENIDO PREMIUM ALTAMENTE PERSUASIVO
// =============================================
const CHALLENGES = [
    {
        id: 'no-muerda', name: 'No muerda las cosas', icon: '🦷', totalDays: 7, desc: 'Educa su boca y protege tu hogar',
        introAchieve: 'Transformaremos su instinto destructivo en un comportamiento controlado y seguro. Salva tus zapatos, protege tu hogar y crea un vínculo de respeto absoluto.',
        lessons: [
            { 
                day: 1, title: 'El código de su mente', semanaLabel: 'Fase 1: Diagnóstico', duracion: '10 min', nivel: 'Fácil', categoria: 'Psicología', icon: 'fa-magnifying-glass', 
                teoria: { audioSeconds: 60, intro: "La Psicología del Mordisco 🧠", cuerpo: "Tu perro no destruye por rebeldía o para castigarte. Usa su mandíbula como tú usas tus manos: para explorar, liberar ansiedad y descargar energía estancada. Si solo le dices 'NO', le quitas su herramienta sin darle soluciones, generando más frustración. Hoy cambiamos las reglas: dejamos de reaccionar para empezar a observar estratégicamente.", puntosClave: ["La información es poder: Identificar qué muerde revela qué necesita.", "No hay maldad, hay instinto: Morder es su válvula de escape biológica.", "Regla de Oro hoy: Cero correcciones. Solo observa y analiza."] }, 
                practica: { timerSeconds: 600, pasos: [
                    { titulo: 'Fase de observación pasiva', desc: 'Actúa como un espectador invisible. Deja que explore y anota exactamente hacia qué materiales se dirige (¿madera, plástico suave, tela?).', emoji: '🔍', icon: 'fa-eye' }, 
                    { titulo: 'Mapeo de detonantes', desc: 'Identifica el momento exacto. ¿Lo hace cuando llegas del trabajo? ¿Cuando está aburrido? Este es su patrón.', emoji: '🗺️', icon: 'fa-map-location-dot' }, 
                    { titulo: 'Gestión del entorno', desc: 'Retira tácticamente los objetos de valor de su alcance. No lo castigues, simplemente quítale la oportunidad de fallar hoy.', emoji: '🛡️', icon: 'fa-shield-halved' }]}, 
                tips: ["Un perro exhausto físicamente reduce su necesidad de morder en un 80%."], error: { titulo: "El error de novato", desc: "Gritarle o corregirlo sin entender primero por qué eligió ese objeto específico." }, resumen: "El diagnóstico preciso hoy garantiza la obediencia de mañana." 
            },
            { 
                day: 2, title: 'El poder del "QUIETO"', semanaLabel: 'Fase 2: Control', duracion: '15 min', nivel: 'Fácil', categoria: 'Obediencia', icon: 'fa-hand', 
                teoria: { audioSeconds: 90, intro: "Límites sin miedo ✋", cuerpo: "El comando 'QUIETO' es la frontera invisible entre el caos y el control. No necesitamos alzar la voz ni intimidar; los perros respetan el lenguaje corporal seguro y directo. Hoy estableceremos tu mano como una barrera psicológica absoluta que él decidirá respetar a cambio de una recompensa de alto valor.", puntosClave: ["Firmeza visual: Tu mano extendida es una pared emocional.", "Voz de ancla: Un solo comando firme, sin titubeos ni repeticiones.", "Micro-segundos de oro: El premio debe llegar en el instante exacto en que se detiene."] }, 
                practica: { timerSeconds: 900, pasos: [
                    { titulo: 'La frontera visual', desc: 'Cuando intente acercarse a un objeto, interpon tu mano firme y abierta frente a su campo de visión, sin tocarlo.', emoji: '✋', icon: 'fa-hand' }, 
                    { titulo: 'El comando único', desc: 'Di "QUIETO" desde el diafragma, con voz grave y segura. Jamás lo repitas dos veces.', emoji: '🗣️', icon: 'fa-comment' }, 
                    { titulo: 'El pago inmediato', desc: 'Si detiene su avance, aunque sea por 2 segundos, entrégale un snack premium inmediatamente.', emoji: '💎', icon: 'fa-gem' }]}, 
                tips: ["Usa trozos de salchicha o queso del tamaño de un guisante para que no se llene y quiera más."], error: { titulo: "Desgaste del comando", desc: "Repetir 'Quieto, quieto, ¡que te estés quieto!'. Le enseñas que tus primeras órdenes son opcionales." }, resumen: "Tu seguridad al dar la orden es lo que genera su obediencia." 
            },
            { 
                day: 3, title: 'Cambio por diversión', semanaLabel: 'Fase 2: Control', duracion: '12 min', nivel: 'Medio', categoria: 'Sustitución', icon: 'fa-baseball', 
                teoria: { audioSeconds: 60, intro: "El arte de la redirección 🎾", cuerpo: "Prohibir crea deseo. Si solo le quitas lo que tiene, crearás un perro frustrado y obsesionado. La técnica maestra de los entrenadores top es la 'Sustitución de Alto Valor'. Le diremos: 'No puedes morder este zapato, pero SÍ puedes destrozar este juguete increíble'. Transformamos la prohibición en una invitación a jugar.", puntosClave: ["El intercambio justo: Nunca le quites algo sin ofrecerle algo mejor.", "El SÍ es más fuerte que el NO: Refuerza lo permitido, ignora lo prohibido.", "Conviértete en el premio: Tu entusiasmo al darle el juguete es la verdadera recompensa."] },

                    { titulo: 'El intercambio maestro', desc: 'Cuando vaya por la carnada, di QUIETO. Al detenerse, haz aparecer su juguete de forma emocionante.', emoji: '✨', icon: 'fa-wand-magic-sparkles' }, 
                    { titulo: 'Fiesta de refuerzo', desc: 'En cuanto su boca toque el juguete permitido, celebra con voz aguda y juega con él unos segundos.', emoji: '🎉', icon: 'fa-party-horn' }]}, 
                tips: ["Rota sus juguetes cada 2 días. La novedad dispara la dopamina en su cerebro."], error: { titulo: "Generar competencia", desc: "Jalonearle el zapato para quitárselo. Él creerá que es un juego de tira y afloja y lo morderá más fuerte." }, resumen: "Morder es biológico; elegir QUÉ morder es el resultado de tu liderazgo." 
            },
            { 
                day: 4, title: 'Confianza ciega (SUELTA)', semanaLabel: 'Fase 3: Avanzado', duracion: '15 min', nivel: 'Medio', categoria: 'Seguridad', icon: 'fa-arrows-rotate',

                tips: ["Si no suelta, no repitas el comando. Simplemente acércale más el snack oloroso a la nariz y espera."], error: { titulo: "La trampa de la fuerza", desc: "Abrirle la mandíbula con tus manos. Destruyes el vínculo de confianza instantáneamente." }, resumen: "Soltar voluntariamente es la máxima prueba de respeto hacia tu liderazgo." 
            },
            {

            },
            { 
                day: 6, title: 'Comportamiento blindado', semanaLabel: 'Fase 4: Consolidación', duracion: '15 min', nivel: 'Avanzado', categoria: 'Entorno', icon: 'fa-shield-halved',

// LÓGICA CORE Y FIX DE NAVEGACIÓN

let dogName = localStorage.getItem('currentDogName') || 'Kira'; 
let currentChallenge = null, currentLessonDay = null, currentTab = 'teoria';
let audioInterval = null, timerInterval = null;
let currentAudioTime = 0, currentTimerTime = 0;
let trackerData = JSON.parse(localStorage.getItem(`eduDog_tracker_${dogName}`)) || {};

document.addEventListener('DOMContentLoaded', () => { renderHub(); showScreen('screen-hub'); });

function renderHub() {
    document.getElementById('hub-dog-name').innerText = `${dogName} 🐾`;
    const container = document.getElementById('challenges-container');
    container.innerHTML = '';
    
    CHALLENGES.forEach(ch => {
        const chTracker = trackerData[ch.id] || {};
        const passedCount = Object.values(chTracker).filter(t => t.passed).length;
        const pct = Math.round((passedCount / ch.totalDays) * 100);
        
        if(ch === CHALLENGES[0]) {
            document.getElementById('hub-progress-text').innerText = `${passedCount}/${ch.totalDays} días`;
            document.getElementById('hub-progress-bar').style.width = `${pct}%`;
        }

        container.innerHTML += `
            <div onclick="openChallenge('${ch.id}')" class="bg-white rounded-[2rem] p-5 shadow-sm active:scale-[0.98] transition-all cursor-pointer flex items-center gap-4 border border-slate-100">
                <div class="w-14 h-14 brand-gradient rounded-2xl flex items-center justify-center text-2xl text-white shadow-lg shadow-emerald-100">${ch.icon}</div>
                <div class="flex-1">
                    <h4 class="font-black text-slate-800 text-sm leading-tight">${ch.name}</h4>
                    <p class="text-[9px] text-slate-400 font-bold tracking-tight uppercase mt-0.5 tracking-wider">${passedCount}/${ch.totalDays} Días completados</p>
                    <div class="w-full bg-slate-100 h-1.5 rounded-full mt-2 overflow-hidden shadow-inner"><div class="brand-gradient h-full transition-all duration-700" style="width:${pct}%"></div></div>
                </div>
                <i class="fa-solid fa-chevron-right text-slate-200"></i>
            </div>`;
    });
}

function openChallenge(id) {
    currentChallenge = CHALLENGES.find(c => c.id === id);
    document.getElementById('challenge-screen-title').innerText = currentChallenge.name;
    document.getElementById('challenge-intro-text').innerText = currentChallenge.introAchieve;
    renderDays();
    showScreen('screen-challenge');
}

function renderDays() {
    const container = document.getElementById('days-container');
    const chTracker = trackerData[currentChallenge.id] || {};
    container.innerHTML = '';
    
    let highestPassed = 0;
    Object.keys(chTracker).forEach(d => { if(chTracker[d].passed) highestPassed = Math.max(highestPassed, parseInt(d)); });

    for (let i = 1; i <= currentChallenge.totalDays; i++) {
        const lesson = currentChallenge.lessons.find(l => l.day === i);
        const track = chTracker[i];
        const isPassed = track && track.passed;
        const isFailed = track && !track.passed;
        const isReady = i === highestPassed + 1 || isFailed;
        const isLocked = !isPassed && !isReady;

        container.innerHTML += `
            <div onclick="${!isLocked ? `openLesson(${i})` : ''}" class="bg-white rounded-3xl p-4 flex items-center gap-4 border-2 ${isPassed ? 'border-emerald-100 bg-emerald-50/20' : isFailed ? 'border-rose-100 bg-rose-50/40' : isLocked ? 'opacity-40 border-slate-50 cursor-not-allowed' : 'border-emerald-200 bg-white cursor-pointer active:scale-95 transition-transform shadow-sm'}">
                <div class="w-10 h-10 rounded-2xl flex items-center justify-center font-black text-sm ${isPassed ? 'brand-gradient text-white shadow-md' : isFailed ? 'bg-rose-500 text-white shadow-md' : 'bg-slate-100 text-slate-400'}">${i}</div>
                <div class="flex-1">
                    <h4 class="font-black text-slate-800 text-xs">${lesson ? lesson.title : `Día ${i}`}</h4>
                    <p class="text-[8px] font-black uppercase tracking-wider mt-0.5 ${isPassed ? 'text-emerald-600' : isFailed ? 'text-rose-500' : 'text-slate-400'}">${isPassed ? '¡Completado!' : isFailed ? 'Requiere reintento' : isLocked ? 'Bloqueado' : 'Entrenar ahora'}</p>
                </div>
                <i class="fa-solid ${lesson ? (isPassed ? 'fa-check' : 'fa-play') : 'fa-lock'} ${isPassed ? 'text-emerald-500' : isFailed ? 'text-rose-400' : isLocked ? 'text-slate-200' : 'text-slate-300'}"></i>
            </div>`;
    }
}

function openLesson(day) {
    currentLessonDay = day; 
    currentTab = 'teoria';
    currentAudioTime = 0; 
    currentTimerTime = 0;
    const lesson = currentChallenge.lessons.find(l => l.day === day);
    renderLessonContent(lesson);
    showScreen('screen-lesson');
}

function renderLessonContent(lesson) {
    const replace = (s) => s ? s.replace(/<DOG>/g, `<span class="font-black text-emerald-700">${dogName}</span>`) : '';
    const container = document.getElementById('lesson-content');
    const chTracker = trackerData[currentChallenge.id] || {};
    const isPassed = chTracker[currentLessonDay] && chTracker[currentLessonDay].passed;

    // PESTAÑAS (Estilo idéntico a la captura 3)
    let html = `
        <div class="flex sticky-tabs mb-6">
            <button onclick="switchTab('teoria')" class="flex-1 tab-btn ${currentTab === 'teoria' ? 'active' : ''}">TEORÍA</button>
            <button onclick="switchTab('practica')" class="flex-1 tab-btn ${currentTab === 'practica' ? 'active' : ''}">PRÁCTICA</button>
        </div>
        <div class="px-6"> `;

    if (currentTab === 'teoria') {
        let displayMins = Math.floor(lesson.teoria.audioSeconds / 60);
        let displaySecs = lesson.teoria.audioSeconds % 60;
        
        html += `
            <div class="blob-container" id="audio-container">
                <div class="blob-shape"></div>
                <div class="action-trigger" onclick="toggleAudio(${lesson.teoria.audioSeconds})" id="audio-play-btn"><i class="fa-solid fa-play ml-1"></i></div>
            </div>
            
            <div class="flex flex-wrap gap-2 justify-center mb-8">
                <span class="tag"><i class="fa-regular fa-clock text-emerald-600"></i> ${lesson.duracion}</span>
                <span class="tag"><i class="fa-solid fa-bolt text-rose-500"></i> ${lesson.nivel}</span>
                <span class="tag"><i class="fa-solid fa-bookmark text-blue-500"></i> ${lesson.categoria}</span>
            </div>
            
            <div class="text-center mb-6">
                <h3 class="font-black text-slate-900 text-2xl tracking-tight leading-tight mb-2">${replace(lesson.teoria.intro)}</h3>
                <p class="text-slate-500 text-[13px] leading-relaxed px-1">${replace(lesson.teoria.cuerpo)}</p>
            </div>
            
            <div class="space-y-3 mt-6">
                ${lesson.teoria.puntosClave.map(p => `
                    <div class="bg-white p-4 rounded-2xl border border-slate-100 shadow-sm flex items-start gap-3">
                        <i class="fa-solid fa-circle-check text-emerald-600 mt-1"></i>
                        <p class="text-[13px] font-bold text-slate-700 leading-snug">${replace(p)}</p>
                    </div>
                `).join('')}
            </div>
        `;
    } else {
        // PRÁCTICA
        let timerMins = Math.floor(lesson.practica.timerSeconds / 60);
        let timerSecs = lesson.practica.timerSeconds % 60;
        
        html += `
            <div class="blob-container" id="timer-container" style="height: 120px; margin-top: 10px;">
                <div class="blob-shape"></div>
                <div id="lesson-timer" class="counter-text text-[3rem] tracking-tighter">${timerMins}:${timerSecs.toString().padStart(2, '0')}</div>
            </div>
            
            <div class="flex justify-center mb-8">
                <div class="action-trigger w-12 h-12 text-lg" onclick="toggleTimer(${lesson.practica.timerSeconds})" id="timer-play-btn"><i class="fa-solid fa-play ml-1"></i></div>
            </div>
            
            <h3 class="font-black text-slate-900 text-[15px] mb-4 flex items-center gap-2 tracking-tight"><i class="fa-solid fa-list-check text-emerald-600"></i> Pasos de hoy:</h3>
            
            <div class="space-y-4">
                ${lesson.practica.pasos.map((p, i) => `
                    <div class="bg-white rounded-2xl border border-slate-100 p-5 flex items-start gap-4 shadow-[0_2px_8px_rgba(0,0,0,0.04)]">
                        <div class="step-circle">${i+1}</div>
                        <div>
                            <h4 class="font-black text-slate-900 text-[14px] flex items-center gap-2 mb-1">
                                <i class="fa-solid ${p.icon} text-slate-300"></i> ${p.titulo}
                            </h4>
                            <p class="text-[12px] text-slate-500 leading-relaxed">${replace(p.desc)}</p>
                        </div>
                    </div>
                `).join('')}
            </div>
            
            <div class="mt-8 pt-2">
                <h3 class="font-black text-slate-400 text-[10px] uppercase tracking-widest mb-3">Tips de Experto</h3>
                <div class="space-y-3">
                    ${lesson.tips.map(t => `
                        <div class="bg-emerald-50/50 border-l-[3px] border-emerald-500 p-4 rounded-r-2xl text-[12px] font-bold text-emerald-800 leading-relaxed shadow-sm">
                            ${replace(t)}
                        </div>
                    `).join('')}
                </div>
            </div>
        `;
        
        if (isPassed) {
            html += `<button onclick="goBack()" class="w-full brand-gradient text-white font-black py-4 rounded-[1.2rem] mt-10 shadow-lg flex items-center justify-center gap-3 active:scale-95 transition-transform"><i class="fa-solid fa-check text-sm"></i> Día superado. Volver</button>`;
        } else {
            html += `<button onclick="openCompleteModal()" class="w-full bg-slate-900 text-white font-black py-4 rounded-[1.2rem] mt-10 shadow-xl active:scale-95 transition-transform tracking-tight text-[15px]">COMPLETAR DÍA ${currentLessonDay}</button>`;
        }
    }
    
    container.innerHTML = html + `</div>`; // Cierra el div del padding lateral
}

function switchTab(tab) {
    currentTab = tab; 
    if(audioInterval) clearInterval(audioInterval); if(timerInterval) clearInterval(timerInterval);
    audioInterval = null; timerInterval = null; currentAudioTime = 0; currentTimerTime = 0;
    renderLessonContent(currentChallenge.lessons.find(l => l.day === currentLessonDay));
    document.getElementById('screen-lesson').scrollTo(0, 0);
}

function toggleAudio(total) {
    const btn = document.getElementById('audio-play-btn'), container = document.getElementById('audio-container');
    if (audioInterval) { 
        clearInterval(audioInterval); audioInterval = null; btn.innerHTML = '<i class="fa-solid fa-play ml-1"></i>'; container.classList.remove('active-session'); 
    } else { 
        if (currentAudioTime === 0) currentAudioTime = total;
        container.classList.add('active-session'); btn.innerHTML = '<i class="fa-solid fa-pause"></i>'; 
        audioInterval = setInterval(() => { 
            currentAudioTime--; 
            if (currentAudioTime <= 0) { clearInterval(audioInterval); audioInterval = null; currentAudioTime = 0; container.classList.remove('active-session'); btn.innerHTML = '<i class="fa-solid fa-rotate-right"></i>'; showToast("Audio finalizado"); } 
        }, 1000); 
    }
}

function toggleTimer(total) {
    const btn = document.getElementById('timer-play-btn'), container = document.getElementById('timer-container'), display = document.getElementById('lesson-timer');
    if (timerInterval) { 
        clearInterval(timerInterval); timerInterval = null; btn.innerHTML = '<i class="fa-solid fa-play ml-1"></i>'; container.classList.remove('active-session'); 
    } else { 
        if (currentTimerTime === 0) currentTimerTime = total;
        container.classList.add('active-session'); btn.innerHTML = '<i class="fa-solid fa-pause"></i>'; 
        timerInterval = setInterval(() => { 
            currentTimerTime--; let mins = Math.floor(currentTimerTime / 60); let secs = currentTimerTime % 60; display.innerText = `${mins}:${secs.toString().padStart(2, '0')}`; 
            if (currentTimerTime <= 0) { clearInterval(timerInterval); timerInterval = null; currentTimerTime = 0; container.classList.remove('active-session'); btn.innerHTML = '<i class="fa-solid fa-rotate-right"></i>'; showToast("¡Práctica completada!"); } 
        }, 1000); 
    }
}

function showScreen(id) {
    if(audioInterval) clearInterval(audioInterval); if(timerInterval) clearInterval(timerInterval);
    audioInterval = null; timerInterval = null;
    
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    document.getElementById(id).scrollTo(0, 0);

    const backBtn = document.getElementById('btn-header-back');
    backBtn.style.visibility = (id === 'screen-hub') ? 'hidden' : 'visible';
}

// FIX DE NAVEGACIÓN GARANTIZADA
function goBack() {
    const activeScreens = document.querySelectorAll('.screen.active');
    if (activeScreens.length === 0) return;
    const activeId = activeScreens[0].id;

    if (activeId === 'screen-lesson') {
        showScreen('screen-challenge');
    } else if (activeId === 'screen-challenge') {
        showScreen('screen-hub');
    }
}

function openCompleteModal() { document.getElementById('modal-complete').classList.remove('hidden'); }
function closeModal() { document.getElementById('modal-complete').classList.add('hidden'); }

function saveDay(result) {
    const passed = result !== 'dificil';
    if (!trackerData[currentChallenge.id]) trackerData[currentChallenge.id] = {};
    trackerData[currentChallenge.id][currentLessonDay] = { result, passed };
    localStorage.setItem(`eduDog_tracker_${dogName}`, JSON.stringify(trackerData));
    
    closeModal();
    showToast(passed ? `¡Día superado!` : `Guardado para reintento`);
    renderHub(); renderDays(); showScreen('screen-challenge');
}

function showToast(msg) {
    const t = document.getElementById('toast'); document.getElementById('toast-msg').innerText = msg;
    t.classList.remove('-translate-y-24', 'opacity-0'); t.classList.add('translate-y-0', 'opacity-100');
    setTimeout(() => { t.classList.add('-translate-y-24', 'opacity-0'); t.classList.remove('translate-y-0', 'opacity-100'); }, 3000);
}
</script>
