<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MenteCan Vital - Desafío 14 Días</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f1f5f9; }
        .app-container { max-width: 420px; margin: 0 auto; height: 100dvh; position: relative; background: #ffffff; shadow: 0 25px 50px -12px rgba(0,0,0,0.25); overflow: hidden; display: flex; flex-direction: column; }
        .screen { display: none; flex: 1; flex-direction: column; animation: fadeIn 0.4s ease-out; overflow-y: auto; }
        .screen.active { display: flex; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .day-card.locked { opacity: 0.5; filter: grayscale(1); pointer-events: none; }
        .timer-active { animation: pulse-indigo 2s infinite; }
        @keyframes pulse-indigo { 0% { background-color: #4f46e5; } 50% { background-color: #818cf8; } 100% { background-color: #4f46e5; } }
    </style>
</head>
<body class="antialiased text-slate-900">

    <div class="app-container md:rounded-[2.5rem] md:border-[8px] md:border-slate-900 relative">
        
        <div class="sticky top-0 bg-indigo-600 text-white px-5 py-4 flex items-center justify-between z-30 shadow-md">
            <div class="flex items-center gap-3">
                <a href="index.html" class="w-8 h-8 flex items-center justify-center rounded-full bg-indigo-500 hover:bg-indigo-400">
                    <i class="fa-solid fa-arrow-left text-xs"></i>
                </a>
                <div>
                    <h2 class="font-extrabold text-sm leading-tight">MenteCan Vital</h2>
                    <p class="text-[10px] font-bold text-indigo-100 uppercase tracking-widest">Desafío 14 Días</p>
                </div>
            </div>
            <div class="w-10 h-10 bg-white/10 rounded-full flex items-center justify-center">
                <i class="fa-solid fa-brain"></i>
            </div>
        </div>

        <section id="screen-dashboard" class="screen active p-6 space-y-6 bg-slate-50">
            <div class="bg-white rounded-[2rem] p-6 shadow-sm border border-slate-100">
                <h3 class="text-xl font-black text-slate-900 mb-1">Tu Racha Mental</h3>
                <p class="text-xs font-medium text-slate-500 mb-4">Entrenando a <span class="dog-name-display font-bold text-indigo-600">tu peludo</span></p>
                
                <div class="w-full bg-slate-100 rounded-full h-2 mb-2">
                    <div id="progress-bar" class="bg-indigo-600 h-2 rounded-full transition-all duration-500" style="width: 7%"></div>
                </div>
                <p class="text-[10px] font-black text-indigo-600 uppercase" id="progress-text">1 de 14 días completados</p>
            </div>

            <div class="grid grid-cols-4 gap-4" id="days-grid">
                </div>
        </section>

        <section id="screen-training" class="screen bg-white">
            <div class="p-8 bg-indigo-50 border-b border-indigo-100">
                <span class="text-[10px] font-black text-indigo-600 uppercase tracking-widest">Paso a Paso</span>
                <h3 id="training-title" class="text-2xl font-black text-slate-900 mt-1">Día 1: Código de Miradas</h3>
            </div>
            
            <div class="p-6 space-y-6">
                <div class="bg-indigo-600 text-white p-5 rounded-[1.5rem] shadow-lg shadow-indigo-100">
                    <h4 class="font-black text-sm mb-2 flex items-center gap-2">
                        <i class="fa-solid fa-lightbulb text-amber-300"></i> Objetivo del Día
                    </h4>
                    <p class="text-xs font-medium opacity-90 leading-relaxed">
                        Enseñar a tu perro que la "llave" para sus premios eres TÚ, no tu mano. Sin mirada no hay comida.
                    </p>
                </div>

                <div class="space-y-3" id="steps-checklist">
                    <label class="flex items-center p-4 bg-slate-50 rounded-2xl border border-slate-100 cursor-pointer">
                        <input type="checkbox" class="w-5 h-5 accent-indigo-600 rounded-lg">
                        <span class="ml-3 text-xs font-bold text-slate-700">Mano cerrada con 10 premios.</span>
                    </label>
                    <label class="flex items-center p-4 bg-slate-50 rounded-2xl border border-slate-100 cursor-pointer">
                        <input type="checkbox" class="w-5 h-5 accent-indigo-600 rounded-lg">
                        <span class="ml-3 text-xs font-bold text-slate-700">Espera el contacto visual (silencio).</span>
                    </label>
                </div>

                <div class="py-6 flex flex-col items-center border-t border-slate-100">
                    <div id="timer-display" class="text-5xl font-black text-slate-900 mb-6 tracking-tighter">02:00</div>
                    <button id="btn-timer" onclick="toggleTimer()" class="w-full bg-slate-900 text-white font-black py-4 rounded-2xl shadow-xl active:scale-95 transition-all flex items-center justify-center gap-3">
                        <i class="fa-solid fa-play"></i> INICIAR SESIÓN
                    </button>
                </div>
            </div>
        </section>
    </div>

    <script>
        let dogName = localStorage.getItem('currentDogName') || "tu peludo";
        let trackerData = JSON.parse(localStorage.getItem(`menteCanTracker_${dogName}`)) || { completed: [0] }; // Simulación: Día 1 ya desbloqueado
        
        document.addEventListener('DOMContentLoaded', () => {
            document.querySelectorAll('.dog-name-display').forEach(el => el.innerText = dogName);
            renderGrid();
        });

        function renderGrid() {
            const grid = document.getElementById('days-grid');
            grid.innerHTML = '';
            for(let i=0; i<14; i++) {
                const isCompleted = trackerData.completed.includes(i);
                const isNext = i === trackerData.completed.length;
                const isLocked = i > trackerData.completed.length;

                grid.innerHTML += `
                    <div onclick="${!isLocked ? 'openDay('+i+')' : ''}" class="flex flex-col items-center gap-2 ${isLocked ? 'locked' : 'cursor-pointer'}">
                        <div class="w-14 h-14 rounded-2xl flex items-center justify-center text-lg font-black border-2 transition-all 
                            ${isCompleted ? 'bg-indigo-100 border-indigo-200 text-indigo-600' : 
                              isNext ? 'bg-white border-indigo-600 text-indigo-600 shadow-lg shadow-indigo-100' : 
                              'bg-slate-50 border-slate-200 text-slate-300'}">
                            ${isCompleted ? '<i class="fa-solid fa-check"></i>' : i+1}
                        </div>
                    </div>`;
            }
        }

        function openDay(index) {
            document.getElementById('screen-dashboard').classList.remove('active');
            document.getElementById('screen-training').classList.add('active');
        }

        // Lógica del Timer simple
        let timerSeconds = 120;
        let timerInterval = null;
        function toggleTimer() {
            const btn = document.getElementById('btn-timer');
            if (timerInterval) {
                clearInterval(timerInterval);
                timerInterval = null;
                btn.innerHTML = '<i class="fa-solid fa-play"></i> REANUDAR';
                btn.classList.remove('timer-active');
            } else {
                btn.classList.add('timer-active');
                timerInterval = setInterval(() => {
                    timerSeconds--;
                    updateTimerDisplay();
                    if(timerSeconds <= 0) { clearInterval(timerInterval); alert("¡Sesión Terminada! 🎉"); }
                }, 1000);
                btn.innerHTML = '<i class="fa-solid fa-pause"></i> PAUSAR';
            }
        }

        function updateTimerDisplay() {
            const m = Math.floor(timerSeconds / 60).toString().padStart(2, '0');
            const s = (timerSeconds % 60).toString().padStart(2, '0');
            document.getElementById('timer-display').innerText = `${m}:${s}`;
        }
    </script>
</body>
</html>
