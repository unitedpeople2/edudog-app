<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HR Digital - Plataforma SaaS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; color: #0f172a; }
        
        /* Navbar de Cristal */
        .glass-nav { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(12px); border-bottom: 1px solid #e2e8f0; }
        
        .nav-link.active { color: #2563eb; position: relative; }
        .nav-link.active::after { content: ''; position: absolute; bottom: -4px; left: 0; width: 100%; height: 2px; background: #2563eb; border-radius: 99px; }

        /* Contenedores Inteligentes */
        .screen { display: none; animation: fadeIn 0.4s ease-out; }
        .screen.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Tarjetas de Producto */
        .product-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); height: 100%; border: 1px solid #e2e8f0; background: white; }
        .product-card:hover { transform: translateY(-5px); border-color: #3b82f6; box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.05); }

        /* Centrado de lectura para PC */
        .readable-width { max-width: 900px; margin: 0 auto; }
        
        /* Loader */
        .loader-dots div { animation: loader-dots 0.6s infinite alternate; }
        @keyframes loader-dots { from { opacity: 0.1; transform: scale(0.8); } to { opacity: 1; transform: scale(1.2); } }
    </style>
</head>
<body class="antialiased">

    <section id="screen-login" class="fixed inset-0 z-[100] bg-slate-50 flex items-center justify-center p-6">
        <div class="w-full max-w-md bg-white p-10 rounded-[2.5rem] shadow-2xl border border-slate-100 text-center">
            <div class="w-20 h-20 bg-blue-600 rounded-3xl flex items-center justify-center text-white text-4xl mx-auto mb-6 shadow-xl"><i class="fa-solid fa-globe"></i></div>
            <h1 class="text-3xl font-black text-slate-900 mb-2 tracking-tight">HR Digital</h1>
            <p class="text-slate-400 font-bold mb-8 uppercase text-[10px] tracking-widest">Plataforma de Herramientas</p>
            
            <div class="space-y-4 text-left">
                <div>
                    <label class="text-[11px] font-black text-slate-400 uppercase tracking-widest ml-2">Correo de Acceso</label>
                    <input type="email" id="login-email" placeholder="tu@correo.com" class="w-full bg-slate-50 border border-slate-200 rounded-2xl py-4 px-5 outline-none font-bold focus:border-blue-500 transition-all">
                </div>
                <div class="relative">
                    <label class="text-[11px] font-black text-slate-400 uppercase tracking-widest ml-2">PIN Secreto</label>
                    <input type="password" id="login-pin" maxlength="6" placeholder="••••••" class="w-full bg-slate-50 border border-slate-200 rounded-2xl py-4 px-5 outline-none font-black text-2xl tracking-[0.5em] focus:border-blue-500 transition-all">
                    <button onclick="togglePin()" class="absolute right-5 bottom-4 text-slate-400 p-2"><i id="pin-icon" class="fa-solid fa-eye"></i></button>
                </div>
                <button onclick="handleLogin()" id="btn-login" class="w-full bg-slate-900 text-white font-black py-5 rounded-2xl shadow-xl active:scale-95 transition-all mt-4 flex items-center justify-center gap-2">
                    <span id="btn-text">Ingresar a la Plataforma</span>
                    <div id="btn-loader" class="hidden flex gap-1"><div class="w-1.5 h-1.5 bg-white rounded-full animate-bounce"></div><div class="w-1.5 h-1.5 bg-white rounded-full animate-bounce [animation-delay:0.2s]"></div></div>
                </button>
            </div>
        </div>
    </section>

    <div id="main-interface" class="hidden min-h-screen flex flex-col">
        
        <nav class="sticky top-0 z-50 glass-nav h-16 shrink-0">
            <div class="max-w-7xl mx-auto px-6 h-full flex justify-between items-center">
                <div class="flex items-center gap-8">
                    <div class="flex items-center gap-2 font-black text-xl text-blue-600">
                        <i class="fa-solid fa-globe"></i> <span>HR Digital</span>
                    </div>
                    <div class="hidden md:flex gap-8 text-sm font-black text-slate-400">
                        <button onclick="showScreen('catalog')" id="nav-catalog" class="nav-link py-2 active">Catálogo</button>
                        <button onclick="showScreen('dashboard')" id="nav-dashboard" class="nav-link py-2">Mis Herramientas</button>
                    </div>
                </div>
                <div class="flex items-center gap-4">
                    <div class="text-right hidden sm:block">
                        <p id="user-display-name" class="text-xs font-black text-slate-900 leading-none mb-0.5">Usuario</p>
                        <p class="text-[9px] font-bold text-emerald-500 uppercase tracking-widest">Miembro Premium</p>
                    </div>
                    <button onclick="logout()" class="w-10 h-10 rounded-full bg-slate-100 flex items-center justify-center text-slate-500 hover:bg-rose-50 hover:text-rose-500 transition-all"><i class="fa-solid fa-right-from-bracket"></i></button>
                </div>
            </div>
        </nav>

        <div class="flex-1">
            
            <main id="screen-catalog" class="screen active p-6 md:p-12 max-w-7xl mx-auto">
                <header class="mb-12">
                    <h1 class="text-4xl font-black text-slate-900 tracking-tight">Ecosistema de Soluciones 🚀</h1>
                    <p class="text-slate-500 font-medium mt-2">Explora herramientas inteligentes diseñadas para transformar tu día a día.</p>
                </header>
                <div id="grid-catalog" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8">
                    </div>
            </main>

            <main id="screen-dashboard" class="screen p-6 md:p-12 max-w-7xl mx-auto">
                <header class="mb-12">
                    <h1 class="text-4xl font-black text-slate-900 tracking-tight">Mis Accesos Activos 🛡️</h1>
                    <p class="text-slate-500 font-medium mt-2">Bienvenido de nuevo. Estas son tus herramientas desbloqueadas.</p>
                </header>
                <div id="grid-owned" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8">
                    </div>
            </main>

            <main id="screen-product" class="screen p-6 md:p-12">
                <div class="max-w-5xl mx-auto">
                    <button onclick="showScreen('catalog')" class="mb-8 font-black text-slate-400 hover:text-blue-600 flex items-center gap-2 transition-all active:translate-x-[-4px]"><i class="fa-solid fa-arrow-left"></i> Volver al Catálogo</button>
                    <div id="product-detail-view" class="bg-white rounded-[3.5rem] p-8 md:p-16 shadow-2xl border border-slate-100 flex flex-col md:flex-row gap-16 items-center">
                        </div>
                </div>
            </main>
        </div>

        <nav class="md:hidden sticky bottom-0 z-50 glass-nav h-20 shrink-0 flex items-center justify-around px-6 border-t border-slate-200">
            <button onclick="showScreen('catalog')" id="mob-nav-catalog" class="flex flex-col items-center gap-1 font-black text-[10px] text-slate-400 nav-link active">
                <i class="fa-solid fa-store text-xl"></i> Catálogo
            </button>
            <button onclick="showScreen('dashboard')" id="mob-nav-dashboard" class="flex flex-col items-center gap-1 font-black text-[10px] text-slate-400 nav-link">
                <i class="fa-solid fa-shapes text-xl"></i> Mis Apps
            </button>
        </nav>
    </div>

    <script>
        // CONFIGURACIÓN FIREBASE
        const firebaseConfig = {
            apiKey: "AIzaSyCrbqdz-JMZNV0H0zcrHwfDOawE3_ouUNw",
            authDomain: "guias-facil-bot.firebaseapp.com",
            projectId: "guias-facil-bot",
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        let userData = null;

        // LÓGICA DE LOGIN
        async function handleLogin() {
            const email = document.getElementById('login-email').value.trim();
            const pin = document.getElementById('login-pin').value.trim();
            if(!email || pin.length < 6) return alert("Completa tus datos");

            const btn = document.getElementById('btn-login');
            btn.disabled = true;
            document.getElementById('btn-text').classList.add('hidden');
            document.getElementById('btn-loader').classList.remove('hidden');

            try {
                const doc = await db.collection('usuarios').doc(email).get();
                if (doc.exists && String(doc.data().pin) === pin) {
                    userData = doc.data();
                    localStorage.setItem('hrSess', JSON.stringify({email, pin}));
                    startApp();
                } else { alert("Correo o PIN incorrecto"); }
            } catch(e) { console.error(e); }
            
            btn.disabled = false;
            document.getElementById('btn-text').classList.remove('hidden');
            document.getElementById('btn-loader').classList.add('hidden');
        }

        function startApp() {
            document.getElementById('screen-login').style.display = 'none';
            document.getElementById('main-interface').classList.remove('hidden');
            document.getElementById('user-display-name').innerText = userData.nombre || 'Miembro';
            renderCatalog();
        }

        // MOTOR DE RENDERIZADO (GRID PROFESIONAL)
        async function renderCatalog() {
            const gridCat = document.getElementById('grid-catalog');
            const gridOwned = document.getElementById('grid-owned');
            const myPerms = [...(userData.apps_activas || []), ...(userData.ebooks_activos || [])];

            try {
                const snap = await db.collection('productos').where('activo', '==', true).get();
                let htmlCat = ''; let htmlOwned = '';

                snap.forEach(doc => {
                    const p = doc.data(); p.id = doc.id;
                    const pKeys = [...(p.apps_a_desbloquear || []), ...(p.ebooks_a_desbloquear || [])];
                    const hasAccess = pKeys.some(key => myPerms.includes(key));
                    
                    const icon = p.nicho === 'edudog' ? 'fa-shield-dog' : 'fa-gem';
                    const color = p.nicho === 'edudog' ? 'bg-violet-600' : 'bg-blue-600';
                    const label = p.nicho === 'edudog' ? 'Mascotas' : 'Premium';

                    const cardHTML = `
                        <div class="product-card rounded-[2.5rem] p-8 flex flex-col">
                            <div class="w-14 h-14 ${color} rounded-2xl flex items-center justify-center text-white text-2xl mb-6 shadow-lg shadow-blue-600/10"><i class="fa-solid ${icon}"></i></div>
                            <h3 class="text-xl font-black text-slate-900 leading-tight mb-2">${p.nombre_producto}</h3>
                            <p class="text-slate-400 text-[10px] font-black uppercase tracking-widest mb-8">${label}</p>
                            
                            <div class="mt-auto">
                                ${hasAccess ? 
                                    `<button onclick="window.location.href='${pKeys[0]}.html'" class="w-full bg-slate-900 text-white font-black py-4 rounded-2xl shadow-xl hover:bg-blue-600 transition-all active:scale-95 flex items-center justify-center gap-2">Abrir App <i class="fa-solid fa-circle-play"></i></button>` : 
                                    `<button onclick="viewProductDetails('${p.id}')" class="w-full bg-blue-50 text-blue-600 border-2 border-blue-100 font-black py-4 rounded-2xl hover:bg-blue-100 transition-all flex items-center justify-center gap-2">Ver Detalles <i class="fa-solid fa-lock text-xs opacity-40"></i></button>`
                                }
                            </div>
                        </div>`;

                    htmlCat += cardHTML;
                    if(hasAccess) htmlOwned += cardHTML;
                });

                gridCat.innerHTML = htmlCat;
                gridOwned.innerHTML = htmlOwned || `<div class="col-span-full py-20 text-center text-slate-400 font-bold">Aún no tienes herramientas compradas.</div>`;

            } catch (e) { console.error(e); }
        }

        // PÁGINA DE VENTAS INTERNA (MANTENER CENTRADO)
        async function viewProductDetails(productId) {
            const doc = await db.collection('productos').doc(productId).get();
            const p = doc.data();
            const colorClass = p.nicho === 'edudog' ? 'text-violet-600' : 'text-blue-600';

            document.getElementById('product-detail-view').innerHTML = `
                <div class="flex-1">
                    <span class="bg-emerald-100 text-emerald-700 px-4 py-1.5 rounded-full text-[10px] font-black uppercase tracking-[0.2em]">Oferta Activa</span>
                    <h2 class="text-5xl font-black text-slate-900 tracking-tighter mt-6 mb-4 leading-tight">${p.nombre_producto}</h2>
                    <div class="space-y-4 mb-12">
                        ${(p.texto_cierre_ventas || '').split('✅').filter(t=>t.trim()).map(t => `<p class="flex items-start gap-3 font-bold text-slate-600 leading-relaxed"><i class="fa-solid fa-circle-check text-emerald-500 mt-1"></i> ${t.trim()}</p>`).join('')}
                    </div>
                    <div class="flex flex-col sm:flex-row items-center gap-6 pt-6 border-t border-slate-100">
                        <div class="text-4xl font-black text-slate-900 tracking-tight">$${p.precio_oferta} USD <span class="text-sm text-slate-400 line-through ml-2 opacity-50">$97</span></div>
                        <button onclick="window.open('${p.link_hotmart}', '_blank')" class="w-full sm:w-auto bg-blue-600 text-white font-black px-12 py-5 rounded-[1.5rem] shadow-2xl shadow-blue-600/30 active:scale-95 transition-all text-lg hover:bg-blue-700">Adquirir Ahora</button>
                    </div>
                </div>
                <div class="hidden lg:flex flex-1 items-center justify-center bg-slate-50 rounded-[3rem] border-2 border-dashed border-slate-200 aspect-square">
                    <div class="text-[10rem] ${colorClass} opacity-10"><i class="fa-solid ${p.nicho==='edudog'?'fa-shield-dog':'fa-gem'}"></i></div>
                </div>`;
            
            showScreen('product');
        }

        // NAVEGACIÓN Y UTILIDADES
        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(`screen-${id}`).classList.add('active');
            
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            const targetNav = document.getElementById(`nav-${id}`) || document.getElementById(`mob-nav-${id}`);
            if(targetNav) {
                document.getElementById(`nav-${id}`)?.classList.add('active');
                document.getElementById(`mob-nav-${id}`)?.classList.add('active');
            }
            window.scrollTo(0,0);
        }

        function togglePin() { const i = document.getElementById('login-pin'); i.type = i.type==='password'?'text':'password'; }
        function logout() { localStorage.clear(); location.reload(); }

        document.addEventListener('DOMContentLoaded', () => {
            const s = localStorage.getItem('hrSess');
            if(s) {
                const c = JSON.parse(s);
                db.collection('usuarios').doc(c.email).get().then(doc => {
                    if(doc.exists && String(doc.data().pin) === c.pin) { userData = doc.data(); startApp(); }
                });
            }
        });
    </script>
</body>
</html>
