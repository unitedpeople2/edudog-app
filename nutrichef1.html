<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NutriChef Vital - Recetario Premium</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap');

        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f1f5f9; color: #1e293b; -webkit-user-select: none; user-select: none; }

        .app-container {
            max-width: 420px; margin: 0 auto; 
            height: 100vh;
            height: 100dvh;
            position: relative; background: #ffffff;
            overflow: hidden; display: flex; flex-direction: column;
        }

        .screen {
            display: none; flex: 1; flex-direction: column;
            animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            overflow-y: auto; overflow-x: hidden; background-color: #f8fafc;
        }
        .screen.active { display: flex; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Estética Premium NutriChef Vital - Degradado Rubí/Fuego */
        .chef-gradient { 
            background: linear-gradient(160deg, #4c0519 0%, #881337 30%, #e11d48 60%, #f43f5e 100%); 
            position: relative; overflow: hidden; 
        }
        .chef-gradient::before {
            content: ''; position: absolute; top: -30%; left: -40%; width: 100%; height: 100%;
            background: radial-gradient(circle, rgba(244, 63, 94, 0.5) 0%, rgba(244, 63, 94, 0) 70%);
            border-radius: 50%; z-index: 1; transform: scale(1.4);
        }
        .chef-gradient::after {
            content: ''; position: absolute; bottom: -30%; right: -40%; width: 100%; height: 100%;
            background: radial-gradient(circle, rgba(244, 63, 94, 0.4) 0%, rgba(244, 63, 94, 0) 70%);
            border-radius: 50%; z-index: 1; transform: scale(1.2);
        }

        /* Pestañas Adaptadas */
        .tab-btn { padding-bottom: 0.75rem; border-bottom: 3px solid transparent; transition: all 0.3s; font-weight: 800; font-size: 0.75rem; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.05em; }
        .tab-btn.active { border-color: #e11d48; color: #be123c; }
        .sticky-tabs { position: sticky; top: 0; background-color: #f8fafc; z-index: 30; }

        /* REPRODUCTOR Y TIMER ADAPTADO (Borgoña/Rubí) */
        .blob-container {
            position: relative; width: 160px; height: 160px; 
            margin: 15px auto; display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .blob-shape {
            position: absolute; inset: 0;
            background: rgba(225, 29, 72, 0.08); border: 1.5px solid rgba(225, 29, 72, 0.15);
            border-radius: 42% 58% 70% 30% / 45% 45% 55% 55%; transition: all 1s ease-in-out; z-index: 1;
        }
        .active-session .blob-shape {
            animation: breathe 4s ease-in-out infinite;
            background: rgba(225, 29, 72, 0.15); border-color: #e11d48;
        }
        @keyframes breathe {
            0%, 100% { border-radius: 42% 58% 70% 30% / 45% 45% 55% 55%; transform: scale(1); }
            50% { border-radius: 58% 42% 38% 62% / 55% 55% 45% 45%; transform: scale(1.06); }
        }
        .counter-text { position: relative; z-index: 10; font-size: 2.5rem; font-weight: 900; color: #4c0519; letter-spacing: -1.5px; line-height: 1; }
        .action-trigger { position: relative; z-index: 10; margin-top: 8px; width: 45px; height: 45px; background: #be123c; color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 8px 12px -2px rgba(190, 18, 60, 0.3); cursor: pointer; transition: all 0.2s; }
        .action-trigger:active { transform: scale(0.95); box-shadow: 0 4px 6px -1px rgba(190, 18, 60, 0.2); }

        /* Tags e Iconos Adaptados */
        .tag { background: #fff1f2; color: #be123c; font-size: 10px; font-weight: 800; padding: 5px 12px; border-radius: 20px; text-transform: uppercase; display: flex; align-items: center; gap: 5px; border: 1px solid #ffe4e6; }
        .step-badge { width: 24px; height: 24px; border-radius: 50%; background: #be123c; color: white; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 800; flex-shrink: 0; }
        
        .day-item.failed { border-color: #fdba74 !important; background: #fff7ed !important; }
        .day-item.failed h4 { color: #c2410c; }
        .day-item.failed .status-icon { color: #f97316; }
        .modal-bg { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(5px); }

        #btn-header-back { transition: opacity 0.2s, transform 0.1s; }
        #btn-header-back.hidden-back { opacity: 0; pointer-events: none; }
        #btn-header-back:not(.hidden-back) { opacity: 1; pointer-events: auto; }
    </style>
</head>

                day: 7, title: 'Plato MasterChef BARF', semanaLabel: 'Fase 4: El Chef Crudo', duracion: '10 min', nivel: 'Avanzado', categoria: 'Graduación', icon: 'fa-crown', 
                teoria: { 
                    audioSeconds: 30, 
                    audioUrl: "https://firebasestorage.googleapis.com/v0/b/guias-facil-bot.firebasestorage.app/o/MenteCan%2FNomuerdas-7.mp3?alt=media&token=c85d08a8-84e9-4cc0-a387-f29913f82548", 
                    intro: "La Compra del Chef 🛒", 
                    cuerpo: "¡Día de graduación! Hoy serviremos el primer plato 100% crudo (estilo BARF). Su estómago ya tiene los jugos gástricos listos gracias al trabajo de la semana.", 
                    puntosClave: ["Carne de Res troceada (Previamente congelada 3 días) - 70%", "Zanahoria cruda rallada - 15%", "Huevo crudo de codorniz - 10%", "Media cucharadita de Kefir o Yogur Natural sin azúcar"] 
                }, 
                practica: { timerSeconds: 600, pasos: [
                    { titulo: 'Descongelado seguro', desc: 'La carne debió pasar de la congeladora a la nevera la noche anterior. Nunca descongelar a temperatura ambiente.', emoji: '❄️', icon: 'fa-snowflake' }, 
                    { titulo: 'El troceado', desc: 'Corta la carne cruda en dados del tamaño de un dado de juego. Esto lo obligará a masticar y limpiar sus dientes.', emoji: '🥩', icon: 'fa-utensils' }, 
                    { titulo: 'El Toque Final', desc: 'Sirve la carne cruda, añade la zanahoria, rompe el huevo crudo encima y corona con el yogur natural.', emoji: '🥚', icon: 'fa-crown' }]}, 
                tips: ["El ácido del estómago de un perro sano destruye bacterias como la salmonela, confía en su naturaleza."], error: { titulo: "Huesos cocidos", desc: "Si decides añadir huesos carnosos, NUNCA deben estar cocidos. El hueso cocido se astilla y perfora el estómago." }, resumen: "Has despertado al lobo sano que lleva dentro. ¡Felicidades Chef!" 
            }
        ]
    }
];

// =============================================
// LÓGICA CORE
// =============================================
document.addEventListener('DOMContentLoaded', () => { renderHub(); showScreen('screen-hub'); });

function renderHub() {
    document.getElementById('hub-dog-name').innerText = `${dogName} 🐾`;
    const container = document.getElementById('challenges-container');
    container.innerHTML = '';
    
    let totalGlobalDays = 0;
    let totalPassedDays = 0;
    
    CHALLENGES.forEach(ch => {
        const chTracker = trackerData[ch.id] || {};
        const passedCount = Object.values(chTracker).filter(t => t.passed).length;
        const pct = Math.round((passedCount / ch.totalDays) * 100);
        
        totalGlobalDays += ch.totalDays;
        totalPassedDays += passedCount;

        container.innerHTML += `
            <div onclick="openChallenge('${ch.id}')" class="bg-white rounded-[2rem] p-5 shadow-sm active:scale-[0.98] transition-all cursor-pointer flex items-center gap-4 border border-slate-100">
                <div class="w-14 h-14 chef-gradient rounded-2xl flex items-center justify-center text-2xl text-white shadow-lg shadow-rose-200">${ch.icon}</div>
                <div class="flex-1">
                    <h4 class="font-black text-slate-800 text-sm leading-tight">${ch.name}</h4>
                    <p class="text-[9px] text-slate-400 font-bold tracking-tight uppercase mt-0.5 tracking-wider">${passedCount}/${ch.totalDays} Platos completados</p>
                    <div class="w-full bg-slate-100 h-1.5 rounded-full mt-2 overflow-hidden shadow-inner"><div class="chef-gradient h-full transition-all duration-700" style="width:${pct}%"></div></div>
                </div>
                <i class="fa-solid fa-chevron-right text-slate-200"></i>
            </div>`;
    });

    const globalPct = totalGlobalDays > 0 ? Math.round((totalPassedDays / totalGlobalDays) * 100) : 0;
    document.getElementById('hub-progress-text').innerText = `${totalPassedDays}/${totalGlobalDays} platos`;
    document.getElementById('hub-progress-bar').style.width = `${globalPct}%`;
}

function openChallenge(id) {
    currentChallenge = CHALLENGES.find(c => c.id === id);
    document.getElementById('challenge-screen-title').innerText = currentChallenge.name;
    document.getElementById('challenge-intro-text').innerText = currentChallenge.introAchieve;
    renderDays();
    showScreen('screen-challenge');
}

function renderDays() {
    const container = document.getElementById('days-container');
    const chTracker = trackerData[currentChallenge.id] || {};
    container.innerHTML = '';
    
    let highestPassed = 0;
    Object.keys(chTracker).forEach(d => { if(chTracker[d].passed) highestPassed = Math.max(highestPassed, parseInt(d)); });

    for (let i = 1; i <= currentChallenge.totalDays; i++) {
        const lesson = currentChallenge.lessons.find(l => l.day === i);
        const track = chTracker[i];
        const isPassed = track && track.passed;
        const isFailed = track && !track.passed;
        const isReady = i === highestPassed + 1 || isFailed;
        const isLocked = !isPassed && !isReady;

        const statusIcon = isLocked ? 'fa-lock' : (isFailed ? 'fa-rotate-left' : (lesson ? lesson.icon : 'fa-circle'));

        container.innerHTML += `
            <div onclick="${!isLocked ? `openLesson(${i})` : ''}" class="day-item bg-white rounded-3xl p-4 flex items-center gap-4 border-2 ${isPassed ? 'border-rose-100 bg-rose-50/20' : isFailed ? 'failed' : isLocked ? 'opacity-40 border-slate-50 cursor-not-allowed' : 'border-rose-200 bg-rose-50/40 cursor-pointer active:scale-95 transition-transform shadow-sm'}">
                <div class="w-10 h-10 rounded-2xl flex items-center justify-center font-black text-sm ${isPassed ? 'chef-gradient text-white shadow-md' : isFailed ? 'bg-orange-500 text-white shadow-md' : 'bg-white text-slate-400'}">${i}</div>
                <div class="flex-1">
                    <h4 class="font-black text-slate-800 text-xs">${lesson ? lesson.title : `Día ${i}`}</h4>
                    <p class="text-[8px] font-black text-slate-400 uppercase tracking-wider mt-0.5">${isPassed ? '¡Plato Terminado!' : isFailed ? 'Requiere reintento' : isLocked ? 'Bloqueado' : 'Cocinar ahora'}</p>
                </div>
                <i class="fa-solid ${statusIcon} status-icon ${isPassed ? 'text-rose-600' : isFailed ? 'text-orange-500' : isLocked ? 'text-slate-300' : 'text-slate-200'}"></i>
            </div>`;
    }
}

function openLesson(day) {
    currentLessonDay = day; 
    currentTab = 'teoria';
    currentAudioTime = 0; 
    currentTimerTime = 0;
    const lesson = currentChallenge.lessons.find(l => l.day === day);
    renderLessonContent(lesson);
    showScreen('screen-lesson');
}

function renderLessonContent(lesson) {
    const replace = (s) => s ? s.replace(/<DOG>/g, `<span class="font-black text-rose-700">${dogName}</span>`) : '';
    const container = document.getElementById('lesson-content');
    const chTracker = trackerData[currentChallenge.id] || {};
    const isPassed = chTracker[currentLessonDay] && chTracker[currentLessonDay].passed;

    let html = `
        <div class="flex border-b border-slate-100 mb-6 sticky-tabs pt-2 pb-2 shadow-sm rounded-t-3xl px-1">
            <button onclick="switchTab('teoria')" class="flex-1 tab-btn ${currentTab === 'teoria' ? 'active' : ''}">INGREDIENTES</button>
            <button onclick="switchTab('practica')" class="flex-1 tab-btn ${currentTab === 'practica' ? 'active' : ''}">MODO CHEF</button>
        </div>
    `;

    if (currentTab === 'teoria') {
        let displayMins = Math.floor(lesson.teoria.audioSeconds / 60);
        let displaySecs = lesson.teoria.audioSeconds % 60;
        
        html += `
            <div class="blob-container" id="audio-container">
                <div class="blob-shape"></div>
                <div class="blob-content text-center">
                    <div id="audio-time" class="counter-text">${displayMins}:${displaySecs.toString().padStart(2, '0')}</div>
                    <div onclick="toggleAudio(${lesson.teoria.audioSeconds})" class="action-trigger mx-auto" id="audio-play-btn"><i class="fa-solid fa-play"></i></div>
                </div>
            </div>
            <div class="flex flex-wrap gap-2 justify-center mb-6">
                <span class="tag"><i class="fa-solid fa-clock text-rose-600"></i> ${lesson.duracion}</span>
                <span class="tag"><i class="fa-solid fa-fire text-orange-500"></i> ${lesson.nivel}</span>
                <span class="tag"><i class="fa-solid fa-heart-pulse text-rose-500"></i> ${lesson.categoria}</span>
            </div>
            <div class="space-y-4">
                <h3 class="font-black text-slate-900 text-xl tracking-tight leading-tight text-center">${replace(lesson.teoria.intro)}</h3>
                <p class="text-slate-500 text-sm leading-relaxed text-center px-2">${replace(lesson.teoria.cuerpo)}</p>
                <div class="space-y-2.5 mt-6">
                    ${lesson.teoria.puntosClave.map(p => `<p class="text-xs font-bold text-slate-700 flex items-center gap-3 bg-white p-4 rounded-2xl border border-slate-100 shadow-sm"><i class="fa-solid fa-circle-check text-rose-600"></i> ${replace(p)}</p>`).join('')}
                </div>
                <button onclick="switchTab('practica')" class="w-full chef-gradient text-white font-black py-5 rounded-3xl mt-8 shadow-xl active:scale-95 transition-all flex items-center justify-center gap-3">¡Todo listo! A cocinar <i class="fa-solid fa-fire-burner text-xs"></i></button>
            </div>`;
    } else {
        let timerMins = Math.floor(lesson.practica.timerSeconds / 60);
        let timerSecs = lesson.practica.timerSeconds % 60;
        
        html += `
            <div class="text-center"><p class="text-[9px] font-black text-slate-400 uppercase tracking-wider mt-2">Temporizador de preparación</p></div>
            <div class="blob-container" id="timer-container">
                <div class="blob-shape"></div>
                <div class="blob-content text-center">
                    <div id="lesson-timer" class="counter-text">${timerMins}:${timerSecs.toString().padStart(2, '0')}</div>
                    <div onclick="toggleTimer(${lesson.practica.timerSeconds})" class="action-trigger mx-auto" id="timer-play-btn"><i class="fa-solid fa-play"></i></div>
                </div>
            </div>
            <div class="space-y-3.5">
                <h3 class="font-black text-slate-900 text-sm mb-2 ml-2 flex items-center gap-2"><i class="fa-solid fa-list-ol text-rose-600"></i> Paso a paso:</h3>
                ${lesson.practica.pasos.map((p, i) => `
                    <div class="bg-white rounded-3xl border border-slate-100 p-5 flex gap-4 shadow-sm">
                        <div class="step-badge">${i+1}</div>
                        <div>
                            <h4 class="font-black text-slate-900 text-xs flex items-center gap-2">${p.emoji} ${p.titulo}</h4>
                            <p class="text-[11px] text-slate-500 leading-relaxed mt-1">${replace(p.desc)}</p>
                        </div>
                    </div>`).join('')}
                
                <div class="mt-8 px-2 space-y-4 pt-4 border-t border-slate-100">
                    <h3 class="font-black text-slate-400 text-[10px] uppercase tracking-wider ml-1">Secretos del Chef</h3>
                    <div class="space-y-2.5">
                        ${lesson.tips.map(t => `<div class="bg-rose-50/50 border-l-4 border-rose-400 p-4 rounded-r-2xl text-[11px] font-semibold text-rose-900">${replace(t)}</div>`).join('')}
                    </div>
                    <div class="bg-orange-50 border-l-4 border-orange-400 p-4 rounded-r-2xl">
                        <h4 class="font-black text-orange-800 text-[10px] uppercase mb-1 tracking-wider">${lesson.error.titulo}</h4>
                        <p class="text-[11px] text-orange-700 font-medium">${replace(lesson.error.desc)}</p>
                    </div>
                </div>
            </div>
            <div class="bg-rose-50 border-l-4 border-rose-400 p-6 rounded-r-3xl mt-10 shadow-sm border border-rose-100">
                <span class="text-[9px] font-black uppercase text-rose-700 block mb-1.5 tracking-wider">El objetivo de hoy</span>
                <p class="text-xs font-bold italic text-rose-950 leading-snug">"${replace(lesson.resumen)}"</p>
            </div>
        `;
        if (isPassed) {
            html += `<button onclick="showScreen('screen-challenge')" class="w-full chef-gradient text-white font-black py-5 rounded-3xl mt-10 shadow-xl flex items-center justify-center gap-3 active:scale-95 transition-transform"><i class="fa-solid fa-rotate-left text-xs"></i> Volver al listado</button>`;
        } else {
            html += `<button onclick="openCompleteModal()" class="w-full bg-slate-900 text-white font-black py-5 rounded-3xl mt-10 shadow-2xl active:scale-95 transition-all tracking-tight flex justify-center items-center gap-2"><i class="fa-solid fa-bell-concierge"></i> SERVIR PLATO</button>`;
        }
    }
    container.innerHTML = html;
}

function switchTab(tab) {
    currentTab = tab; 
    
    if(audioPlayer) { audioPlayer.pause(); audioPlayer.currentTime = 0; }

    if(audioInterval) clearInterval(audioInterval); if(timerInterval) clearInterval(timerInterval);
    audioInterval = null; timerInterval = null; currentAudioTime = 0; currentTimerTime = 0;
    renderLessonContent(currentChallenge.lessons.find(l => l.day === currentLessonDay));
    document.getElementById('screen-lesson').scrollTo(0, 0);
}

function toggleAudio(total) {
    const btn = document.getElementById('audio-play-btn');
    const container = document.getElementById('audio-container');
    const display = document.getElementById('audio-time');
    const lesson = currentChallenge.lessons.find(l => l.day === currentLessonDay);

    if (audioInterval) { 
        clearInterval(audioInterval); audioInterval = null; 
        btn.innerHTML = '<i class="fa-solid fa-play"></i>'; 
        container.classList.remove('active-session'); 
        if(audioPlayer) audioPlayer.pause();
    } else { 
        if (currentAudioTime === 0) {
            currentAudioTime = total;
            if(audioPlayer) { audioPlayer.pause(); audioPlayer.currentTime = 0; }
            audioPlayer = new Audio(lesson.teoria.audioUrl);
        }
        
        container.classList.add('active-session'); 
        btn.innerHTML = '<i class="fa-solid fa-pause"></i>'; 
        audioPlayer.play().catch(e => console.warn("Esperando interacción del usuario para audio"));
        
        audioInterval = setInterval(() => { 
            currentAudioTime--; 
            let mins = Math.floor(currentAudioTime / 60); 
            let secs = currentAudioTime % 60; 
            display.innerText = `${mins}:${secs.toString().padStart(2, '0')}`; 
            
            if (currentAudioTime <= 0) { 
                clearInterval(audioInterval); audioInterval = null; currentAudioTime = 0; 
                container.classList.remove('active-session'); 
                btn.innerHTML = '<i class="fa-solid fa-rotate-right"></i>'; 
            } 
        }, 1000); 
    }
}

function toggleTimer(total) {
    const btn = document.getElementById('timer-play-btn'), container = document.getElementById('timer-container'), display = document.getElementById('lesson-timer');
    if (timerInterval) { 
        clearInterval(timerInterval); timerInterval = null; btn.innerHTML = '<i class="fa-solid fa-play"></i>'; container.classList.remove('active-session'); 
    } else { 
        if (currentTimerTime === 0) currentTimerTime = total;
        container.classList.add('active-session'); btn.innerHTML = '<i class="fa-solid fa-pause"></i>'; 
        timerInterval = setInterval(() => { 
            currentTimerTime--; let mins = Math.floor(currentTimerTime / 60); let secs = currentTimerTime % 60; display.innerText = `${mins}:${secs.toString().padStart(2, '0')}`; 
            if (currentTimerTime <= 0) { clearInterval(timerInterval); timerInterval = null; currentTimerTime = 0; container.classList.remove('active-session'); btn.innerHTML = '<i class="fa-solid fa-rotate-right"></i>'; showToast("¡Tiempo de preparación listo!"); } 
        }, 1000); 
    }
}

function showScreen(id) {
    if(audioPlayer) { audioPlayer.pause(); audioPlayer.currentTime = 0; }

    if(audioInterval) clearInterval(audioInterval); if(timerInterval) clearInterval(timerInterval);
    audioInterval = null; timerInterval = null;

    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    document.getElementById(id).scrollTo(0, 0);

    const backBtn = document.getElementById('btn-header-back');
    if(backBtn) {
        if (id === 'screen-hub') { backBtn.classList.add('hidden-back'); } 
        else { backBtn.classList.remove('hidden-back'); }
    }
}

function goBack() {
    const activeScreens = document.querySelectorAll('.screen.active');
    if (activeScreens.length === 0) return;
    const activeId = activeScreens[0].id;

    if (activeId === 'screen-lesson') { showScreen('screen-challenge'); } 
    else if (activeId === 'screen-challenge') { showScreen('screen-hub'); }
}

function openCompleteModal() { document.getElementById('modal-complete').classList.remove('hidden'); }
function closeModal() { document.getElementById('modal-complete').classList.add('hidden'); }

function saveDay(result) {
    const passed = result !== 'dificil';
    if (!trackerData[currentChallenge.id]) trackerData[currentChallenge.id] = {};
    trackerData[currentChallenge.id][currentLessonDay] = { result, passed };
    localStorage.setItem(`nutriChef_tracker_${dogName}`, JSON.stringify(trackerData));
    
    closeModal();
    showToast(passed ? `¡Plato dominado!` : `Guardado para reintento`);
    renderHub(); renderDays(); showScreen('screen-challenge');
}

let toastTimeout = null;
function showToast(msg) {
    const t = document.getElementById('toast'); document.getElementById('toast-msg').innerText = msg;
    if(toastTimeout) clearTimeout(toastTimeout);
    t.classList.remove('-translate-y-24', 'opacity-0'); t.classList.add('translate-y-0', 'opacity-100');
    toastTimeout = setTimeout(() => { t.classList.add('-translate-y-24', 'opacity-0'); t.classList.remove('translate-y-0', 'opacity-100'); toastTimeout = null; }, 3000);
}
</script>
