<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lectura: Prompt SESIÓN #1 | HR Digital</title>
    
    <!-- Frameworks Visuales -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #0f172a; /* Fondo oscuro para resaltar el PDF */
            margin: 0;
            overflow: hidden; /* Evita doble scroll */
        }

        .pdf-viewer {
            height: calc(100vh - 64px); /* Pantalla completa menos la altura del nav */
            width: 100%;
            border: none;
        }

        /* Navbar de Cristal */
        .glass-nav { 
            background: rgba(15, 23, 42, 0.9); 
            backdrop-filter: blur(10px); 
            border-bottom: 1px solid rgba(255, 255, 255, 0.1); 
        }

        /* Botón de volver con efecto */
        .btn-back {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .btn-back:hover {
            transform: translateX(-4px);
            color: #fff;
        }
    </style>
</head>
<body class="antialiased">

    <!-- Barra de Navegación -->
    <nav class="h-16 glass-nav flex items-center justify-between px-6 sticky top-0 z-50">
        <div class="flex items-center gap-4">
            <a href="index.html" class="btn-back text-slate-400 font-bold flex items-center gap-2">
                <i class="fa-solid fa-arrow-left"></i>
                <span class="hidden sm:inline">Volver a la Plataforma</span>
            </a>
        </div>

        <div class="flex items-center gap-3">
            <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center text-white text-sm">
                <i class="fa-solid fa-book-open"></i>
            </div>
            <h1 class="text-white font-extrabold tracking-tight text-sm sm:text-base">Prompt SESIÓN #1</h1>
        </div>

        <!-- Espaciador para centrar el título en pantallas grandes -->
        <div class="w-10 sm:w-40"></div>
    </nav>

    <!-- Contenedor del PDF -->
    <main class="w-full flex items-center justify-center bg-slate-900">
        <!-- El parámetro #toolbar=0 intenta ocultar las herramientas del navegador para que se vea más limpio -->
        <iframe 
            class="pdf-viewer"
            src="https://firebasestorage.googleapis.com/v0/b/guias-facil-bot.firebasestorage.app/o/productos%2FPrompt%20SESION%20%231.pdf?alt=media&token=a0e0f588-75c7-48bc-891f-a1f122d211f4#toolbar=0&navpanes=0"
            type="application/pdf">
        </iframe>
    </main>

    <!-- Notificación flotante opcional -->
    <div class="fixed bottom-6 right-6 hidden md:block">
        <div class="bg-blue-600 text-white px-5 py-3 rounded-2xl shadow-2xl flex items-center gap-3 animate-bounce">
            <i class="fa-solid fa-circle-info"></i>
            <span class="text-xs font-bold uppercase tracking-widest">Modo Lectura Activo</span>
        </div>
    </div>

</body>
</html>
