<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NutriCan Vital - Calculadora Premium</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #e2e8f0; }
        .app-container { max-width: 420px; margin: 0 auto; height: 100dvh; position: relative; background: #ffffff; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25); overflow: hidden; display: flex; flex-direction: column; }
        .screen { display: none; flex: 1; flex-direction: column; animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1); overflow: hidden; background-color: #f8fafc; }
        .screen-scroll { flex: 1; overflow-y: auto; }
        .screen.active { display: flex; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        .day-ready { border-color: #f59e0b !important; background-color: #fffbeb !important; }
        .day-completed { background-color: #ffffff; border-color: #10b981; }
        @keyframes bounce-in { 0% { transform: scale(0.3); opacity: 0; } 50% { transform: scale(1.1); } 100% { transform: scale(1); opacity: 1; } }
        .bounce-in { animation: bounce-in 0.6s cubic-bezier(0.36, 0.07, 0.19, 0.97) both; }
    </style>
</head>
<body class="antialiased text-slate-900 md:py-8">
<div class="app-container md:rounded-[2.5rem] md:border-[6px] md:border-slate-900 relative">
    <div class="sticky top-0 bg-amber-500 text-white border-b border-amber-600 px-4 py-4 flex items-center justify-between z-30 shadow-md">
        <h2 class="font-extrabold text-sm flex items-center gap-2"><i class="fa-solid fa-bowl-food"></i> NutriCan Vital</h2>
        <a href="index.html" class="w-10 h-10 flex items-center justify-center rounded-full bg-amber-600"><i class="fa-solid fa-house"></i></a>
    </div>

    <section id="screen-dashboard" class="screen bg-slate-50 active">
        <div class="screen-scroll p-6 pb-10 space-y-6">
            <div id="health-status-panel" class="bg-white rounded-[1.5rem] border border-slate-200 p-4">
                <h3 class="font-extrabold text-sm mb-2">Estado de Salud de <span class="dog-name-display">...</span></h3>
                <p id="status-advice-text" class="text-xs text-slate-500">Cargando datos...</p>
            </div>
            <div>
                <h2 class="text-4xl font-black text-slate-900 tracking-tight" id="total-grams">0</h2>
                <span class="text-slate-500 font-bold">gramos/día</span>
                <div id="ingredients-list" class="space-y-3 mt-4"></div>
            </div>
            <div id="tracker-container" class="divide-y divide-slate-100 bg-white rounded-3xl border border-slate-200 overflow-hidden"></div>
            <button onclick="resetApp()" class="w-full text-rose-500 font-bold py-3 text-xs">Recalcular Plan</button>
        </div>
    </section>

    <section id="screen-victory" class="screen bg-slate-50">
        <div class="screen-scroll p-6 flex flex-col items-center">
            <div class="bounce-in mt-8 mb-6 text-6xl">🏆</div>
            <h2 class="text-3xl font-black text-slate-900">¡Transición Completa!</h2>
            <p class="text-slate-500 text-center text-sm mb-8">Has logrado adaptar a <span class="dog-name-display">...</span> a una vida sana.</p>
            <div id="victory-upsell-container" class="w-full"></div>
            <button onclick="location.reload()" class="w-full bg-white text-slate-400 font-bold py-3 rounded-xl text-xs border border-slate-200 mt-4">Cerrar</button>
        </div>
    </section>

    <div id="modal-tracker" class="hidden absolute inset-0 z-50 bg-slate-900/80 flex flex-col justify-end">
        <div class="bg-white rounded-t-[2.5rem] p-8">
            <h3 class="text-xl font-black mb-4">¿Cómo estuvo la digestión?</h3>
            <div class="space-y-3">
                <button onclick="saveDay('good')" class="w-full bg-emerald-50 text-emerald-700 p-4 rounded-2xl font-bold">🟢 Heces Perfectas</button>
                <button onclick="saveDay('soft')" class="w-full bg-amber-50 text-amber-700 p-4 rounded-2xl font-bold">🟡 Heces Blandas</button>
                <button onclick="closeModal()" class="w-full text-slate-400 py-4 font-bold">Cancelar</button>
            </div>
        </div>
    </div>
</div>

<script>
    let dogName = localStorage.getItem('currentDogName') || "tu peludo";
    let planData = JSON.parse(localStorage.getItem(`nutriCanPlan_${dogName}`));
    let trackerData = JSON.parse(localStorage.getItem(`nutriCanTracker_${dogName}`)) || { days: {} };
    let currentUserSession = JSON.parse(localStorage.getItem('eduDogSession'));
    let pendingDay = -1;

    document.addEventListener('DOMContentLoaded', () => {
        document.querySelectorAll('.dog-name-display').forEach(el => el.innerText = dogName);
        if(planData) renderDashboard();
    });

    function renderDashboard() {
        const totalDays = planData.dietPlanType === 'croquetas' ? 14 : planData.dietPlanType === 'mixto' ? 10 : 5;
        const completedCount = Object.keys(trackerData.days).length;

        if (completedCount >= totalDays) { renderVictoryScreen(totalDays); showScreen('screen-victory'); return; }

        document.getElementById('total-grams').innerText = planData.totalGrams;
        document.getElementById('status-advice-text').innerText = completedCount === 0 ? "Inicia hoy tu racha para ver el progreso." : "Digestión bajo control.";
        
        const container = document.getElementById('tracker-container');
        container.innerHTML = '';
        for(let i=0; i<totalDays; i++) {
            const completed = !!trackerData.days[i];
            const ready = i === completedCount;
            container.innerHTML += `<div onclick="${ready ? `openModal(${i})` : ''}" class="p-4 flex gap-4 ${completed ? 'day-completed' : ready ? 'day-ready' : 'opacity-40'}">
                <div class="w-8 h-8 rounded-full border-2 flex items-center justify-center font-black">${completed ? '✓' : i+1}</div>
                <div><h4 class="font-black text-sm">Día ${i+1}</h4><p class="text-[10px]">${completed ? 'Completado' : ready ? 'Toca para marcar' : 'Bloqueado'}</p></div>
            </div>`;
        }
    }

    function renderVictoryScreen(totalDays) {
        // CORRECCIÓN: Comprobar si ya es dueño para cambiar el botón
        const hasNutriChef = currentUserSession && currentUserSession.ebooks && currentUserSession.ebooks.includes('nutrichef');
        
        const btnHtml = hasNutriChef 
            ? `<button onclick="window.location.href='nutrichef.html'" class="w-full bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-3 rounded-xl text-sm transition-all active:scale-95 shadow-lg shadow-emerald-500/20">
                    Acceder a mis recetas de mantenimiento 🍳
               </button>`
            : `<button onclick="openNutriChefUpsell()" class="w-full bg-rose-500 hover:bg-rose-600 text-white font-bold py-3 rounded-xl text-sm transition-all active:scale-95 shadow-lg shadow-rose-500/20">
                    Desbloquear Recetario de Mantenimiento 🍳
               </button>`;

        document.getElementById('victory-upsell-container').innerHTML = `
            <div class="w-full bg-slate-900 rounded-[1.5rem] p-5 mb-5 text-white">
                <div class="flex items-center gap-3 mb-3">
                    <div class="w-10 h-10 bg-rose-500 rounded-xl flex items-center justify-center text-lg shrink-0">🍳</div>
                    <div><p class="font-extrabold text-sm">NutriChef Vital</p><p class="text-[11px] text-slate-300">Recetario dinámico post-transición</p></div>
                </div>
                ${btnHtml}
            </div>`;
    }

    // CORRECCIÓN: Mensaje unificado para el bot de WhatsApp
    function openNutriChefUpsell() {
        const phone = currentUserSession ? currentUserSession.phone : '';
        const isPeru = phone.startsWith('51');
        const priceText = isPeru ? "S/ 17" : "$4.99 USD";
        const msg = `Hola Soporte 👋\n\nQuiero desbloquear el eBook *NutriChef Vital* por ${priceText}.\n\n👤 Mi cuenta es: +${phone}\n💳 ¿Me dan los pasos para pagar?`;
        window.open(`https://wa.me/51932335202?text=${encodeURIComponent(msg)}`, '_blank');
    }

    function openModal(day) { pendingDay = day; document.getElementById('modal-tracker').classList.remove('hidden'); }
    function closeModal() { document.getElementById('modal-tracker').classList.add('hidden'); }
    function saveDay(poop) { 
        trackerData.days[pendingDay] = { poop, date: new Date().toISOString().split('T')[0] };
        localStorage.setItem(`nutriCanTracker_${dogName}`, JSON.stringify(trackerData));
        closeModal(); renderDashboard(); 
    }
    function showScreen(id) { document.querySelectorAll('.screen').forEach(s => s.classList.toggle('active', s.id === id)); }
    function resetApp() { if(confirm("¿Seguro? Se borrará el progreso.")) { localStorage.clear(); location.href='index.html'; } }
</script>
</body>
</html>
